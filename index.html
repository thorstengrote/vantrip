<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Van-Trip Planner 2026</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; display: flex; height: 100vh; background: #1a1a2e; color: #e0e0e0; }

  #sidebar {
    width: 420px; min-width: 420px; display: flex; flex-direction: column;
    background: #16213e; border-right: 2px solid #0f3460; overflow: hidden;
  }
  #sidebar-header { padding: 12px 16px; background: #0f3460; }
  #sidebar-header h1 { font-size: 17px; color: #e94560; margin-bottom: 2px; }
  #sidebar-header p { font-size: 10px; color: #8899aa; }

  #filters { padding: 6px 14px; border-bottom: 1px solid #0f3460; display: flex; flex-wrap: wrap; gap: 3px; }
  .fbtn { padding: 3px 7px; border: 1px solid #333; border-radius: 10px; background: #1a1a2e; color: #aaa; font-size: 10px; cursor: pointer; }
  .fbtn.on { border-color: var(--c); color: var(--c); background: rgba(255,255,255,0.05); }

  #controls { padding: 5px 14px; border-bottom: 1px solid #0f3460; display: flex; gap: 8px; align-items: center; }
  #controls label { font-size: 10px; color: #889; cursor: pointer; display: flex; align-items: center; gap: 4px; }
  #controls input[type=checkbox] { accent-color: #27ae60; }
  #search { flex: 1; padding: 4px 8px; background: #1a1a2e; border: 1px solid #333; border-radius: 5px; color: #e0e0e0; font-size: 11px; outline: none; }
  #search:focus { border-color: #e94560; }

  #tabs { display: flex; border-bottom: 1px solid #0f3460; }
  .tab { flex: 1; padding: 7px; text-align: center; cursor: pointer; font-size: 11px; color: #556; background: #16213e; }
  .tab.on { color: #e94560; border-bottom: 2px solid #e94560; background: #1a1a3e; }

  #list { flex: 1; overflow-y: auto; }
  .card { padding: 8px 14px 8px 28px; border-bottom: 1px solid #0a1020; cursor: pointer; position: relative; display: flex; gap: 8px; align-items: flex-start; }
  .card:hover { background: rgba(255,255,255,0.02); }
  .card.sel { background: rgba(233,69,96,0.07); border-left: 3px solid #e94560; }
  .card-body { flex: 1; min-width: 0; }
  .card .nm { font-size: 12px; font-weight: 600; margin-bottom: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .card .sub { font-size: 9px; color: #556; }
  .card .ds { font-size: 10px; color: #778; margin-top: 2px; line-height: 1.3; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .card .tgs { margin-top: 3px; display: flex; gap: 2px; flex-wrap: wrap; }
  .tg { font-size: 8px; padding: 1px 5px; border-radius: 6px; background: rgba(255,255,255,0.05); color: #778; }
  .tg.wc { background: rgba(39,174,96,0.12); color: #27ae60; }
  .card .rn { position: absolute; left: 5px; top: 8px; width: 15px; height: 15px; border-radius: 50%; background: #e94560; color: #fff; font-size: 8px; font-weight: 700; display: flex; align-items: center; justify-content: center; }
  .card.sel { border-left: 3px solid #e94560; }

  /* Thumbnail in card */
  .card-img { width: 64px; height: 48px; border-radius: 4px; object-fit: cover; flex-shrink: 0; }
  .card-img-ph { width: 64px; height: 48px; border-radius: 4px; background: #0d1525; flex-shrink: 0; display: flex; align-items: center; justify-content: center; color: #223; font-size: 18px; }

  /* Add/remove route button on card */
  .card-route-btn {
    position: absolute; right: 8px; bottom: 6px;
    width: 22px; height: 22px; border-radius: 50%;
    border: 1px solid #444; background: #1a1a2e; color: #888;
    font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: all 0.15s; z-index: 2;
  }
  .card-route-btn:hover { border-color: #e94560; color: #e94560; background: rgba(233,69,96,0.1); }
  .card-route-btn.on-route { background: #e94560; color: #fff; border-color: #e94560; }
  .card-route-btn.on-route:hover { background: #c73550; }

  /* Route leg */
  .leg { padding: 2px 14px 2px 32px; background: #0a0f1a; font-size: 9px; color: #445; display: flex; align-items: center; gap: 5px; }
  .leg b { color: #e94560; font-weight: 600; }

  /* Move buttons */
  .mvs { position: absolute; right: 8px; bottom: 4px; display: flex; gap: 1px; }
  .mv { width: 18px; height: 18px; border: 1px solid #333; border-radius: 3px; background: #1a1a2e; color: #777; font-size: 9px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .mv:hover { color: #e94560; }

  /* Summary bar */
  #summary { padding: 8px 14px; background: #0f3460; font-size: 10px; color: #889; }
  .stats { display: flex; gap: 12px; margin-bottom: 5px; }
  .st .v { font-size: 14px; font-weight: 700; color: #e94560; }
  .st .l { font-size: 8px; color: #556; }
  .btns { display: flex; gap: 4px; flex-wrap: wrap; }
  .ab { padding: 4px 10px; border: none; border-radius: 5px; font-size: 10px; cursor: pointer; }
  .ab1 { background: #e94560; color: #fff; }
  .ab2 { background: transparent; color: #777; border: 1px solid #444; }

  /* Spinner */
  .sp { display: inline-block; width: 10px; height: 10px; border: 2px solid #333; border-top-color: #e94560; border-radius: 50%; animation: spin .6s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Map */
  #map { flex: 1; }

  /* ===== POPUP ===== */
  .leaflet-popup-content-wrapper { background: #1a1a2e !important; color: #e0e0e0 !important; border: 1px solid #0f3460 !important; border-radius: 10px !important; }
  .leaflet-popup-tip { background: #1a1a2e !important; }
  .leaflet-popup-content { margin: 10px !important; }

  /* Popup carousel */
  .pcr { position: relative; width: 100%; height: 160px; border-radius: 6px; overflow: hidden; margin-bottom: 6px; background: #0d1525; }
  .pcr img { width: 100%; height: 100%; object-fit: cover; display: none; }
  .pcr img.vis { display: block; }
  .pcr-ph { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; color: #334; font-size: 32px; }
  .pcr-arr { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.5); color: #fff; border: none; width: 26px; height: 26px; border-radius: 50%; cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; z-index: 5; }
  .pcr-arr:hover { background: rgba(233,69,96,0.7); }
  .pcr-l { left: 4px; }
  .pcr-r { right: 4px; }
  .pcr-dots { position: absolute; bottom: 4px; left: 50%; transform: translateX(-50%); display: flex; gap: 3px; z-index: 5; }
  .pcr-dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,0.3); }
  .pcr-dot.on { background: #e94560; }
  .pcr-cnt { position: absolute; top: 6px; right: 6px; background: rgba(0,0,0,0.5); color: #fff; font-size: 9px; padding: 1px 6px; border-radius: 8px; z-index: 5; }
  .ptitle { font-size: 13px; font-weight: 700; margin-bottom: 2px; }
  .pcat { font-size: 9px; color: #889; margin-bottom: 4px; }
  .pdesc { font-size: 10px; line-height: 1.4; color: #bbb; margin-bottom: 4px; }
  .pwhy { font-size: 9px; color: #e94560; font-style: italic; margin-bottom: 4px; }
  .pwc { font-size: 9px; color: #27ae60; margin-bottom: 4px; }
  .pbtn { padding: 4px 10px; border: none; border-radius: 5px; cursor: pointer; font-size: 10px; }
  .pbtn-add { background: #e94560; color: #fff; }
  .pbtn-rm { background: #333; color: #aaa; }
  .pgmap { width: 100%; height: 120px; border: none; border-radius: 6px; margin-bottom: 6px; }
  .pgmap-btns { display: flex; gap: 4px; margin-bottom: 6px; }
  .pgmap-btn { flex: 1; padding: 5px; border: 1px solid #333; border-radius: 5px; background: #1a1a2e; color: #aab; font-size: 9px; cursor: pointer; text-align: center; text-decoration: none; display: block; }
  .pgmap-btn:hover { border-color: #e94560; color: #e94560; }
  .pgmap-btn.primary { background: #2a5fb5; border-color: #2a5fb5; color: #fff; }
  .pgmap-btn.primary:hover { background: #1a4fa5; }

  /* ===== LIGHTBOX ===== */
  #lightbox { display: none; position: fixed; inset: 0; z-index: 10000; background: rgba(0,0,0,0.92); align-items: center; justify-content: center; flex-direction: column; }
  #lightbox.open { display: flex; }
  #lb-close { position: absolute; top: 16px; right: 20px; background: none; border: none; color: #fff; font-size: 28px; cursor: pointer; z-index: 10001; }
  #lb-title { color: #e94560; font-size: 16px; font-weight: 700; margin-bottom: 10px; }
  #lb-wrap { position: relative; max-width: 90vw; max-height: 70vh; display: flex; align-items: center; justify-content: center; }
  #lb-img { max-width: 90vw; max-height: 70vh; border-radius: 8px; object-fit: contain; }
  .lb-arr { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(255,255,255,0.1); color: #fff; border: none; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; font-size: 20px; }
  .lb-arr:hover { background: rgba(233,69,96,0.5); }
  #lb-prev { left: -50px; }
  #lb-next { right: -50px; }
  #lb-dots { display: flex; gap: 4px; margin-top: 12px; }
  #lb-dots .dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,255,0.2); cursor: pointer; }
  #lb-dots .dot.on { background: #e94560; }
  #lb-counter { color: #556; font-size: 11px; margin-top: 6px; }

  /* Route suggestions */
  .rcard { padding: 10px 14px; border-bottom: 1px solid #0f3460; cursor: pointer; }
  .rcard:hover { background: rgba(255,255,255,0.03); }
  .rcard .rtitle { font-size: 13px; font-weight: 700; color: #e94560; margin-bottom: 3px; }
  .rcard .rsub { font-size: 10px; color: #889; margin-bottom: 4px; }
  .rcard .rdesc { font-size: 10px; color: #aab; line-height: 1.4; margin-bottom: 5px; }
  .rcard .rpros { list-style: none; padding: 0; }
  .rcard .rpros li { font-size: 9px; color: #27ae60; padding: 1px 0; }
  .rcard .rpros li::before { content: '+ '; font-weight: 700; }
  .rcard .rbtn { padding: 4px 10px; background: #e94560; color: #fff; border: none; border-radius: 4px; font-size: 10px; cursor: pointer; margin-top: 4px; }
  .rcard .rbtn:hover { background: #c73550; }

  /* Food info in popup */
  .pfood { background: rgba(243,156,18,0.08); border-radius: 5px; padding: 5px 8px; margin-bottom: 5px; }
  .pfood-title { font-size: 9px; color: #f39c12; font-weight: 600; margin-bottom: 2px; }
  .pfood-text { font-size: 9px; color: #aab; line-height: 1.3; }

  #list::-webkit-scrollbar { width: 5px; }
  #list::-webkit-scrollbar-track { background: #16213e; }
  #list::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }

  @media (max-width: 900px) {
    body { flex-direction: column; }
    #sidebar { width: 100%; min-width: unset; height: 50vh; }
    #map { height: 50vh; }
  }
</style>
</head>
<body>

<div id="sidebar">
  <div id="sidebar-header">
    <h1>Van-Trip Planner 2026</h1>
    <p id="hdr-sub">RO + BG + RS + MK | 3 Wochen</p>
  </div>
  <div id="filters"></div>
  <div id="controls">
    <label><input type="checkbox" id="wc-chk" onchange="render()"> Wild-Camping</label>
    <label><input type="checkbox" id="food-chk" onchange="render()"> Kulinarik</label>
    <input type="text" id="search" placeholder="Suchen..." oninput="renderList()">
  </div>
  <div id="tabs">
    <div class="tab on" data-t="all" onclick="setTab('all')">Alle <span id="n-all"></span></div>
    <div class="tab" data-t="sel" onclick="setTab('sel')">Route <span id="n-sel"></span></div>
    <div class="tab" data-t="routes" onclick="setTab('routes')">Vorschläge</div>
  </div>
  <div id="list"></div>
  <div id="summary">
    <div class="stats">
      <div class="st"><span class="v" id="s-n">0</span><span class="l"> Stops</span></div>
      <div class="st"><span class="v" id="s-km">-</span><span class="l"> km</span></div>
      <div class="st"><span class="v" id="s-h">-</span><span class="l"> Fahrzeit</span></div>
      <div class="st"><span class="v" id="s-ni">-</span><span class="l"> Nächte</span></div>
    </div>
    <div class="btns">
      <button class="ab ab1" onclick="exportRoute()">Google Maps</button>
      <button class="ab ab2" onclick="optimizeRoute()">Optimieren</button>
      <button class="ab ab2" onclick="fitRoute()">Zeig Route</button>
      <button class="ab ab2" onclick="clearRoute()">Leeren</button>
    </div>
  </div>
</div>
<div id="map"></div>

<!-- Lightbox -->
<div id="lightbox">
  <button id="lb-close" onclick="closeLB()">&times;</button>
  <div id="lb-title"></div>
  <div id="lb-wrap">
    <button class="lb-arr" id="lb-prev" onclick="lbNav(-1)">&#8249;</button>
    <img id="lb-img" src="">
    <button class="lb-arr" id="lb-next" onclick="lbNav(1)">&#8250;</button>
  </div>
  <div id="lb-dots"></div>
  <div id="lb-counter"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

// Multi-language Wikipedia for more diverse images
const WIKI_LANGS = ['en','de','ro','bg','sr','fr'];
async function fetchWikipediaImages() {
  for (const lang of WIKI_LANGS) {
    const titles = [...new Set(Object.values(WK))];
    for (let i = 0; i < titles.length; i += 50) {
      const batch = titles.slice(i, i + 50).map(t => encodeURIComponent(t)).join('|');
      try {
        const r = await fetch(`https://${lang}.wikipedia.org/w/api.php?action=query&titles=${batch}&prop=pageimages&format=json&pithumbsize=800&origin=*&redirects=1`);
        const d = await r.json();
        if (!d.query?.pages) continue;
        for (const p of Object.values(d.query.pages)) {
          if (!p.thumbnail?.source) continue;
          for (const [sid, wt] of Object.entries(WK)) {
            if (p.title.replace(/_/g,' ').toLowerCase() === wt.toLowerCase()) {
              if (!imgCache[sid]) imgCache[sid] = [];
              if (!imgCache[sid].includes(p.thumbnail.source)) imgCache[sid].push(p.thumbnail.source);
            }
          }
        }
      } catch(e) {}
    }
  }
}

async function fetchCommonsGeo(spots, radius=15000, limit=20) {
  for (let i = 0; i < spots.length; i += 3) {
    await Promise.all(spots.slice(i, i + 3).map(async s => {
      try {
        const r = await fetch(`https://commons.wikimedia.org/w/api.php?action=query&generator=geosearch&ggscoord=${s.lat}|${s.lng}&ggsradius=${radius}&ggslimit=${limit}&prop=imageinfo&iiprop=url|size&iiurlwidth=800&format=json&origin=*`);
        const d = await r.json();
        if (!d.query?.pages) return;
        const imgs = Object.values(d.query.pages)
          .filter(p => p.imageinfo?.[0]?.thumburl && !/\.svg|logo|icon|map|coat|flag|diagram|chart/i.test(p.title))
          .filter(p => { const ii=p.imageinfo[0]; return (ii.width||0)>400 && (ii.height||0)>300; }) // quality filter
          .sort((a,b) => {
            const ai=a.imageinfo[0], bi=b.imageinfo[0];
            return ((bi.width>bi.height?1:0)-(ai.width>ai.height?1:0)) || (bi.width||0)-(ai.width||0);
          });
        if (!imgCache[s.id]) imgCache[s.id] = [];
        for (const img of imgs.slice(0, 12)) {
          const url = img.imageinfo[0].thumburl;
          if (!imgCache[s.id].includes(url)) imgCache[s.id].push(url);
        }
      } catch(e) {}
    }));
  }
}

async function fetchCommonsSearch(spots) {
  for (let i = 0; i < spots.length; i += 2) {
    await Promise.all(spots.slice(i, i + 2).map(async s => {
      // Build multiple search queries
      const base = s.n.replace(/\s*\(.*?\)/g,'').trim();
      const queries = [base, ...(ALT_SEARCH[s.id] || [])];
      for (const q of queries) {
        if ((imgCache[s.id]?.length || 0) >= 10) break; // enough images
        try {
          const r = await fetch(`https://commons.wikimedia.org/w/api.php?action=query&generator=search&gsrsearch=${encodeURIComponent(q)}&gsrlimit=15&gsrnamespace=6&prop=imageinfo&iiprop=url|size&iiurlwidth=800&format=json&origin=*`);
          const d = await r.json();
          if (!d.query?.pages) continue;
          const imgs = Object.values(d.query.pages)
            .filter(p => p.imageinfo?.[0]?.thumburl && !/\.svg|logo|icon|map|coat|flag|diagram|chart/i.test(p.title))
            .filter(p => { const ii=p.imageinfo[0]; return (ii.width||0)>400; })
            .sort((a,b) => ((b.imageinfo[0].width>b.imageinfo[0].height?1:0)-(a.imageinfo[0].width>a.imageinfo[0].height?1:0)));
          if (!imgCache[s.id]) imgCache[s.id] = [];
          for (const img of imgs.slice(0, 8)) {
            const url = img.imageinfo[0].thumburl;
            if (!imgCache[s.id].includes(url)) imgCache[s.id].push(url);
          }
        } catch(e) {}
      }
    }));
  }
}

let lbImgs=[], lbIdx=0, lbName='';
function openLB(id) {
  const s = S.find(x=>x.id===id);
  if (!s) return;
  lbImgs = getImgs(id);
  if (!lbImgs.length) return;
  lbIdx = 0; lbName = s.n;
  showLB();
  document.getElementById('lightbox').classList.add('open');
}
function closeLB() { document.getElementById('lightbox').classList.remove('open'); }
function lbNav(d) { lbIdx = (lbIdx + d + lbImgs.length) % lbImgs.length; showLB(); }
function showLB() {
  document.getElementById('lb-title').textContent = lbName;
  document.getElementById('lb-img').src = lbImgs[lbIdx].replace(/\/\d+px-/, '/1200px-');
  document.getElementById('lb-counter').textContent = `${lbIdx+1} / ${lbImgs.length}`;
  document.getElementById('lb-dots').innerHTML = lbImgs.map((_,i) =>
    `<div class="dot ${i===lbIdx?'on':''}" onclick="lbIdx=${i};showLB()"></div>`
  ).join('');
}
document.addEventListener('keydown', e => {
  if (!document.getElementById('lightbox').classList.contains('open')) return;
  if (e.key==='Escape') closeLB();
  if (e.key==='ArrowRight') lbNav(1);
  if (e.key==='ArrowLeft') lbNav(-1);
});

let rAbort = null;
async function fetchRoute() {
  if (rAbort) rAbort.abort();
  rLines.forEach(l => map.removeLayer(l)); rLines = []; rLegs = [];
  const spots = sel.map(id => S.find(s => s.id === id)).filter(Boolean);
  if (spots.length < 2) { renderSummary(); renderList(); return; }
  rLoading = true; renderSummary();
  const ctrl = new AbortController(); rAbort = ctrl;
  try {
    const c = spots.map(s => `${s.lng},${s.lat}`).join(';');
    const r = await fetch(`https://router.project-osrm.org/route/v1/driving/${c}?overview=full&geometries=geojson&annotations=distance,duration`, { signal: ctrl.signal });
    const d = await r.json();
    if (d.code==='Ok' && d.routes?.[0]) {
      const rt = d.routes[0];
      const ll = rt.geometry.coordinates.map(c => [c[1], c[0]]);
      rLines.push(L.polyline(ll, { color: '#e94560', weight: 3, opacity: .7 }).addTo(map));
      rLines.push(L.polyline(ll, { color: '#e94560', weight: 8, opacity: .12 }).addTo(map));
      rt.legs?.forEach((l, i) => rLegs.push({ from: sel[i], to: sel[i+1], km: Math.round(l.distance/1000), min: Math.round(l.duration/60) }));
    }
  } catch(e) {}
  rLoading = false; renderSummary(); renderList();
}
let rTimer; function reqRoute() { clearTimeout(rTimer); rTimer = setTimeout(fetchRoute, 300); }

// Ensure Bonn is always start AND end
function ensureBonn() {
  if (sel[0] !== 'bonn') sel = sel.filter(x=>x!=='bonn');
  if (sel[0] !== 'bonn') sel.unshift('bonn');
  if (sel.length > 1 && sel[sel.length-1] !== 'bonn') sel.push('bonn');
}

// Round-trip: always Bonn → ... → Bonn
function optimizeRoute() {
  if (sel.length < 3) return;
  // Remove all bonn entries, we'll add them back
  let ids = sel.filter(x => x !== 'bonn');
  const pts = ids.map(id => S.find(s=>s.id===id)).filter(Boolean);
  if (!pts.length) return;

  const home = S.find(s=>s.id==='bonn');
  // Start from spot nearest to Bonn
  pts.sort((a,b) => hav(home.lat,home.lng,a.lat,a.lng) - hav(home.lat,home.lng,b.lat,b.lng));

  const rem = [...pts];
  const ord = [rem.shift()];
  while (rem.length > 0) {
    const last = ord[ord.length-1]; let bi=0, bd=Infinity;
    if (rem.length === 1) { ord.push(rem.pop()); break; }
    rem.forEach((r,i) => {
      let d = hav(last.lat,last.lng,r.lat,r.lng);
      // Bias last spots toward home
      if (rem.length <= 3) d += hav(r.lat,r.lng,home.lat,home.lng) * 0.3;
      if (d<bd){bd=d;bi=i;}
    });
    ord.push(rem.splice(bi,1)[0]);
  }
  sel = ['bonn', ...ord.map(s=>s.id), 'bonn'];
  localStorage.setItem('vt-sel', JSON.stringify(sel)); render();
}

// Smart insert: find optimal position (skip bonn anchors)
function smartInsert(id) {
  if (id === 'bonn') return; // don't double-add bonn
  // Ensure bonn bookends
  const inner = sel.filter(x => x !== 'bonn');
  if (inner.length < 2) {
    inner.push(id);
  } else {
    const newSpot = S.find(s=>s.id===id);
    if (!newSpot) { inner.push(id); }
    else {
      let bestIdx = inner.length, bestCost = Infinity;
      for (let i = 0; i <= inner.length; i++) {
        const prev = i > 0 ? S.find(s=>s.id===inner[i-1]) : S.find(s=>s.id==='bonn');
        const next = i < inner.length ? S.find(s=>s.id===inner[i]) : S.find(s=>s.id==='bonn');
        let cost = 0;
        if (prev) cost += hav(prev.lat,prev.lng,newSpot.lat,newSpot.lng);
        if (next) cost += hav(newSpot.lat,newSpot.lng,next.lat,next.lng);
        if (prev && next) cost -= hav(prev.lat,prev.lng,next.lat,next.lng);
        if (cost < bestCost) { bestCost = cost; bestIdx = i; }
      }
      inner.splice(bestIdx, 0, id);
    }
  }
  sel = ['bonn', ...inner, 'bonn'];
}
function hav(a,b,c,d) { const R=6371,dLa=(c-a)*Math.PI/180,dLo=(d-b)*Math.PI/180; const x=Math.sin(dLa/2)**2+Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(dLo/2)**2; return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x)); }
function fitRoute() { const pts=sel.map(id=>S.find(s=>s.id===id)).filter(Boolean); if(pts.length) map.fitBounds(L.latLngBounds(pts.map(s=>[s.lat,s.lng])),{padding:[40,40]}); }

function mkIcon(cat, isSel, num) {
  if (isSel && num!=null) return L.divIcon({className:'',html:`<div style="width:22px;height:22px;border-radius:50%;line-height:22px;text-align:center;background:#e94560;color:#fff;font-size:10px;font-weight:700;border:2px solid #fff;box-shadow:0 0 6px #e94560">${num}</div>`,iconSize:[22,22],iconAnchor:[11,11]});
  const cl=CAT[cat]?.c||'#888';
  return L.divIcon({className:'',html:`<div style="width:10px;height:10px;border-radius:50%;background:${cl};border:2px solid rgba(255,255,255,.4);box-shadow:0 0 4px ${cl}"></div>`,iconSize:[10,10],iconAnchor:[5,5]});
}

function isSel(id) { return sel.includes(id); }
function toggle(id) {
  if (id === 'bonn') return; // bonn is always auto-managed
  if (isSel(id)) { sel=sel.filter(x=>x!==id); }
  else { smartInsert(id); }
  // Ensure bonn bookends when route has spots
  const inner = sel.filter(x=>x!=='bonn');
  sel = inner.length ? ['bonn', ...inner, 'bonn'] : [];
  localStorage.setItem('vt-sel',JSON.stringify(sel)); render();
}
function mv(id,d) { const i=sel.indexOf(id),n=i+d; if(i<0||n<0||n>=sel.length)return; [sel[i],sel[n]]=[sel[n],sel[i]]; localStorage.setItem('vt-sel',JSON.stringify(sel)); render(); }
function clearRoute() { sel=[]; localStorage.setItem('vt-sel','[]'); render(); }
function setTab(t) { tab=t; document.querySelectorAll('.tab').forEach(e=>e.classList.toggle('on',e.dataset.t===t)); renderList(); }
function render() { renderFilters(); renderList(); renderMarkers(); reqRoute(); updCounts(); }

function loadRoute(idx) {
  const ids = ROUTES[idx].ids.filter(x=>x!=='bonn');
  sel = ['bonn', ...ids, 'bonn'];
  localStorage.setItem('vt-sel', JSON.stringify(sel));
  optimizeRoute();
  setTab('sel');
  render();
  setTimeout(fitRoute, 500);
}
function previewRoute(idx) {
  const ids = ROUTES[idx].ids;
  const pts = ids.map(id => S.find(s=>s.id===id)).filter(Boolean);
  if (pts.length) map.fitBounds(L.latLngBounds(pts.map(s=>[s.lat,s.lng])),{padding:[40,40]});
}
function updCounts() { document.getElementById('n-sel').textContent=sel.length?`(${sel.length})`:''; document.getElementById('n-all').textContent=`(${S.length})`; }

function renderFilters() {
  document.getElementById('filters').innerHTML = Object.entries(CAT).map(([k,c]) =>
    `<button class="fbtn ${filt.has(k)?'on':''}" style="--c:${c.c}" onclick="filt.has('${k}')?filt.delete('${k}'):filt.add('${k}');render()">${c.i} ${c.l}</button>`
  ).join('');
}

function visible() {
  const wc = document.getElementById('wc-chk').checked;
  const foodOnly = document.getElementById('food-chk').checked;
  const q = document.getElementById('search').value.toLowerCase().trim();
  let list = S.filter(s => filt.has(s.cat));
  if (wc) list = list.filter(s => s.wc);
  if (foodOnly) list = list.filter(s => FOOD[s.id]);
  if (q) list = list.filter(s => s.n.toLowerCase().includes(q) || s.co.toLowerCase().includes(q) || s.d.toLowerCase().includes(q) || s.t.some(t=>t.toLowerCase().includes(q)));
  if (tab==='sel') return sel.map(id => list.find(s=>s.id===id)).filter(Boolean);
  return list;
}

function fmtDur(m) { const h=Math.floor(m/60); return h?`${h}h${m%60>0?' '+m%60+'m':''}`:m+'m'; }

// ============================================================
// POPUP CAROUSEL BUILDER
// ============================================================
function popupCarousel(id) {
  const imgs = getImgs(id);
  if (!imgs.length) return `<div class="pcr"><div class="pcr-ph">${CAT[S.find(s=>s.id===id)?.cat]?.i||''}</div></div>`;
  const uid = 'cr_'+id;
  const imgTags = imgs.map((u,i) => `<img src="${u}" class="${i===0?'vis':''}" data-i="${i}">`).join('');
  const dots = imgs.length > 1 ? `<div class="pcr-dots">${imgs.map((_,i)=>`<div class="pcr-dot ${i===0?'on':''}" data-i="${i}"></div>`).join('')}</div>` : '';
  const arrows = imgs.length > 1 ? `<button class="pcr-arr pcr-l" onclick="crNav('${uid}',-1)">&#8249;</button><button class="pcr-arr pcr-r" onclick="crNav('${uid}',1)">&#8250;</button>` : '';
  const cnt = imgs.length > 1 ? `<div class="pcr-cnt">${imgs.length} Fotos</div>` : '';
  return `<div class="pcr" id="${uid}" data-idx="0" onclick="openLB('${id}')" style="cursor:pointer">${imgTags}${arrows}${dots}${cnt}</div>`;
}
function crNav(uid, dir) {
  event.stopPropagation();
  const el = document.getElementById(uid);
  if (!el) return;
  const imgs = el.querySelectorAll('img');
  const dots = el.querySelectorAll('.pcr-dot');
  let idx = parseInt(el.dataset.idx) || 0;
  imgs[idx]?.classList.remove('vis');
  dots[idx]?.classList.remove('on');
  idx = (idx + dir + imgs.length) % imgs.length;
  imgs[idx]?.classList.add('vis');
  dots[idx]?.classList.add('on');
  el.dataset.idx = idx;
}

// ============================================================
function renderList() {
  const el = document.getElementById('list');

  // Route suggestions tab
  if (tab === 'routes') {
    el.innerHTML = '<div style="padding:8px 14px;font-size:10px;color:#556">5 Routen ab/bis Bonn. Jede mit Kulinarik- und Abenteuer-Highlights.</div>' +
      ROUTES.map((r,i) => `<div class="rcard">
        <div class="rtitle">${i+1}. ${r.name}</div>
        <div class="rsub">${r.sub} · ${r.ids.length} Stops</div>
        <div class="rdesc">${r.desc}</div>
        <ul class="rpros">${r.pros.map(p=>`<li>${p}</li>`).join('')}</ul>
        <button class="rbtn" onclick="loadRoute(${i})">Route laden</button>
        <button class="rbtn" style="background:#333;margin-left:4px" onclick="previewRoute(${i})">Vorschau</button>
      </div>`).join('');
    return;
  }

  const spots = visible();
  if (!spots.length) { el.innerHTML=`<div style="padding:30px;text-align:center;color:#445;font-size:11px">${tab==='sel'?'Keine Spots in Route.':'Keine Treffer.'}</div>`; return; }
  let h = '';
  spots.forEach((s,i) => {
    const on = isSel(s.id);
    const ri = sel.indexOf(s.id);
    if (tab==='sel' && i>0) {
      const leg = rLegs.find(l=>l.from===sel[ri-1]&&l.to===s.id);
      if (leg) h += `<div class="leg"><b>${leg.km} km</b> · ${fmtDur(leg.min)}</div>`;
      else if (rLoading) h += `<div class="leg">berechne...</div>`;
    }
    const thumb = getThumb(s.id);
    const imgEl = thumb
      ? `<img class="card-img" src="${thumb}" alt="" onerror="this.className='card-img-ph';this.innerHTML='${CAT[s.cat]?.i||''}';">`
      : `<div class="card-img-ph">${CAT[s.cat]?.i||''}</div>`;
    const imgCount = getImgs(s.id).length;
    const wcTag = s.wc ? '<span class="tg wc">WC</span>' : '';
    const foodTag = FOOD[s.id] ? '<span class="tg" style="background:rgba(243,156,18,.12);color:#f39c12">\u{1F37D}</span>' : '';
    const routeBtn = s.id==='bonn' ? '' : `<button class="card-route-btn ${on?'on-route':''}" onclick="event.stopPropagation();toggle('${s.id}')" title="${on?'Von Route entfernen':'Zur Route'}">${on?'\u2713':'+'}</button>`;
    h += `<div class="card ${on?'sel':''}" onclick="flyTo('${s.id}')">
      ${on?`<div class="rn">${ri+1}</div>`:''}
      <div class="card-body">
        <div class="nm">${CAT[s.cat]?.i||''} ${s.n}</div>
        <div class="sub">${s.co} · ${s.ni} N${imgCount>1?' · '+imgCount+' Fotos':''}</div>
        <div class="ds">${s.d}</div>
        <div class="tgs">${foodTag}${wcTag}${s.t.slice(0,4).map(t=>`<span class="tg">${t}</span>`).join('')}</div>
      </div>
      ${imgEl}
      ${tab==='sel'&&on?`<div class="mvs" onclick="event.stopPropagation()"><button class="mv" onclick="mv('${s.id}',-1)">&#9650;</button><button class="mv" onclick="mv('${s.id}',1)">&#9660;</button></div>`:routeBtn}
    </div>`;
  });
  el.innerHTML = h;
}

function renderMarkers() {
  Object.values(markers).forEach(m=>map.removeLayer(m)); markers={};
  const wc=document.getElementById('wc-chk').checked;
  const foodOnly=document.getElementById('food-chk').checked;
  S.forEach(s => {
    if (!filt.has(s.cat)) return;
    if (wc && !s.wc) return;
    if (foodOnly && !FOOD[s.id]) return;
    const on = isSel(s.id);
    const ri = on ? sel.indexOf(s.id) : null;
    const m = L.marker([s.lat,s.lng],{icon:mkIcon(s.cat,on,ri!=null?ri+1:null),zIndexOffset:on?1000:0}).addTo(map);
    const wcLine = s.wc ? '<div class="pwc">\u2705 Wild Camping möglich</div>' : '';
    const food = FOOD[s.id];
    const foodHtml = food ? `<div class="pfood"><div class="pfood-title">\u{1F37D} ${food.title}</div><div class="pfood-text">${food.text}</div></div>` : '';
    const tagsHtml = s.t.map(t => `<span style="display:inline-block;font-size:9px;padding:1px 6px;border-radius:8px;background:rgba(255,255,255,.06);color:#889;margin:1px 2px">${t}</span>`).join('');
    const gq = encodeURIComponent(s.n.replace(/\s*\(.*?\)/g,'').trim());
    const gmapEmbed = `<iframe class="pgmap" src="https://maps.google.com/maps?q=${gq}&t=k&z=14&ie=UTF8&iwloc=&output=embed" loading="lazy"></iframe>`;
    const gmapBtns = `<div class="pgmap-btns">
      <a class="pgmap-btn primary" href="https://www.google.com/maps/search/${gq}/@${s.lat},${s.lng},15z" target="_blank">\u{1F4F7} Google Fotos</a>
      <a class="pgmap-btn" href="https://www.google.com/maps/dir//${s.lat},${s.lng}" target="_blank">\u{1F697} Navigation</a>
    </div>`;
    m.bindPopup(`
      ${popupCarousel(s.id)}
      <div class="ptitle">${CAT[s.cat]?.i||''} ${s.n}</div>
      <div class="pcat">${s.co} · ${CAT[s.cat]?.l} · ${s.ni} Nächte empfohlen</div>
      <div class="pdesc">${s.d}</div>
      <div class="pwhy">${s.w}</div>
      ${wcLine}
      ${foodHtml}
      <div style="margin:4px 0">${tagsHtml}</div>
      ${gmapEmbed}
      ${gmapBtns}
      <button class="pbtn ${on?'pbtn-rm':'pbtn-add'}" onclick="toggle('${s.id}');renderMarkers()" style="margin-top:4px;width:100%">${on?'\u2715 Von Route entfernen':'\u2713 Zur Route hinzufügen'}</button>
    `, {maxWidth:360, minWidth:300});
    markers[s.id] = m;
  });
}

function renderSummary() {
  const pts=sel.map(id=>S.find(s=>s.id===id)).filter(Boolean);
  document.getElementById('s-n').textContent=pts.length;
  if (rLoading) { document.getElementById('s-km').innerHTML='<span class="sp"></span>'; document.getElementById('s-h').innerHTML='<span class="sp"></span>'; }
  else if (rLegs.length) { document.getElementById('s-km').textContent=rLegs.reduce((a,l)=>a+l.km,0).toLocaleString('de'); document.getElementById('s-h').textContent=fmtDur(rLegs.reduce((a,l)=>a+l.min,0)); }
  else { document.getElementById('s-km').textContent='-'; document.getElementById('s-h').textContent='-'; }
  let ni=0; pts.forEach(s=>{const p=s.ni.toString().split('-');ni+=parseFloat(p[p.length-1])||1;});
  document.getElementById('s-ni').textContent=pts.length?`~${Math.round(ni)}`:'-';
}

function flyTo(id) { const s=S.find(x=>x.id===id); if(s){map.flyTo([s.lat,s.lng],10,{duration:.8}); markers[id]?.openPopup();} }
function exportRoute() {
  const pts=sel.map(id=>S.find(s=>s.id===id)).filter(Boolean);
  if(!pts.length) return alert('Erst Spots auswählen!');
  window.open('https://www.google.com/maps/dir/'+pts.map(s=>`${s.lat},${s.lng}`).join('/'),'_blank');
}

// ============================================================
// IMAGE LOAD ORCHESTRATOR (Wikimedia multi-source)
// ============================================================
async function startImageLoad() {
  const sub = document.getElementById('hdr-sub');
  const orig = 'RO + BG + RS + MK | 3 Wochen';

  sub.textContent = 'Bilder: Wikipedia (6 Sprachen)...';
  await fetchWikipediaImages(); save();

  sub.textContent = 'Bilder: Commons Kategorien...';
  await fetchCommonsCategories(); save();

  sub.textContent = 'Bilder: Geo-Suche...';
  await fetchCommonsGeo(S, 15000, 20); save();

  const thin = S.filter(s => (imgCache[s.id]?.length || 0) < 4);
  if (thin.length) {
    sub.textContent = `Bilder: Textsuche (${thin.length} Spots)...`;
    await fetchCommonsSearch(thin); save();
  }

  const thin2 = S.filter(s => (imgCache[s.id]?.length || 0) < 2);
  if (thin2.length) {
    sub.textContent = `Bilder: erweitert (${thin2.length} Spots)...`;
    await fetchCommonsGeo(thin2, 25000, 20); save();
    await fetchCommonsSearch(thin2); save();
  }

  const total = S.reduce((a,s) => a + (imgCache[s.id]?.length||0), 0);
  const ok = S.filter(s => imgCache[s.id]?.length).length;
  sub.textContent = `${orig} \u00b7 ${total} Fotos / ${ok} Spots + Google Maps`;
}

render();
startImageLoad();
