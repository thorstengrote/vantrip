let WILDLIFE = {
'transfagarasan': 'Auf den Almwiesen über 2000m grasen Gämsen, Adler kreisen über den Graten und mit Glück entdeckt man Murmeltiere zwischen den Felsen. In den Wäldern unterhalb leben Braunbären und Wölfe – Begegnungen auf der Passstrasse selbst sind aber praktisch ausgeschlossen. Achtung Zecken in den Wiesen bis ~1800m: abends Körper absuchen.',
'piatra-craiului': 'Der Kalksteingrat ist Lebensraum von Gämsen, die man morgens auf den Felsrippen gut beobachten kann, dazu Steinadler und seltene Schmetterlinge (Apollo-Falter). In den Buchenwäldern darunter leben Bären, Luchse und Spechte – Bären sind scheu und meiden Menschen, Essen im Van verschließen reicht.',
'retezat': 'Der wildeste Nationalpark Rumäniens beherbergt Braunbären, Wölfe, Luchse und Gämsen – die höchste Dichte großer Raubtiere in Europa. An den 80+ Gletscherseen trifft man Bergmolche und mit Glück den seltenen Karpatenskorpion (harmlos). Kreuzottern sonnen sich auf Steinen am Wegrand – Abstand halten reicht, sie flüchten von selbst.',
'padis': 'Das Karstplateau ist ein Paradies für Höhlentiere: Fledermäuse, Höhlenspinnen und in den unterirdischen Bächen der seltene Grottenolm. Oberirdisch jagen Uhus in der Dämmerung über die Wiesen, und Hirsche röhren im Herbst durch die Wälder.',
'scarisoara': 'Die uralten Buchen- und Tannenwälder der Apuseni sind Heimat von Schwarzspechten, Haselhühnern und scheuen Wildkatzen. Rund um die Eishöhle flattern nachts zahlreiche Fledermausarten. Im Unterholz wachsen Bärlauch, Arnika und wilde Orchideen.',
'cheile-nerei': 'Die Nera-Klamm ist eines der artenreichsten Gebiete Rumäniens: Eisvögel jagen über den türkisen Pools, Wasseramseln tauchen in der Strömung. In den Kalkwänden nisten Wanderfalken und Uhus. Europäische Sumpfschildkröten schwimmen in den ruhigen Becken.',
'olt-valley': 'Das Olt-Tal ist Durchzugsgebiet für Greifvögel – Wespenbussarde, Schlangenadler und Turmfalken kreisen über den Felsformationen. In den Büschen am Fluss leben Fasane, Pirole und der farbenfrohe Bienenfresser.',
'cerna-valley': 'Durch das warme Mikroklima wachsen hier mediterrane Pflanzen wie Feigen und Judasbaum mitten in den Karpaten. Smaragdeidechsen, Griechische Landschildkröten und sogar winzige (harmlose) Skorpione fühlen sich im milden Klima wohl.',
'valea-stan': 'In diesem wilden Tal nahe dem Făgăraș-Massiv leben Braunbären, Wölfe und Luchse – alle drei großen europäischen Raubtiere. An den Bachufern jagen Wasseramseln und Gebirgsstelzen. Kreuzottern in höheren Lagen – festes Schuhwerk reicht.',
'7-scari': 'In der Schlucht nahe Brașov nisten Mauerläufer und Felsenschwalben in den steilen Kalkwänden. Gämsen klettern gelegentlich in den oberen Felspartien, und Smaragdeidechsen nutzen die sonnenbeschienenen Felsbänder.',
'viscri': 'Die extensiv bewirtschafteten Weiden rund um Viscri gehören zu den artenreichsten Wiesen Europas: über 50 Pflanzenarten pro Quadratmeter, darunter wilde Orchideen. Wiedehopfe, Neuntöter und Weißstörche sind allgegenwärtig.',
'cheile-rametului': 'Die Kalksteinschlucht beherbergt Wanderfalken, Uhus und Felsenkleiber in den hohen Wänden. Am Bachgrund leben Flusskrebse und Bachforellen in erstaunlich klarem Wasser.',
'rhodope': 'Die riesigen Rhodopen sind eines der wildesten Gebiete Europas: hier leben noch Wölfe, vereinzelt Bären und die seltene Griechische Landschildkröte. Geier, Adler und Bussarde kreisen über den endlosen Bergwäldern.',
'trigrad-gorge': 'In der 300m tiefen Schlucht nisten Gänsegeier und Felsentauben, die Höhle beherbergt große Fledermauskolonien. Mauerläufer klettern akrobatisch an den senkrechten Felswänden – ein Highlight für Vogelbeobachter.',
'buinovsko': 'Die Schlucht ist Lebensraum von Wasseramseln, Eisvögeln und Ringdrosseln. In den Pools tummeln sich Bachforellen und Feuersalamander. Griechische Landschildkröten wandern gemächlich durch das Unterholz.',
'shiroka-laka': 'Am Fluss bei Shiroka Laka hört man nachts den Ruf des Waldkauzes, tagsüber jagen Gebirgsstelzen am Wasser. In den umliegenden Wäldern leben Rehe, Dachse und mit viel Glück der scheue Balkanluchs.',
'belogradchik': 'Zwischen den bizarren Sandsteintürmen nisten Turmfalken, Dohlen und Alpensegler. Scheltopusik (beinlose Rieseneidechse, sieht aus wie eine Schlange, ist aber völlig harmlos) bewohnen die warmen Felspartien.',
'devetashka': 'Die riesige Höhle beherbergt über 30.000 Fledermäuse – eines der wichtigsten Fledermausquartiere Europas. Im Sommer fliegen sie in dichten Schwärmen bei Sonnenuntergang aus: ein spektakuläres Naturschauspiel.',
'pirin': 'Hochalpine Gämsen, Steinadler und uralte Schlangenhaut-Kiefern (über 1000 Jahre alt!) machen den Pirin besonders. Griechische Landschildkröten bewohnen die wärmeren Tieflagen – im Pirin trifft Mittelmeer auf Hochgebirge.',
'mogilitsa-arda': 'An den Granitfelsen der Arda sonnen sich Smaragdeidechsen, im Fluss schwimmen Döbel und Barben. Bienenfresser in leuchtenden Farben jagen Libellen über dem Wasser – einer der schönsten Vögel Europas.',
'madzharovo-arda': 'Madzharovo ist DIE Adresse für Geier in Europa: Gänsegeier, Schmutzgeier und der riesige Mönchsgeier (Spannweite bis 3m!) nisten in den Felswänden. Ein Beobachtungsposten mit Teleskopen wird von Naturschützern betrieben.',
'krushuna': 'Die Wasserfälle sind umgeben von üppigem Mischwald mit Pirolen, Nachtigallen und Kleibern. Feuersalamander kriechen nach Regen über die bemoosten Steine, und Blauflügel-Prachtlibellen tanzen über den Kaskaden.',
'wonderful-bridges': 'Unter den gewaltigen Natursteinbrücken nisten Felsenschwalben und Mauerläufer. Der umgebende Nadelwald beherbergt Schwarzspechte, Kreuzschnäbel und das scheue Haselhuhn.',
'yagodina-cave': 'Die Höhle ist Winterquartier für mehrere Fledermausarten, darunter die seltene Langflügelfledermaus. Die feuchten Karstwiesen beherbergen seltene Orchideen und fleischfressende Fettkrautarten.',
'tara-serbia': 'Einer der letzten Bären-Hotspots Serbiens – in den dichten Wäldern leben auch Wölfe, Luchse und Auerhühner. Bären sind scheu und meiden Menschen, Essen im Van verschließen reicht. Die Drina-Schlucht beheimatet die seltene Serbische Fichte (Picea omorika).',
'uvac-canyon': 'Die Mäander des Uvac sind Heimat der größten Gänsegeier-Kolonie Serbiens – über 200 Paare nisten in den Felswänden. Per Boot oder von den Aussichtspunkten kann man die riesigen Vögel beim Kreisen beobachten.',
'sicevac': 'Die Schlucht ist berühmt für ihre Eisvögel, die wie blaue Blitze über das Wasser schießen. Wanderfalken und Uhus nisten in den hohen Kalkwänden, Smaragdeidechsen bewohnen die sonnigen Felspartien.',
'drina-bajina': 'Am smaragdgrünen Drina-Ufer jagen Eisvögel und Wasseramseln, Ringnattern schwimmen elegant zwischen den glatten Steinen. In den Uferwäldern leben Pirole und der farbenfrohe Bienenfresser.',
'vrelo-river': 'Die tiefblaue Karstquelle beherbergt Bachforellen in kristallklarem Wasser – man sieht sie vom Ufer aus. Gebirgsstelzen wippen am Quellrand, im moosigen Buchenwald leben Schwarzspechte und Siebenschläfer.',
'gostilje': 'Im Buchenwald rund um den Wasserfall leben Feuersalamander, die nach Regen über bemooste Steine wandern. Schwarzspechte trommeln in den alten Buchen, und Orchideen blühen am Waldboden.',
'erma-gorge': 'Die Grenzschlucht ist Lebensraum von Wasseramseln, Eisvögeln und Felsenkleinbern. Ringnattern und Würfelnattern (beide ungiftig) jagen Frösche in den Tümpeln am Wegrand.',
'ohrid': 'Der Ohrid-See ist einer der ältesten Seen der Welt mit über 200 endemischen Arten – die berühmte Ohrid-Forelle und der Ohrid-Aal leben nur hier. In den umliegenden Bergen lebt der vom Aussterben bedrohte Balkanluchs – mit geschätzt nur 40 Tieren weltweit.',
'mavrovo': 'Der Mavrovo-Nationalpark ist das letzte gesicherte Revier des Balkanluchses – ein Geisterbild, das kaum jemand je zu sehen bekommt. Steinadler und Schlangenadler kreisen über den Bergwiesen. In den klaren Bächen leben Bachforellen und Feuersalamander.',
'matka-canyon': 'In der Matka-Schlucht lebt die endemische Höhlenspinne, die Unterwasserhöhlen beherbergen einzigartige Krebstiere. Gänsegeier und Schmutzgeier nisten in den Felswänden über dem smaragdgrünen Stausee.',
'prespa-lake': 'Der Prespa-See ist eines der wichtigsten Vogelschutzgebiete Europas: Krauskopf-Pelikane (über 1000 Paare!) und Flamingos rasten hier in großen Schwärmen. Ein Fernglas ist Pflicht.',
'rugova-gorge': 'In den steilen Felswänden nisten Steinadler, Wanderfalken und Alpendohlen. Gämsen klettern in den oberen Partien, und in den Wäldern am Schluchtrand leben Braunbären und Wölfe.',
'meteora': 'Auf den Sandsteintürmen nisten Gänsegeier, Wanderfalken und Rötelfalken – die Thermik ist perfekt für Greifvögel. Griechische Landschildkröten wandern gemächlich durch das Buschland am Fuß der Felsen.',
'sithonia': 'Die Pinienwälder reichen bis ans türkise Wasser, in dem Zackenbarsche, Muränen und Oktopusse leben. Mönchsrobben (unter 700 weltweit) nutzen abgelegene Küstenhöhlen, Delfine zeigen sich regelmäßig in der Bucht.',
'olympus-coast': 'Am Fuß des Olymp trifft Hochgebirge auf Mittelmeer: Gämsen leben oben, Meeresschildkröten (Caretta caretta) nisten an bestimmten Stränden unten. Steinadler kreisen über den Schluchten.',
'ulcinj': 'Der Velika Plaža und die angrenzende Saline sind ein Vogelparadies: Flamingos, Pelikane, Stelzenläufer und Säbelschnäbler rasten hier. Im Meer schwimmen Meeresschildkröten und Delfine.',
'porto-palermo': 'In den klaren Buchten leben Oktopusse, Seeigel und farbenfrohe Lippfische. Delfine ziehen regelmäßig vorbei. Die Macchia-Hänge duften nach Salbei, Thymian und Oregano – wild wachsende Kräuter zum Pflücken.',
};

const WILDLIFE_IBERIA = {
'douro-valley': 'Das Douro-Tal beherbergt Blauelstern, Wiedehopfe und Bienenfresser zwischen den Rebstöcken. Im Fluss leben Otter, und mit etwas Glück sieht man Schmutzgeier über den Granitklippen kreisen.',
'serra-estrela': 'Portugals höchstes Gebirge ist Heimat von Steinadlern, Wildkatzen und verschiedenen Eidechsenarten. Die Hochebenen bedecken endemische Pflanzen, im Frühling blühen Narzissen und Orchideen. Hier lebt auch der Serra-da-Estrela-Hirtenhund, eine der ältesten Hunderassen Europas.',
'peniche': 'Die Klippen sind Brutplatz für Wanderfalken, Kormorane und Möwen. Regelmäßig Große Tümmler im Wasser, mit Glück Meeresschildkröten. Seeigel auf Felsen: Badeschuhe tragen, Stachel mit Essig einweichen wenn man reintritt.',
'berlengas': 'Die Inseln sind ein Naturreservat mit einer der größten Seevogelkolonien Portugals – Sturmtaucher, Basstölpel und die seltene Berlengas-Mauereidechse. Die Gewässer beherbergen Muränen, Kraken und farbenprächtige Anemonen.',
'ericeira': 'Entlang der Klippen nisten Turmfalken und Silbermöwen, in den Felspools findet man Seesterne und Krabben. Delfine ziehen regelmäßig an der Küste vorbei. Seeigel auf den Felsen – Badeschuhe tragen.',
'sintra': 'Die Nebelwälder beherbergen riesige Baumfarne, jahrhundertealte Mammutbäume und endemische Moose. Buntspechte, Zaunkönige und der scheue Feuersalamander leben hier. Nachts sind Waldkäuze zu hören, und Ginsterkatzen huschen durchs Unterholz.',
'comporta': 'Comporta ist das Storchenparadies Portugals – dutzende Weißstörche nisten auf Strommasten direkt an den Reisfeldern. In den Lagunen leben Flamingos, Löffler und Stelzenläufer. Fantastisch für Vogelbeobachtung direkt vom Van aus.',
'aljezur': 'Die Costa Vicentina ist einer der besterhaltenen Küstenabschnitte Europas mit Fischottern und Weißstörchen, die einzigartig auf Meeresklippen nisten. Wanderfalken und Alpenkrähen brüten in den Felswänden. Portugiesische Galeere (selten): am Strand liegen lassen, nicht anfassen.',
'carrapateira': 'Die Steilklippen sind Lebensraum für Alpenkrähen, Blaumerlen und Wanderfalken. Im Feuchtgebiet hinter dem Strand rasten Zugvögel. Die Felspools am Praia do Amado sind kleine Ökosysteme mit Garnelen, Krabben und Anemonen.',
'sagres': 'Sagres ist einer der wichtigsten Vogelzug-Hotspots Europas – im Herbst ziehen tausende Greifvögel und Störche übers Kap. Wanderfalken brüten in den 60m-Klippen. Im Oktober versammeln sich Vogelbeobachter aus ganz Europa hier.',
'lagos': 'Die goldenen Klippen beherbergen nistende Mauersegler, Dohlen und Turmfalken. Bei Bootstouren sieht man oft Delfine, und in den geschützten Buchten lebt eine bunte Unterwasserwelt mit Lippfischen und Kraken. Seeigel: Badeschuhe tragen.',
'benagil': 'Die Grotten sind Lebensraum für Kraken, Muränen und Schwärme von Goldbrassen. Beim Schnorcheln sieht man Seesterne und Nacktschnecken, Delfine begleiten regelmäßig die Boote. Muränen in Felsspalten sind harmlos, solange man nicht in Löcher greift.',
'tarifa': 'Tarifa ist DER Hotspot für Wildtierbeobachtung in Südeuropa – Orcas, Pilotwale und große Delfinschulen ziehen durch die Meerenge von Gibraltar. Im Herbst überqueren Millionen Zugvögel die Straße. Eine der wenigen Stellen wo man Afrika sieht und gleichzeitig Wale beobachten kann.',
'bolonia': 'Die Wanderdüne beherbergt Chamäleons – eine der wenigen europäischen Populationen. In den Pinienwäldern leben Stieglitze und Wiedehopfe. Im Flachwasser Seeanemonen und Einsiedlerkrebse.',
'ronda': 'Die Schlucht El Tajo ist Heimat einer großen Gänsegeierkolonie – die Vögel kreisen täglich über der Stadt. Daneben brüten Wanderfalken, Uhu und Alpenkrähen. Abends kann man die Geier beim Einflug von der Brücke beobachten.',
'caminito-del-rey': 'Gänsegeier segeln auf Augenhöhe am Klettersteig vorbei, Wanderfalken und Uhus nisten in den Wänden. In den Felsspalten lebt der seltene Iberische Steinbock. Das smaragdgrüne Wasser beherbergt Barben und Forellen.',
'nerja': 'Die Höhlen beherbergen die seltene Langflügelfledermaus, an den Klippen des Cerro Gordo brüten Wanderfalken. Die Meeresschutzzone ist Heimat von Zackenbarschen und Kraken. Seeigel: Badeschuhe tragen, Stachel mit Essig einweichen.',
'cabo-de-gata': 'Europas einzige echte Wüste am Meer – endemische Zwergpalmen, Agaven und der Dragoncillo del Cabo de Gata der nur hier wächst. Flamingos rasten in den Salinen, in den Gewässern leben Seepferdchen. Eine Landschaft wie aus einem anderen Kontinent.',
'mundaka': 'Das Biosphärenreservat Urdaibai ist eines der wichtigsten Feuchtgebiete Nordspaniens mit Löfflern, Fischadlern und Seidenreihern. In den Eichenwäldern leben Europäische Nerze (eine der seltensten Säugetierarten Europas) und Baummarder.',
'gaztelugatxe': 'Die Felseninsel ist Brutplatz für Kormorane, Silbermöwen und Sturmschwalben. In den Gewässern leben Große Tümmler, im Herbst ziehen Basstölpel an der Küste entlang.',
'picos-de-europa': 'In den Picos kehrt der Braunbär zurück – die kantabrische Population wächst stetig. Gämsen klettern an den Kalksteinwänden, in den Wäldern lebt das extrem seltene Kantabrische Auerhuhn. Bei Bärenbegegnung (sehr unwahrscheinlich): ruhig bleiben, langsam zurückziehen.',
'llanes': 'Delfine und gelegentlich Finnwale vor der Küste, Kormorane und Austernfischer in den Klippen. In den Felspools bei Ebbe Seeanemonen, Seeigel und bunte Nacktschnecken. Die grünen Wiesen sind Weidegrund für asturische Kühe und Wildpferde.',
'catedrales': 'Die Felsbögen sind Lebensraum für Entenmuscheln und Seepocken, bei Ebbe offenbaren sich Seeanemonen und Einsiedlerkrebse. Kormorane und Austernfischer suchen zwischen den Steinen. Die Gewässer sind reich an Sardinen und ziehen Delfinschulen an.',
'islas-cies': 'Die Inseln beherbergen die größte Gelbfußmöwen-Kolonie der Welt und Brutplätze für Krähenscharben. Die Gewässer sind ein Meeresschutzgebiet mit Seepferdchen, Kraken und Fischschwärmen in den Tangwäldern.',
'combarro': 'Die Ría de Pontevedra ist berühmt für Muschelzucht – die Flöße ziehen Fischschwärme und jagende Kormorane an. Große Tümmler schwimmen regelmäßig in die Ría hinein. In den Gezeitenzonen leben Herzmuscheln und Percebes.',
'bardenas-reales': 'Die Halbwüste wirkt wie Mars, ist aber erstaunlich lebendig – Füchse, Wildkatzen und die seltene Zwergtrappe. Über den Tafelbergen kreisen Steinadler und Uhus. Nachts mit Glück Stachelschweine auf Nahrungssuche.',
'ordesa': 'Heimat des legendären Bartgeiers (Quebrantahuesos) – mit fast 3m Spannweite lässt er Knochen aus der Höhe fallen. Pyrenäen-Gämsen klettern an den Kalkwänden, Murmeltiere pfeifen auf den Almwiesen. Einer der spektakulärsten Parks für Wildtierbeobachtung.',
'mont-rebei': 'Gänsegeier, Schmutzgeier und Wanderfalken brüten in den überhängenden Felswänden. Im smaragdgrünen Wasser leben Fischotter und Barben. Der in den Fels gehauene Wanderweg bietet Greifvogel-Beobachtung auf Augenhöhe.',
'tossa-de-mar': 'Das Meeresschutzgebiet beherbergt Zackenbarsche, Muränen, Adlerrochen und bunte Lippfische. Die mittelalterlichen Mauern sind von Wolfsmilch und wildem Rosmarin bewachsen. Seeigel: Badeschuhe tragen beim Klettern.',
'cadaques': 'Das Kap Creus ist Naturpark mit Korallen, Zackenbarschen und seltenen roten Seesternen. An Land wachsen wind-geformte Olivenbäume, Wanderfalken nisten in den Klippen. Die bizarren Felsformationen inspirierten schon Dalí.',
'montserrat': 'Die Sandsteintürme bieten Nistplätze für Wanderfalken, Uhus und Alpensegler. Mediterrane Vegetation mit Steineichen und Erdbeerbäumen, zwischen denen Wildschweine und Ginsterkatzen leben. Gänsegeier und Steinadler kreisen über den Felszacken.',
'siurana': 'Das Felsdorf thront über einer Schlucht mit Wanderfalken und Habichtsadlern. Am Stausee brüten Graureiher und Kormorane, Fischadler sind auf Durchzug. Die Steineichen- und Pinienwälder duften nach Thymian und Rosmarin.',
'la-herradura': 'Das Meeresschutzgebiet Cerro Gordo ist einer der besten Schnorchelspots Südspaniens – Zackenbarsche, Kraken, Barrakudas und Meerjunker. An den Klippen nisten Wanderfalken, Delfine ziehen regelmäßig vorbei. Seeigel: Badeschuhe tragen.',
};

function getImgs(id) { return imgCache[id] || []; }
function getThumb(id) { return imgCache[id]?.[0] || null; }

// ============================================================
// LIGHTBOX
// ============================================================
let lbImgs=[], lbIdx=0, lbName='';
function openLB(id) {
  const s = S.find(x=>x.id===id);
  if (!s) return;
  lbImgs = getImgs(id);
  if (!lbImgs.length) return;
  lbIdx = 0; lbName = s.n;
  showLB();
  document.getElementById('lightbox').classList.add('open');
}
function closeLB() { document.getElementById('lightbox').classList.remove('open'); }
function lbNav(d) { lbIdx = (lbIdx + d + lbImgs.length) % lbImgs.length; showLB(); }
function showLB() {
  document.getElementById('lb-title').textContent = lbName;
  document.getElementById('lb-img').src = lbImgs[lbIdx].replace(/\/\d+px-/, '/1200px-');
  document.getElementById('lb-counter').textContent = `${lbIdx+1} / ${lbImgs.length}`;
  document.getElementById('lb-dots').innerHTML = lbImgs.map((_,i) =>
    `<div class="dot ${i===lbIdx?'on':''}" onclick="lbIdx=${i};showLB()"></div>`
  ).join('');
}
document.addEventListener('keydown', e => {
  if (!document.getElementById('lightbox').classList.contains('open')) return;
  if (e.key==='Escape') closeLB();
  if (e.key==='ArrowRight') lbNav(1);
  if (e.key==='ArrowLeft') lbNav(-1);
});

// Custom controls: 3D toggle + Satellite toggle
class MapButton {
  constructor(label, title, onClick) { this._label = label; this._title = title; this._onClick = onClick; }
  onAdd() {
    this._el = document.createElement('div');
    this._el.className = 'maplibregl-ctrl maplibregl-ctrl-group';
    this._el.innerHTML = `<button class="map-btn" title="${this._title}">${this._label}</button>`;
    this._el.querySelector('button').addEventListener('click', this._onClick);
    this._btn = this._el.querySelector('button');
    return this._el;
  }
  onRemove() { this._el.remove(); }
}

const btn3D = new MapButton('3D', '3D Ein/Aus', () => {

});

// Layer/Style system
const STYLES = {
  satellite: null, // custom raster style (initial)
  standard: 'https://tiles.openfreemap.org/styles/liberty',
  outdoor: 'https://tiles.openfreemap.org/styles/liberty', // + hillshade
};
let activeLayer = 'satellite';

function addCustomLayers() {
  // Terrain
  if (!map.getSource('terrain-dem')) {
    map.addSource('terrain-dem', {
      type: 'raster-dem',
      tiles: ['https://s3.amazonaws.com/elevation-tiles-prod/terrarium/{z}/{x}/{y}.png'],
      encoding: 'terrarium', tileSize: 256, maxzoom: 15,
    });
  }
  map.setTerrain({ source: 'terrain-dem', exaggeration: 1.8 });
  if (!map.getLayer('sky')) {
    map.addLayer({ id: 'sky', type: 'sky', paint: { 'sky-type': 'atmosphere', 'sky-atmosphere-sun': [0.0, 0.0], 'sky-atmosphere-sun-intensity': 15 } });
  }
  // Hillshade for outdoor mode
  if (activeLayer === 'outdoor') {
    if (!map.getSource('hillshade-dem')) {
      map.addSource('hillshade-dem', {
        type: 'raster-dem',
        tiles: ['https://s3.amazonaws.com/elevation-tiles-prod/terrarium/{z}/{x}/{y}.png'],
        encoding: 'terrarium', tileSize: 256, maxzoom: 15,
      });
    }
    if (!map.getLayer('hillshade-layer')) {
      map.addLayer({ id: 'hillshade-layer', type: 'hillshade', source: 'hillshade-dem',
        paint: { 'hillshade-exaggeration': 0.5, 'hillshade-shadow-color': '#473B24', 'hillshade-illumination-anchor': 'map' }
      }, map.getStyle().layers.find(l => l.type === 'symbol')?.id);
    }
  }
  // Re-add spots layers
  spotsLayersAdded = false;
  try { addSpotsLayers(); renderMarkers(); } catch(e) { console.error('addCustomLayers:', e); }
  setTimeout(updatePanels, 200);
}

function setMapLayer(id) {
  if (id === activeLayer) { document.getElementById('layer-picker').classList.remove('open'); return; }
  const prevCenter = map.getCenter(), prevZoom = map.getZoom(), prevPitch = map.getPitch();
  activeLayer = id;

  if (id === 'satellite') {
    // Switch to raster satellite
    map.setStyle(STYLE_INIT);
  } else {
    // Switch to vector style
    map.setStyle(STYLES[id]);
  }

  map.once('style.load', () => {
    map.setCenter(prevCenter); map.setZoom(prevZoom); map.setPitch(prevPitch);
    addCustomLayers();
    // Re-request route
    reqRoute();
  });

  // Update picker UI
  document.querySelectorAll('.lp-opt').forEach(el => el.classList.toggle('on', el.onclick.toString().includes("'" + id + "'")));
  document.getElementById('layer-picker').classList.remove('open');
}

// ROUTING (OSRM) — MapLibre version
// ============================================================
// Road type colors based on speed (OSRM annotation)
const ROAD_TYPES = [
  { id: 'highway',  min: 25, color: '#2ecc71', width: 4, label: 'Autobahn' },      // >90 km/h
  { id: 'main',     min: 17, color: '#3498db', width: 3, label: 'Schnellstrasse' },  // 60-90 km/h
  { id: 'mountain', min: 10, color: '#e67e22', width: 3, label: 'Bergstrasse' },     // 35-60 km/h
  { id: 'slow',     min: 0,  color: '#e74c3c', width: 2, label: 'Langsam/Schotter' },// <35 km/h
];

function roadType(speedMs) {
  for (const rt of ROAD_TYPES) if (speedMs >= rt.min) return rt;
  return ROAD_TYPES[3];
}

let rAbort = null;
const routeLayerIds = [];

async function fetchRoute() {
  if (rAbort) rAbort.abort();
  // Remove old route layers
  for (const lid of routeLayerIds) { if (map.getLayer(lid)) map.removeLayer(lid); }
  for (const lid of routeLayerIds) { if (map.getSource(lid)) map.removeSource(lid); }
  routeLayerIds.length = 0;
  rLegs = [];
  const spots = sel.map(id => S.find(s => s.id === id)).filter(Boolean);
  if (spots.length < 2) { renderSummary(); renderList(); return; }
  rLoading = true; renderSummary();
  const ctrl = new AbortController(); rAbort = ctrl;
  try {
    const c = spots.map(s => `${s.lng},${s.lat}`).join(';');
    const r = await fetch(`https://router.project-osrm.org/route/v1/driving/${c}?overview=full&geometries=geojson&annotations=distance,duration,speed`, { signal: ctrl.signal });
    const d = await r.json();
    if (d.code==='Ok' && d.routes?.[0]) {
      const rt = d.routes[0];
      const coords = rt.geometry.coordinates;

      // Collect all speeds from all legs
      const allSpeeds = [];
      rt.legs?.forEach((l, i) => {
        // Calculate road type breakdown per leg
        const legSpeeds = l.annotation?.speed || [];
        const legDists = l.annotation?.distance || [];
        const breakdown = {};
        ROAD_TYPES.forEach(rt => breakdown[rt.id] = 0);
        for (let j = 0; j < legSpeeds.length; j++) {
          const t = roadType(legSpeeds[j]);
          breakdown[t.id] += legDists[j] || 0;
        }
        const totalDist = Object.values(breakdown).reduce((a,b) => a+b, 0) || 1;
        const pcts = {};
        ROAD_TYPES.forEach(rt => pcts[rt.id] = Math.round(breakdown[rt.id] / totalDist * 100));
        // Avg speed
        const avgSpeed = l.distance && l.duration ? Math.round(l.distance / l.duration * 3.6) : 0;
        rLegs.push({ from: sel[i], to: sel[i+1], km: Math.round(l.distance/1000), min: Math.round(l.duration/60), pcts, avgSpeed });
        if (l.annotation?.speed) allSpeeds.push(...l.annotation.speed);
      });

      if (allSpeeds.length >= coords.length - 1) {
        // Split route into segments by road type
        const segments = {}; // { typeId: [[coords]] }
        let currentType = roadType(allSpeeds[0]);
        let currentCoords = [coords[0]];

        for (let i = 0; i < allSpeeds.length; i++) {
          const t = roadType(allSpeeds[i]);
          currentCoords.push(coords[i + 1]);
          if (t.id !== currentType.id || i === allSpeeds.length - 1) {
            if (!segments[currentType.id]) segments[currentType.id] = [];
            segments[currentType.id].push([...currentCoords]);
            currentCoords = [coords[i + 1]];
            currentType = t;
          }
        }

        // Add layers for each road type (slow first, highway on top)
        for (const rt of [...ROAD_TYPES].reverse()) {
          if (!segments[rt.id]) continue;
          const srcId = 'route-' + rt.id;
          const glowId = 'route-glow-' + rt.id;
          const lineId = 'route-line-' + rt.id;
          map.addSource(srcId, { type: 'geojson', data: {
            type: 'FeatureCollection',
            features: segments[rt.id].map(c => ({ type: 'Feature', geometry: { type: 'LineString', coordinates: c } }))
          }});
          map.addLayer({ id: glowId, type: 'line', source: srcId, paint: { 'line-color': rt.color, 'line-width': rt.width + 5, 'line-opacity': 0.12 } });
          map.addLayer({ id: lineId, type: 'line', source: srcId, paint: { 'line-color': rt.color, 'line-width': rt.width, 'line-opacity': 0.85 }, layout: { 'line-cap': 'round', 'line-join': 'round' } });
          // Clickable: show road info popup
          map.on('click', lineId, (e) => {
            const speed = rt.id === 'highway' ? '>90' : rt.id === 'main' ? '60-90' : rt.id === 'mountain' ? '35-60' : '<35';
            new maplibregl.Popup({maxWidth:'220px'})
              .setLngLat(e.lngLat)
              .setHTML(`<div style="font-size:12px;font-weight:600;color:${rt.color}">${rt.label}</div><div style="font-size:11px;color:#6b7280;margin-top:2px">${speed} km/h Durchschnitt</div><div style="font-size:10px;color:#9ca3af;margin-top:2px">${rt.id==='mountain'?'Kurvig, langsam, aber oft spektakuläre Aussicht':rt.id==='slow'?'Schotter/eng/kurvig - mehr Zeit einplanen':rt.id==='highway'?'Schnell, entspannt, langweilig':'Gute Strasse, zügig voran'}</div>`)
              .addTo(map);
          });
          map.on('mouseenter', lineId, () => map.getCanvas().style.cursor = 'pointer');
          map.on('mouseleave', lineId, () => map.getCanvas().style.cursor = '');
          routeLayerIds.push(glowId, lineId, srcId);
        }
      } else {
        // Fallback: single color if no speed data
        const srcId = 'route-fallback';
        map.addSource(srcId, { type: 'geojson', data: { type: 'Feature', geometry: rt.geometry } });
        map.addLayer({ id: 'route-fb-line', type: 'line', source: srcId, paint: { 'line-color': '#e94560', 'line-width': 3, 'line-opacity': 0.8 } });
        routeLayerIds.push('route-fb-line', srcId);
      }
    }
  } catch(e) {}
  rLoading = false; renderSummary(); renderList();
}
let rTimer; function reqRoute() { clearTimeout(rTimer); rTimer = setTimeout(fetchRoute, 300); }

function homeId() { return TRIPS[activeTrip]?.homeId || 'bonn'; }

// Ensure home is always start AND end
function ensureBonn() {
  if (sel[0] !== homeId()) sel = sel.filter(x=>x!==homeId());
  if (sel[0] !== homeId()) sel.unshift(homeId());
  if (sel.length > 1 && sel[sel.length-1] !== homeId()) sel.push(homeId());
}

// Round-trip: always Bonn → ... → Bonn
function optimizeRoute() {
  if (sel.length < 3) return;
  // Remove all bonn entries, we'll add them back
  let ids = sel.filter(x=>x!==homeId());
  const pts = ids.map(id => S.find(s=>s.id===id)).filter(Boolean);
  if (!pts.length) return;

  const home = S.find(s=>s.id===homeId());
  // Start from spot nearest to Bonn
  pts.sort((a,b) => hav(home.lat,home.lng,a.lat,a.lng) - hav(home.lat,home.lng,b.lat,b.lng));

  const rem = [...pts];
  const ord = [rem.shift()];
  while (rem.length > 0) {
    const last = ord[ord.length-1]; let bi=0, bd=Infinity;
    if (rem.length === 1) { ord.push(rem.pop()); break; }
    rem.forEach((r,i) => {
      let d = hav(last.lat,last.lng,r.lat,r.lng);
      // Bias last spots toward home
      if (rem.length <= 3) d += hav(r.lat,r.lng,home.lat,home.lng) * 0.3;
      if (d<bd){bd=d;bi=i;}
    });
    ord.push(rem.splice(bi,1)[0]);
  }
  sel = [homeId(), ...ord.map(s=>s.id), homeId()];
  localStorage.setItem('vt-sel', JSON.stringify(sel)); render();
}

// Smart insert: find optimal position (skip bonn anchors)
function smartInsert(id) {
  if (id === homeId()) return; // don't double-add bonn
  // Ensure bonn bookends
  const inner = sel.filter(x=>x!==homeId());
  if (inner.length < 2) {
    inner.push(id);
  } else {
    const newSpot = S.find(s=>s.id===id);
    if (!newSpot) { inner.push(id); }
    else {
      let bestIdx = inner.length, bestCost = Infinity;
      for (let i = 0; i <= inner.length; i++) {
        const prev = i > 0 ? S.find(s=>s.id===inner[i-1]) : S.find(s=>s.id===homeId());
        const next = i < inner.length ? S.find(s=>s.id===inner[i]) : S.find(s=>s.id===homeId());
        let cost = 0;
        if (prev) cost += hav(prev.lat,prev.lng,newSpot.lat,newSpot.lng);
        if (next) cost += hav(newSpot.lat,newSpot.lng,next.lat,next.lng);
        if (prev && next) cost -= hav(prev.lat,prev.lng,next.lat,next.lng);
        if (cost < bestCost) { bestCost = cost; bestIdx = i; }
      }
      inner.splice(bestIdx, 0, id);
    }
  }
  sel = [homeId(), ...inner, homeId()];
}
function hav(a,b,c,d) { const R=6371,dLa=(c-a)*Math.PI/180,dLo=(d-b)*Math.PI/180; const x=Math.sin(dLa/2)**2+Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(dLo/2)**2; return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x)); }
function fitRoute() {
  const pts=sel.map(id=>S.find(s=>s.id===id)).filter(Boolean);
  if(!pts.length) return;
  const lngs=pts.map(s=>s.lng), lats=pts.map(s=>s.lat);
  map.fitBounds([[Math.min(...lngs),Math.min(...lats)],[Math.max(...lngs),Math.max(...lats)]],{padding:40,duration:1000});
}

function tempColor(at) {
  if (!at) return '#888';
  const hi = parseInt(at.split('-')[1]) || 30;
  if (hi >= 36) return '#e74c3c';
  if (hi >= 32) return '#e67e22';
  if (hi >= 28) return '#f1c40f';
  if (hi >= 24) return '#2ecc71';
  return '#3498db';
}

const GUIDE_IBERIA = {
'bordeaux': 'Bordeaux ist euer perfekter Zwischenstopp auf dem Weg nach Süden. Parkt den Van am P+R (ab 3€/Tag) und nehmt die Tram ins Zentrum – Innenstadt-Parken ist der Horror. Holt euch morgens Canelés (knusprig-karamellisierte Mini-Kuchen, 1-2€/Stück) und schlendert über den Marché des Capucins, wo die Locals frühstücken: Austern ab 5€ die Halbdutzend, dazu Weißwein. Tankt hier günstiger als in Spanien und deckt euch bei Carrefour mit französischem Käse ein – ab der Grenze wird\'s teurer.',
'porto': 'Porto haut euch komplett um. Startet in Ribeira am Douro-Ufer, wo bunte Häuser sich den Hang hochstapeln und Straßenmusiker spielen. Die Francesinha müsst ihr probieren – ein komplett durchgeknalltes Sandwich mit Fleisch, Käse und Biersoße, ab 8€ und ihr seid SATT. Abends rüber nach Vila Nova de Gaia: Portwein-Tasting ab 5€, manche Kellereien sind gratis. Zum Chillen und frischen Fisch fahrt ihr nach Matosinhos an den Stadtstrand – Fischrestaurants direkt am Meer, Menü ab 10€. Van parken am besten oben bei der Uni, unten wird abgezockt.',
'douro-valley': 'Wenn ihr durchs Douro-Tal fahrt, klebt euch die Kinnlade runter: Terrassierte Weinberge soweit das Auge reicht, der Fluss schlängelt sich türkis durch die Schluchten. Haltet an den kleinen Quintas (Weingütern) an und probiert Port direkt vom Fass – ab 2€ pro Glas, und die Winzer erzählen euch die ganze Geschichte dazu. Im Sommer könnt ihr an ruhigen Stellen im Fluss schwimmen, das Wasser ist angenehm warm. Übernachtet wild oben auf den Hügeln mit Blick übers Tal – einer der krassesten Sonnenuntergänge eurer Reise.',
'serra-estrela': 'Die Serra da Estrela ist das höchste Gebirge Festland-Portugals und komplett unterschätzt. Oben erwarten euch Gletscherseen mit kristallklarem Wasser zum Schwimmen – im Sommer perfekt erfrischend, aber echt kalt. Probiert unbedingt den Queijo da Serra: ein cremiger Käse, den man mit dem Löffel isst, direkt von Schäfereien am Weg. Die Bergstraßen sind abenteuerlich eng, aber der Van passt durch – langsam fahren und Gegenverkehr im Auge behalten. Hier oben steht ihr wild und komplett allein, nachts sieht man die Milchstraße.',
'peniche': 'Peniche ist die Surf-Hauptstadt Portugals und euer Basecamp für dicke Wellen. Supertubos ist der Spot für Fortgeschrittene – hier läuft die WSL-Tour, die Wellen brechen hohl und kraftvoll direkt am Strand. Für Anfänger gibt\'s geschütztere Strände auf der Nordseite. Im Fischerdorf selbst kostet frischer Fisch am Hafen fast nix – kauft Sardinen direkt vom Boot und grillt sie auf eurem Van-Grill, mit Brot und Olivenöl, mehr braucht ihr nicht. Es gibt einen großen Parkplatz am Leuchtturm, wo viele Vanlifer stehen.',
'berlengas': 'Die Berlengas-Inseln sind ein Naturreservat mit dem krassesten Wasser, das ihr in Portugal sehen werdet – kristallklar und türkis wie in der Karibik. Bucht die Fähre von Peniche VORHER online (ab 20€ retour), im Sommer ist sie oft Wochen ausgebucht. Auf der Insel könnt ihr Seekajak-Touren durch beleuchtete Meereshöhlen machen – absolutes Highlight. Nehmt Essen und genug Wasser mit, auf der Insel gibt\'s kaum was. Das Schnorcheln hier ist next level: Fische, Krebse, und das Wasser hat 10m Sicht.',
'ericeira': 'Ericeira ist Europas einziges World Surfing Reserve – und das zu Recht. Über ein Dutzend Weltklasse-Spots verteilen sich entlang der Küste, von Coxos (Experten!) bis Foz do Lizandro (Anfänger-friendly). Das Dorf selbst ist ein weißgetünchtes Fischerdorf mit Charme ohne Ende. Holt euch eine Bola de Berlim (fette, mit Creme gefüllte Krapfen, 1-2€) an der Strandbar nach dem Surfen. Abends Bier in den kleinen Bars mit anderen Surfern aus der ganzen Welt. Stellplätze direkt an den Klippen, Sonnenuntergang inklusive.',
'sintra': 'Sintra ist wie ein Märchen auf Acid: bunte Paläste ragen aus nebligen Wäldern, alles ist mit Moos und Farnen überwuchert. Pena Palace und Quinta da Regaleira (mit unterirdischen Tunneln!) sind Pflicht, aber kommt FRÜH – ab 10 Uhr wird\'s voll. Der Geheimtipp ist die Praia da Ursa: ein versteckter Strand mit riesigen Felsnadeln, erreichbar über einen steilen 20-Minuten-Abstieg – nix für Flip-Flops. Parkt den Van oben am Cabo da Roca (westlichster Punkt Europas!) und klettert runter. Vorsicht: die Straßen in Sintra sind eng und im Sommer komplett verstopft.',
'lisbon': 'Lissabon ist einfach anders: Alfama-Gassen mit Fado-Musik, Aussichtspunkte (Miradouros) mit Gratisblick über die Stadt, und Pastéis de Nata für unter 1.50€ (Manteigaria > Pastéis de Belém, weniger Touristen). Fahrt NICHT mit dem Van in die Stadt – Parken ist unmöglich. Stellt ihn in Belém oder am Campingplatz ab und nehmt die Metro. Tram 28 ist Pflicht, aber rappelvoll: steigt an der Endstation ein. Abends Bairro Alto: jede Gasse eine Bar, Bier ab 1.50€, und plötzlich ist es 4 Uhr morgens.',
'comporta': 'Comporta ist das, was die Algarve vor 30 Jahren war: endlose weiße Sandstrände, Reisfelder, Störche auf jedem Dach und kaum Touristen. Im Sommer stehen hier Surfer und Vanlifer zwischen den Dünen – noch wird\'s toleriert, aber checkt vorher, ob aktuell kontrolliert wird. Die Strände sind so lang, dass ihr nach 5 Minuten Laufen komplett allein seid. Esst in den einfachen Strandbars frischen Fisch auf Holztischen im Sand. Sonnenuntergänge hier sind absurd schön – flach, weit, golden.',
'aljezur': 'Die Costa Vicentina ist Europas wildeste Küste und Aljezur euer Basislager. Riesige Klippen, einsame Strände und ein permanenter Surf-Vibe. Arrifana ist DER Spot: perfekte Wellen in einer geschützten Bucht, Surfschule für Anfänger ab 35€. Im Dorf mischen sich Hippies, Surfer und portugiesische Fischer – alles super entspannt. Abends Lagerfeuer am Strand (wo erlaubt!) und Gitarre. Wild Campen wird an der Costa Vicentina streng kontrolliert – nutzt die günstigen Campingplätze ab 10€ oder fragt bei Locals.',
'carrapateira': 'Carrapateira hat zwei Weltklasse-Strände: Amado Beach (DER Surf-Spot, Anfänger bis Fortgeschrittene, Surfschule direkt am Strand) und Bordeira (endlos lang, Flussmündung zum Chillen). Von den Klippen zwischen den Stränden habt ihr den besten Überblick und könnt die Wellen checken. Cliff Jumping ist hier ein Ding – es gibt mehrere Spots an der Küste mit 3-8m Absprunghöhe, aber checkt IMMER die Wassertiefe und Strömung vorher. Das Dorf selbst besteht aus gefühlt drei Häusern und einer Bar, aber genau das macht den Charme aus.',
'sagres': 'Sagres ist der südwestlichste Punkt Europas und fühlt sich auch so an: dramatische Klippen, heulender Wind und das Gefühl, am Rand der Welt zu stehen. Die Festung am Cabo de São Vicente ist Pflicht – Sonnenuntergang hier ist LEGENDÄR, hunderte Leute sitzen auf den Klippen und klatschen, wenn die Sonne im Meer versinkt. Rund um Sagres gibt\'s versteckte Buchten zum Surfen und Schnorcheln. Fischer verkaufen ihren Fang direkt am Hafen. Nachts ist der Sternenhimmel am Kap einer der besten in Europa – null Lichtverschmutzung.',
'lagos': 'Lagos ist DER Ort, wenn ihr feiern UND krasse Natur wollt. Die Felsformationen der Ponta da Piedade sind absurd – mietet euch ein Kajak (ab 15€/Std) und paddelt durch beleuchtete Grotten und unter Felstoren durch. Cliff Jumping gibt\'s an mehreren Stellen entlang der Küste, 3-12m Höhe. Abends verwandelt sich die Altstadt in eine einzige Party: Bars wie Three Monkeys oder Nah Nah Bah locken mit günstigen Shots und Backpacker-Crowd. Tagsüber Kater am Strand auskurieren. Van-Parkplätze etwas außerhalb, Innenstadt zu Fuß.',
'benagil': 'Die Benagil-Höhle mit dem Loch in der Decke ist DAS Instagram-Motiv der Algarve – und entsprechend voll. Kommt im Kajak oder schwimmend (nur bei ruhigem Meer!) VOR 9 Uhr morgens, dann habt ihr die Höhle fast für euch. Die Praia da Marinha direkt nebenan ist offiziell einer der schönsten Strände der Welt – türkises Wasser, Felstore, Schnorchel-Paradies. Entlang der Klippen gibt\'s einen Wanderweg mit irren Ausblicken. Parkt oben am Klippenrand und lauft runter, die Treppe ist steil aber machbar.',
'tarifa': 'In Tarifa seht ihr Afrika – buchstäblich. Marokko liegt nur 14km entfernt, an klaren Tagen erkennt ihr einzelne Häuser. Die Stadt ist DIE Kitesurf-Hauptstadt Europas: der Levante-Wind ballert hier zuverlässig und die Strände sind perfekt. Surfen geht auch, aber der Wind macht\'s oft tricky. Fun Fact: hier schwimmen Orcas vorbei (Sommer) und jagen Thunfische – Bootstouren möglich. Die Altstadt ist winzig, marokkanisch angehaucht und voller Surf-Shops und Tapas-Bars. Parkt draußen am Strand, in der Stadt ist es eng.',
'bolonia': 'Die Düne von Bolonia ist 30 Meter hoch und sieht aus wie Sahara-am-Meer – raufklettern, runterrennen, Sandboarden wenn ihr ein Brett habt. Unten liegt einer der schönsten Strände Andalusiens mit kristallklarem Wasser. Direkt daneben stehen römische Ruinen (Baelo Claudia, Eintritt frei!), eine antike Thunfisch-Fabrik am Strand. In den Chiringuitos am Strand gibt\'s frischen Atún rojo (Roter Thun) – Spezialität der Region. Der Ort ist winzig und verschlafen, perfekt zum Runterkommen nach dem Tarifa-Trubel.',
'ronda': 'Ronda haut euch um: Die Stadt thront auf zwei Felsplateaus, verbunden durch die Puente Nuevo über einer 100m tiefen Schlucht – der Blick runter ist nichts für schwache Nerven. Morgens früh kommen, dann ist die Brücke noch leer für Fotos. Das Beste: In Ronda gibt\'s GRATIS Tapas zu jedem Bier (ab 2€)! Bar Lechuguita und Bar El Almacén sind top. Lauft runter ins Tal zum Fluss, von unten sieht die Brücke noch krasser aus. Parkt den Van unten am Parkplatz Padre Jesús und lauft hoch – oben gibt\'s keine Chance.',
'caminito-del-rey': 'Der Caminito del Rey ist ein Holzsteg in 100m Höhe durch eine enge Schlucht – früher der gefährlichste Wanderweg der Welt, jetzt gesichert aber immer noch atemberaubend. WICHTIG: Tickets WOCHEN vorher online buchen (10€), die sind ständig ausverkauft! Die Tour dauert ca. 3 Stunden und ist auch für unsportliche Leute machbar – nur Höhenangst solltet ihr nicht haben. Der Moment, wenn sich die Schlucht öffnet und ihr auf dem Steg über dem Abgrund steht, ist absolut surreal. Parkt am besten am Nordeingang, Shuttle zum Südeingang inklusive.',
'nerja': 'Nerja ist der Ausgangspunkt für die geilsten versteckten Strände Andalusiens. Die Playas de Maro sind nur über steile Pfade erreichbar – dafür türkises Wasser, Klippen zum Springen und kaum Leute. Cliff Jumping an der Playa de Maro ist legendär: 5-10m Spots direkt über tiefem, klarem Wasser. Die Cuevas de Nerja (Tropfsteinhöhlen) sind riesig und beeindruckend, Tickets vorher online. Der Balcón de Europa in Nerja-Stadt bietet einen fetten Panoramablick aufs Meer. Parkt oben und lauft runter zu den Buchten – Flip-Flops reichen nicht, nehmt Schuhe mit.',
'cabo-de-gata': 'Cabo de Gata ist Europas einzige Wüste am Meer: vulkanische Landschaften, karge Hügel und dazwischen die krassesten Strände Spaniens. Die Playa de los Muertos (Strand der Toten – klingt krass, ist paradiesisch) hat türkises Wasser und weiße Kiesel, erreichbar über einen steilen 20-Min-Abstieg. Im ganzen Naturpark gibt\'s kaum Bebauung und fast keine Touristen. Die Dörfer wie San José und Las Negras sind winzig und authentisch. Wild Campen wird kontrolliert, aber es gibt günstige Campingplätze ab 8€. Nachts Sternenhimmel ohne Ende.',
'granada': 'Granada ist DIE Stadt für Budget-Reisende: zu JEDEM Bier (ab 2€) bekommt ihr eine fette Gratis-Tapa dazu – nach drei Bier seid ihr satt und leicht angetrunken, perfekter Deal. Calle Navas und das Albaicín-Viertel sind die besten Tapas-Gegenden. Die Alhambra ist der Wahnsinn, aber bucht Tickets WOCHEN vorher online – ausverkauft ist die Regel. Abends Flamenco-Show in einer Höhle im Sacromonte (ab 15€ mit Getränk). Der Mirador San Nicolás bei Sonnenuntergang: Alhambra vor Schneebergen, dazu Straßenmusik. Van parken außerhalb und Bus nehmen.',
'seville': 'Sevilla ist im Sommer BRUTAL heiß (45°C keine Seltenheit im August) – plant euren Besuch für morgens und abends. Der Alcázar ist mindestens so schön wie die Alhambra und die Plaza de España kennt ihr aus Star Wars und Game of Thrones. Abends erwacht Triana zum Leben: Flamencobars, Tapas-Gassen und eine Stimmung, die euch umhaut. Tipp: Cerveza + Tapa am Triana-Markt, direkt am Fluss. Parkt den Van am Alamillo-Park (kostenlos, schattig) und radelt oder busst ins Zentrum – in der Altstadt habt ihr null Chance mit dem Van.',
'mundaka': 'Mundaka hat eine der besten Linkswellen Europas – eine lange, hohle Barrel, die über eine Sandbank am Flussmündung bricht. Achtung: nur für erfahrene Surfer, die Welle ist schnell und powerful. Auch wenn ihr nicht surft, ist es krass, von der Hafenmauer aus zuzuschauen, wie die Locals die Welle zerlegen. Mundaka liegt im Urdaibai-Biosphärenreservat, die Natur drumherum ist wunderschön – Vogelbeobachtung, Wandern, Kajak im Ría. Im Dorf gibt\'s Pintxos und Txakoli (spritziger Weißwein). Van-Stellplätze etwas oberhalb am Ortsrand.',
'san-sebastian': 'San Sebastián hat das beste Essen der Welt – kein Witz. Die Parte Vieja (Altstadt) ist vollgestopft mit Pintxos-Bars: ihr stellt euch an die Theke, zeigt auf was ihr wollt (1.50-3€/Stück) und ballert euch durch. Route: Gandarias, A Fuego Negro, La Viña (Käsekuchen PFLICHT), Bar Nestor (Tortilla um 13 Uhr, wer zu spät kommt hat Pech). Zum Surfen geht\'s an die Zurriola – Stadtstrand mit guten Wellen und Surf-Vibe. Die Bucht von La Concha ist einer der schönsten Stadtstrände der Welt. Parkt außerhalb und nehmt den Bus.',
'gaztelugatxe': '241 Stufen über einen schmalen Felsgrat zur Einsiedelei auf der Felsinsel – ihr kennt den Ort als Dragonstone aus Game of Thrones. Die Wanderung ist kurz aber knackig, und oben angekommen ist die Aussicht absolut episch. WICHTIG: Im Sommer müsst ihr online reservieren (kostenlos), spontan kommt ihr nicht rein. Kommt früh morgens oder spät nachmittags, dann ist das Licht am besten und weniger los. Unten am Parkplatz gibt\'s einen kleinen Kiosk, aber nehmt besser selbst Wasser mit. Der perfekte Zwischenstopp zwischen Bilbao und San Sebastián.',
'picos-de-europa': 'Die Picos de Europa sind brutal schön: schroffe Kalksteingipfel, grüne Täler und freilaufende Kühe überall. Die Ruta del Cares ist DER Wanderweg: 12km durch eine enge Schlucht, in den Fels gehauen, Schwindelfreiheit hilft. Die Seilbahn Fuente Dé bringt euch in 4 Minuten auf 1800m – oben Mondlandschaft mit Panorama. Abends im Tal Sidra Natural trinken: der Kellner gießt von oben ein, ihr fangt unten auf und trinkt sofort – Tradition! Wildes Campen ist im Nationalpark verboten, aber drumherum gibt\'s tolle Spots in den Tälern.',
'llanes': 'Llanes ist ein buntes Fischerdorf an Asturiens Küste mit farbigen Betonwürfeln am Hafen (Kunst von Agustín Ibarrola) und einer Altstadt zum Verlieben. Rund um den Ort gibt\'s versteckte Buchten (Playas) zwischen dramatischen Klippen – Playa de Gulpiyuri ist ein STRAND MITTEN IM LAND, das Meer drückt durch Höhlen durch. Sidra (Apfelwein) wird hier überall ausgeschenkt – der Kellner gießt spektakulär ein. Sardinen am Hafen, Fabada im Restaurant, und abends Sidra-Bar-Hopping. Perfekter Stopp zwischen Picos und Galicien.',
'catedrales': 'Die Playa de las Catedrales hat 30 Meter hohe Felsbögen, die aussehen wie gotische Kirchenfenster – aber NUR bei Ebbe könnt ihr durchlaufen! Checkt vorher die Gezeiten-App und plant euren Besuch um Niedrigwasser. Im Sommer MÜSST ihr online reservieren (kostenlos, aber schnell weg). Bei Flut seht ihr nur einen normalen Strand und versteht den Hype nicht. Bei Ebbe ist es dafür einer der spektakulärsten Strände Europas. Kommt morgens, dann habt ihr das beste Licht für Fotos. Großer Parkplatz direkt oben, van-freundlich.',
'islas-cies': 'Der Guardian nannte den Rodas Beach auf den Islas Cíes den "besten Strand der Welt" – und wenn ihr den weißen Sand und das karibische Wasser seht, versteht ihr warum. Die Inseln sind Naturpark: maximal 2000 Besucher/Tag, also Fähre von Vigo VORHER buchen (ab 19€ retour) plus Genehmigung auf der Xunta-Website. Nehmt Essen und Wasser mit, auf der Insel gibt\'s nur ein teures Restaurant. Wandert zum Leuchtturm hoch für den Panoramablick. Schnorcheln am Strand ist top. Zelten auf dem Insel-Campingplatz möglich (vorbuchen!).',
'combarro': 'Combarro ist das authentischste Dorf Galiciens: Jahrhundertealte Hórreos (Kornspeicher auf Stelzen) stehen direkt über dem Meer und die Gassen sind so eng, dass der Van auf dem Parkplatz außerhalb bleiben muss. In den Pulperías (Tintenfisch-Restaurants) bekommt ihr Pulpo á Feira – Oktopus mit Paprika und Olivenöl auf Holzbrett, ab 8€ und unfassbar gut. Dazu Albariño-Wein aus der Region (4-7€ die Flasche). Padrón-Pimientos als Vorspeise sind russisches Roulette: die meisten mild, aber plötzlich eine höllisch scharf. Perfekter Galicien-Einstieg.',
'bardenas-reales': 'Die Bardenas Reales sehen aus wie eine Mischung aus Arizona und Mars: von Wind und Wasser geformte Lehmpyramiden, Tafelberge und ausgetrocknete Schluchten – und das mitten in Nordspanien. Ihr könnt mit dem Van eine Rundroute durch den Park fahren (Schotterpiste, aber machbar). Die Castildetierras-Formation ist DAS Fotomotiv: ein freistehender Lehmturm wie aus einem Western. Bringt genug Wasser mit, es gibt NULL Infrastruktur. Bei Sonnenuntergang werden die Farben irre. Übernachtung im Park verboten, aber direkt am Rand gibt\'s Stellplätze.',
'ordesa': 'Der Ordesa-Nationalpark ist der Grand Canyon Europas: eine kilometertiefe Schlucht mit Wasserfällen, Geiern über euch und einer Stille, die ihr in der Stadt nie erlebt. Die Wanderung zur Cola de Caballo (Pferdeschwanz-Wasserfall) ist DER Klassiker: 16km hin und zurück, spektakulär aber machbar. Im Sommer ist der Parkplatz ab 9 Uhr voll – kommt FRÜH oder nehmt den Shuttlebus ab Torla. Gämsen und Murmeltiere tauchen ständig auf. Der Van steht am besten in Torla, einem Bilderbuch-Pyrenäendorf mit guten Restaurants und Bar.',
'mont-rebei': 'Mont-Rebei ist ein versteckter Geheimtipp: die engste Schlucht der südlichen Pyrenäen mit türkisem Wasser, in den Fels gehauenen Pfaden und null Handyempfang – digital Detox pur. Der Wanderweg ist teilweise mit Drahtseilen gesichert (leichte Via Ferrata), Schwindelfreiheit braucht ihr schon. Unten an der Schlucht könnt ihr Kajak mieten und durch die steilwandige Enge paddeln – das Wasser schimmert unwirklich türkis. Die Anfahrt ist abenteuerlich (Schotterpiste), aber der Van packt das. Eines der unberührtesten Naturwunder Spaniens.',
'barcelona': 'Barcelona ist overwhelming im besten Sinne: Gaudís Sagrada Família ist selbst für Kirchenmuffel mindblowing (Tickets VORHER online, ab 26€), der Park Güell liefert den Panoramablick. Barceloneta-Strand ist okay zum Chillen, aber nix Besonderes – schwimmt lieber im Freibad am Hügel. Abends El Born und Raval: hier tobt das Nachtleben von Craft-Beer-Bars bis 6-Uhr-morgens-Clubs. ACHTUNG: Taschendiebe sind extrem aktiv, Handy und Portemonnaie immer vorne tragen. Den Van parkt ihr außerhalb (Parken in der Stadt = Wahnsinn) und nehmt die Metro.',
'tossa-de-mar': 'Tossa de Mar hat eine mittelalterliche Festung direkt über einer türkisen Bucht – der Ausblick von den Burgmauern ist der Wahnsinn. Im Wasser unter der Burg könnt ihr direkt vom Felsen ins klare Meer springen und Schnorcheln: bunte Fische, Seeigel (Vorsicht!) und Felshöhlen. Die Altstadt innerhalb der Mauern ist autofrei und malerisch, abends mit Kerzenlicht-Restaurants. Im Sommer wird\'s voll, also kommt früh oder im September. Parkplätze für Vans am Ortsrand, von dort 10 Minuten laufen. Die Costa Brava zeigt sich hier von ihrer besten Seite.',
'cadaques': 'Cadaqués ist das schönste Dorf der Costa Brava: weiße Häuser, eine geschützte Bucht und das Licht, in das sich schon Dalí verliebt hat. Sein Haus in Port Lligat (15 Min zu Fuß) ist jetzt Museum – Tickets vorher buchen. Das Cap de Creus dahinter ist die wildeste Küste Kataloniens: vom Wind zerfressene Felsen, einsame Buchten und Tramuntana-Wind der euch wegbläst. Die Anfahrt über den Pass ist kurvig und eng mit dem Van, aber machbar. Im Dorf gibt\'s frischen Fisch am Hafen und eine entspannte Abendstimmung. Einer der magischsten Orte Spaniens.',
'montserrat': 'Montserrat sieht aus, als hätte ein Riese Felszähne in den Himmel gesteckt – die bizarren Felsformationen sind komplett surreal. Das Benediktinerkloster klebt in der Felswand und beherbergt die Schwarze Madonna – die Schlange zum Anfassen ist lang, lohnt sich aber für das Erlebnis. Nehmt die Zahnradbahn hoch (Kombiticket ab 15€), die Straße ist eng und voll. Oben gibt\'s Wanderwege zu den Gipfeln mit irrem Panorama über Katalonien. Am besten als Tagesausflug von Barcelona, parkt unten am Bahnhof. Der Klosterchor singt täglich um 13 Uhr – Gänsehaut.',
'siurana': 'Siurana ist ein winziges Dorf auf einer Felsklippe über einem türkisen Stausee – und ein Geheimtipp unter Kletterern und Cliff-Jumpern. Die Sprungspots am See haben verschiedene Höhen von 5 bis 15 Meter, das Wasser ist tief und klar. IMMER vorher die Tiefe checken und nie allein springen! Das Dorf selbst hat vielleicht 30 Einwohner und eine Bar mit der besten Aussicht Kataloniens. In der Umgebung liegt das Priorat-Weingebiet – hier bekommt ihr Weltklasse-Rotwein ab 5€ die Flasche direkt vom Winzer. Die Anfahrt ist eine abenteuerliche Bergstraße, oben angekommen fühlt sich\'s an wie eine andere Welt.',
'salamanca': 'Salamanca ist DIE Studentenstadt Spaniens: die goldene Sandstein-Universität (eine der ältesten Europas) leuchtet abends magisch, und die Plaza Mayor ist der schönste Hauptplatz des Landes. Weil hier so viele Studenten leben, sind die Bars spottbillig: Bier ab 1.50€, Shots ab 1€, und die Calle Van Dyck ist die Ausgehmeile. Sucht den Frosch an der Uni-Fassade – wer ihn ohne Hilfe findet, besteht angeblich jede Prüfung. Tagsüber Kathedrale und Altstadt, abends günstig essen und dann feiern. Einer der besten Party-Stopps auf dem Weg nach Portugal.',
'madrid': 'Madrid ist Spaniens heimliche Nummer 1: das Prado-Museum (Weltklasse, ab 15€, Mo-Sa abends gratis!), der Retiro-Park zum Chillen und Ruderboot fahren, und ein Nachtleben das erst um Mitternacht anfängt. Malasaña ist EUER Viertel: Vintage-Läden, Craft-Beer-Bars, und die Movida-Stimmung lebt noch. Sonntags zum Rastro-Flohmarkt – Spaniens größter – und danach Bier in La Latina. Bocadillo de Calamares (Tintenfisch-Brötchen, 3€) am Plaza Mayor ist DAS Madrid-Essen. Van parken am Stadtrand bei Metro-Station, im Zentrum keine Chance.',
'valencia': 'Valencia ist total unterschätzt: die Ciudad de las Artes y Ciencias sieht aus wie eine Alien-Stadt, der Turia-Park (ein trockengelegter Fluss, jetzt Europas längster Stadtpark) ist perfekt zum Radfahren, und hier wurde die ORIGINAL Paella erfunden – mit Huhn und Kaninchen, NICHT mit Meeresfrüchten! Esst Paella in El Palmar am See, nicht in der Touristenzone. Dazu Horchata (Erdmandelmilch) und Fartons (süße Stangen zum Dippen). Der Mercado Central ist riesig und bezahlbar. Strand in der Stadt, Nightlife im Ruzafa-Viertel. Van-Parkplatz am Hafen ist kostenlos und groß.',
'la-herradura': 'La Herradura (Hufeisen) heißt so wegen der perfekt geschwungenen Bucht – und ist ein Geheimtipp abseits der Touristenmassen. Am Cerro Gordo Naturpark gibt\'s die besten Cliff-Jumping-Spots der Gegend: Felsen von 3 bis 15 Meter Höhe über tiefem, kristallklarem Wasser. Schnorcheln ist hier top: bunte Fische, Seegras-Wiesen und Unterwasserhöhlen direkt ab den Felsen. Die Bucht selbst ist ruhig und familienfreundlich, mit günstigen Chiringuitos am Strand. Parkt den Van am östlichen Ende der Bucht beim Cerro Gordo und erkundet die Küste zu Fuß. Einer der besten Bade-Stopps an der Küste zwischen Málaga und Granada.',

function popupCarousel(id) {
  const imgs = getImgs(id);
  if (!imgs.length) return `<div class="pcr"><div class="pcr-ph">${CAT[S.find(s=>s.id===id)?.cat]?.i||''}</div></div>`;
  const uid = 'cr_'+id;
  const imgTags = imgs.map((u,i) => `<img src="${u}" class="${i===0?'vis':''}" data-i="${i}">`).join('');
  const dots = imgs.length > 1 ? `<div class="pcr-dots">${imgs.map((_,i)=>`<div class="pcr-dot ${i===0?'on':''}" data-i="${i}"></div>`).join('')}</div>` : '';
  const arrows = imgs.length > 1 ? `<button class="pcr-arr pcr-l" onclick="crNav('${uid}',-1)">&#8249;</button><button class="pcr-arr pcr-r" onclick="crNav('${uid}',1)">&#8250;</button>` : '';
  const cnt = imgs.length > 1 ? `<div class="pcr-cnt">${imgs.length} Fotos</div>` : '';
  return `<div class="pcr" id="${uid}" data-idx="0" onclick="openLB('${id}')" style="cursor:pointer">${imgTags}${arrows}${dots}${cnt}</div>`;
}
function crNav(uid, dir) {
  event.stopPropagation();
  const el = document.getElementById(uid);
  if (!el) return;
  const imgs = el.querySelectorAll('img');
  const dots = el.querySelectorAll('.pcr-dot');
  let idx = parseInt(el.dataset.idx) || 0;
  imgs[idx]?.classList.remove('vis');
  dots[idx]?.classList.remove('on');
  idx = (idx + dir + imgs.length) % imgs.length;
  imgs[idx]?.classList.add('vis');
  dots[idx]?.classList.add('on');
  el.dataset.idx = idx;
}

      ROUTES.map((r,i) => `<div class="rcard">
        <div class="rtitle">${i+1}. ${r.name}</div>
        <div class="rsub">${r.sub} \u00b7 ${r.ids.length} Stops</div>
        <div class="rdesc">${r.desc}</div>

  }

  // ===== GUIDE VIEW for Route tab =====
  if (tab === 'sel') {
    const selSpots = sel.map(id => S.find(s=>s.id===id)).filter(Boolean);
    if (!selSpots.length) { el.innerHTML='<div style="padding:30px;text-align:center;color:#445;font-size:11px">Keine Spots in Route.</div>'; return; }
    let h = '';
    // Route narrative intro (if loaded from suggestions)
    if (activeRouteIdx >= 0 && ROUTE_NARRATIVE[activeRouteIdx]) {

    }
    let dayCount = 0;
    selSpots.forEach((s, i) => {
      const ri = sel.indexOf(s.id);
      const ci = CAT[s.cat]?.i || '';
      const isHome = s.cat === 'home';

      // Driving leg BEFORE this stop (except first)

  // ===== CARD VIEW for All tab =====
  const spots = visible();
  if (!spots.length) { el.innerHTML='<div style="padding:30px;text-align:center;color:#445;font-size:11px">Keine Treffer.</div>'; return; }
  let h = '';
  spots.forEach((s,i) => {

    const imgEl = thumb
      ? `<img class="card-img" src="${thumb}" alt="" onerror="this.className='card-img-ph';this.innerHTML='${CAT[s.cat]?.i||''}';">`

    const imgCount = getImgs(s.id).length;
    const wcTag = s.wc ? '<span class="tg wc">WC</span>' : '';
    const foodTag = FOOD[s.id] ? '<span class="tg" style="background:rgba(243,156,18,.12);color:#f39c12">\u{1F37D}</span>' : '';
    const routeBtn = s.id===homeId() ? '' : `<button class="card-route-btn ${on?'on-route':''}" onclick="event.stopPropagation();toggle('${s.id}')" title="${on?'Von Route entfernen':'Zur Route'}">${on?'\u2713':'+'}</button>`;
    h += `<div class="card ${on?'sel':''}" onclick="flyTo('${s.id}')" onmouseenter="(function(){highlightPill('${s.id}');var s=S.find(function(x){return x.id==='${s.id}'});if(!s)return;map.flyTo({center:[s.lng,s.lat],zoom:7,duration:800,curve:1.5});setTimeout(function(){var p=map.project([s.lng,s.lat]);var mr=document.getElementById('map').getBoundingClientRect();showInfoCard(s,mr.left+p.x+15,mr.top+p.y-20)},850)})()" onmouseleave="hideInfoCard();clearHighlight()">
      ${on?`<div class="rn">${ri+1}</div>`:''}
      <div class="card-body">
        <div class="nm">${CAT[s.cat]?.i||''} ${s.n}${favDotsHtml(s.id)}</div>
        <div class="sub">${s.co} · ${s.ni} N${imgCount>1?' · '+imgCount+' Fotos':''}</div>
        <div class="ds">${s.d}</div>
        <div class="tgs">${foodTag}${wcTag}${s.t.slice(0,4).map(t=>`<span class="tg">${t}</span>`).join('')}</div>

}

function spotsGeoJSON() {
  const wc = document.getElementById('wc-chk').checked;
  const foodOnly = document.getElementById('food-chk').checked;
  const features = [];
  S.forEach(s => {
    if (!filt.has(s.cat)) return;
    if (wc && !s.wc) return;
    if (foodOnly && !FOOD[s.id]) return;
    const on = isSel(s.id);
    const ri = on ? sel.indexOf(s.id) : -1;
    const ci = CAT[s.cat]?.i || '';
    // Build metrics string
    const mp = [];
    if (s.at) mp.push(s.at+'\u00b0');
    if (s.el) mp.push('\u2191'+s.el+'m');
    if (s.wt) mp.push('\u{1F4A7}'+s.wt+'\u00b0');
    if (s.wc) mp.push('\u26FA');
    if (s.ni) mp.push(s.ni+'N');
    const metrics = mp.join(' ');
    // Label = icon + name + newline + metrics
    const label = ci + ' ' + s.n + '\n' + metrics;
    features.push({
      type: 'Feature',
      geometry: { type: 'Point', coordinates: [s.lng, s.lat] },
      properties: {
        id: s.id, name: s.n, cat: s.cat, label: label,
        catColor: CAT[s.cat]?.c || '#888',
        isRoute: on, routeNum: ri >= 0 ? String(ri) : '',
        priority: on ? 1 : 0
      }
    });
  });
  return { type: 'FeatureCollection', features };
}

let spotsLayersAdded = false;
function addSpotsLayers() {
  if (spotsLayersAdded) return;
  spotsLayersAdded = true;

  map.addSource('spots', { type: 'geojson', data: spotsGeoJSON() });

  // Non-route dots
  map.addLayer({
    id: 'spots-dots', type: 'circle', source: 'spots',
    filter: ['==', ['get', 'isRoute'], false],
    paint: {
      'circle-radius': 6,
      'circle-color': ['get', 'catColor'],
      'circle-stroke-width': 1.5,
      'circle-stroke-color': '#fff',
      'circle-opacity': 0.85
    }
  });

  // Route dots (bigger, on top)
  map.addLayer({
    id: 'spots-route-dots', type: 'circle', source: 'spots',
    filter: ['==', ['get', 'isRoute'], true],
    paint: {
      'circle-radius': 10,
      'circle-color': '#d63050',
      'circle-stroke-width': 2.5,
      'circle-stroke-color': '#fff',
      'circle-opacity': 1
    }
  });

  // Route numbers
  map.addLayer({
    id: 'spots-route-nums', type: 'symbol', source: 'spots',
    filter: ['==', ['get', 'isRoute'], true],
    layout: {
      'text-field': ['get', 'routeNum'],
      'text-size': 10,
      'text-font': ['Noto Sans Bold'],
      'text-allow-overlap': true,
      'text-ignore-placement': true
    },
    paint: { 'text-color': '#fff' }
  });

  // Hover & click events on dots → show unified info card
  const dotLayers = ['spots-dots', 'spots-route-dots'];
  dotLayers.forEach(layer => {
    map.on('mouseenter', layer, (e) => {
      map.getCanvas().style.cursor = 'pointer';
      const f = e.features[0];
      const s = S.find(x => x.id === f.properties.id);
      if (s) showInfoCard(s, e.originalEvent.clientX, e.originalEvent.clientY);
    });
    map.on('mouseleave', layer, () => {
      map.getCanvas().style.cursor = '';
      hideInfoCard();
    });
    map.on('click', layer, (e) => {
      const f = e.features[0];
      const s = S.find(x => x.id === f.properties.id);
      if (s) showInfoCard(s, e.originalEvent.clientX, e.originalEvent.clientY);
    });
  });
}

function renderMarkers() {
  Object.values(markers).forEach(m => m.remove()); markers = {};
  if (!spotsLayersAdded) return;
  const src = map.getSource('spots');
  if (src) src.setData(spotsGeoJSON());
  updatePanels();

// ============================================================
// COLLISION-FREE INFO PANELS with leader lines
// ============================================================
const panelsEl = document.getElementById('panels-overlay');
const svgEl = document.getElementById('leader-svg');

function getVisibleSpots() {
  const wc = document.getElementById('wc-chk').checked;
  const foodOnly = document.getElementById('food-chk').checked;
  return S.filter(s => {
    if (!filt.has(s.cat)) return false;
    if (wc && !s.wc) return false;
    if (foodOnly && !FOOD[s.id]) return false;
    return true;
  });
}

// Build panel HTML based on zoom level
function midTemp(range) {
  if (!range) return '';
  const p = range.split('-');
  return p.length === 2 ? String(Math.round((+p[0] + +p[1]) / 2)) : p[0];
}

function panelContent(s, zoom) {
  const on = isSel(s.id);
  const ri = on ? sel.indexOf(s.id) : -1;
  const ci = CAT[s.cat]?.i || '';
  const tc = tempColor(s.at);
  const numH = ri >= 0 ? `<span class="cp-num">${ri}</span>` : '';
  const at = midTemp(s.at);
  const wt = s.wt ? `<span class="cp-info" style="color:#2980b9">\u{1F4A7}${midTemp(s.wt)}\u00b0</span>` : '';
  const wc = s.wc ? `<span class="cp-info">\u26FA</span>` : '';
  const net = s.net === 0 ? `<span class="cp-info" style="color:#999" title="Offline-Karten laden">&#x1F4F5;</span>` : s.net === 1 ? `<span class="cp-info" style="color:#bbb" title="Netz l\u00fcckenhaft">&#x1F4F6;</span>` : '';
  // Skip category icon if it's 💧 and we already show 💧 with water temp
  const showIcon = !(s.wt && ci === '\u{1F4A7}');

  if (zoom < 7.5) {
    // COMPACT: icon + air temp + water temp + wc
    const ic1 = showIcon ? `<span class="cp-icon">${ci}</span>` : '';
    return `${numH}${ic1}<span class="cp-temp" style="color:${tc}">${at}\u00b0</span>${wt}${wc}${net}`;
  }
  if (zoom < 10) {
    // MEDIUM: icon + short name + temp + water temp + wc
    let nm = s.n.length > 18 ? s.n.slice(0,16)+'\u2026' : s.n;
    const el = s.el ? `<span class="cp-info">\u2191${s.el}m</span>` : '';
    const ic2 = showIcon ? `<span class="cp-icon">${ci}</span>` : '';
    return `${numH}${ic2}<span class="cp-name">${nm}</span><span class="cp-temp" style="color:${tc}">${at}\u00b0</span>${wt}${el}${wc}${net}`;
  }
  // FULL: icon + full name + all metrics
  const el = s.el ? `<span class="cp-detail">\u2191${s.el}m</span>` : '';
  const ni = s.ni ? `<span class="cp-detail">${s.ni}N</span>` : '';
  const ic3 = showIcon ? `<span class="cp-icon">${ci}</span>` : '';
  return `${numH}${ic3}<span class="cp-name">${s.n}</span><span class="cp-temp" style="color:${tc}">${at}\u00b0</span>${wt}${el}${wc}${net}${ni}`;
}

// Estimate panel pixel width based on zoom
function estPanelW(s, zoom) {
  if (zoom < 7.5) return 52 + (s.wt ? 28 : 0) + (s.wc ? 12 : 0);
  if (zoom < 10) { const n = Math.min(s.n.length, 18); return 55 + n * 6 + (s.wt ? 25 : 0); }
  return 65 + s.n.length * 6 + (s.wt ? 30 : 0);
}
const PANEL_H = 18;

// Collision-free placement
function rectsOverlap(a, b) {
  return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
}

const PIN_TIP = 0;
function placePanel(dotX, dotY, pw, ph, placed, mw, mh) {
  // Candidates: prefer directly above (classic pin), then nearby alternatives
  const cands = [];
  const totalH = ph + PIN_TIP;
  for (const dist of [20, 36, 54, 75]) {
    cands.push(
      { dx: -pw/2, dy: -dist - totalH },              // above center (preferred)
      { dx: -pw/2 + 15, dy: -dist - totalH },         // above slightly right
      { dx: -pw/2 - 15, dy: -dist - totalH },         // above slightly left
      { dx: dist * 0.5, dy: -dist - totalH },         // above-right
      { dx: -pw - dist * 0.5, dy: -dist - totalH },   // above-left
      { dx: dist, dy: -totalH/2 },                    // right
      { dx: -dist - pw, dy: -totalH/2 },              // left
      { dx: -pw/2, dy: dist },                        // below (last resort)
    );
  }
  for (const c of cands) {
    const rx = dotX + c.dx, ry = dotY + c.dy;
    // Skip if off screen
    if (rx < 2 || rx + pw > mw - 2 || ry < 2 || ry + ph > mh - 2) continue;
    const rect = { x: rx, y: ry, w: pw, h: ph };
    if (!placed.some(p => rectsOverlap(rect, p))) {
      return { x: rx, y: ry, w: pw, h: ph };
    }
  }
  // Fallback: place anyway (at first candidate)
  return { x: dotX + 22, y: dotY - ph/2, w: pw, h: ph };
}

function highlightPill(spotId) {
  _highlightId = spotId;
  document.querySelectorAll('#panels-overlay .cp').forEach(el => {
    el.classList.toggle('highlight', el.dataset.id === spotId);
  });
}
function clearHighlight() {
  _highlightId = null;
  document.querySelectorAll('#panels-overlay .cp.highlight').forEach(el => el.classList.remove('highlight'));
}

function updatePanels() {
  if (!spotsLayersAdded) return;
  const spots = getVisibleSpots();
  const zoom = map.getZoom();
  const mapRect = map.getContainer().getBoundingClientRect();
  const mw = mapRect.width, mh = mapRect.height;

  // Project all spots to screen, filter on-screen
  const items = [];
  for (const s of spots) {
    const p = map.project([s.lng, s.lat]);
    if (p.x < -20 || p.x > mw + 20 || p.y < -20 || p.y > mh + 20) continue;
    items.push({ s, x: p.x, y: p.y, pw: estPanelW(s, zoom) });
  }
  // Sort: route spots first (get best positions)
  items.sort((a, b) => (isSel(b.s.id) ? 1 : 0) - (isSel(a.s.id) ? 1 : 0));

  // Also reserve space for the dots themselves
  const placed = items.map(it => ({ x: it.x - 6, y: it.y - 6, w: 12, h: 12 }));

  // Place panels collision-free
  const results = [];
  for (const it of items) {
    const rect = placePanel(it.x, it.y, it.pw, PANEL_H, placed, mw, mh);
    placed.push(rect);
    results.push({ ...it, rect });
  }

  // Render
  let svgLines = '';
  let html = '';
  for (const r of results) {
    const { s, x: dx, y: dy, rect } = r;
    const on = isSel(s.id);
    const cls = on ? 'cp cp-route' : 'cp';
    const cc = on ? '#d63050' : (CAT[s.cat]?.c || '#aaa');
    // Leader line from dot to nearest edge of pill
    const cx = rect.x + rect.w / 2, cy = rect.y + rect.h / 2;
    const ang = Math.atan2(dy - cy, dx - cx);
    const ex = cx + Math.cos(ang) * Math.min(rect.w/2, Math.abs(rect.w/2 / Math.cos(ang) || rect.w/2));
    const ey = cy + Math.sin(ang) * Math.min(rect.h/2, Math.abs(rect.h/2 / Math.sin(ang) || rect.h/2));
    svgLines += `<line x1="${dx}" y1="${dy}" x2="${ex}" y2="${ey}" stroke="${cc}" stroke-opacity="0.45" stroke-width="1.5" stroke-linecap="round"/>`;
    html += `<div class="${cls}" data-id="${s.id}" style="left:${rect.x}px;top:${rect.y}px;--cc:${cc};transform:none">${panelContent(s, zoom)}</div>`;
  }

  svgEl.innerHTML = svgLines;
  panelsEl.querySelectorAll('.cp').forEach(el => el.remove());
  panelsEl.insertAdjacentHTML('beforeend', html);

  // Event handlers — panels show unified info card
  panelsEl.querySelectorAll('.cp').forEach(el => {
    el.addEventListener('mouseenter', (e) => {
      const s = S.find(x => x.id === el.dataset.id);
      if (s) showInfoCard(s, e.clientX, e.clientY);
    });
    el.addEventListener('mouseleave', () => hideInfoCard());
    el.addEventListener('click', (e) => {
      const s = S.find(x => x.id === el.dataset.id);
      if (s) showInfoCard(s, e.clientX, e.clientY);
    });
  });
}

// Hide panels during map movement (dots stay visible), recalculate on stop
let _highlightId = null;
map.on('movestart', () => {
  panelsEl.style.display = 'none';
});
map.on('moveend', () => { panelsEl.style.display = ''; updatePanels(); if (_highlightId) highlightPill(_highlightId); });

// Sidebar toggle for tablet
function toggleSidebar() {
  const sb = document.getElementById('sidebar');
  sb.classList.toggle('collapsed');
  document.body.classList.toggle('sb-collapsed');
  setTimeout(() => { map.resize(); updatePanels(); }, 280);
}

// Mobile view switching
function mobileView(view) {
  const sb = document.getElementById('sidebar');
  const navBtns = document.querySelectorAll('#mobile-nav .mn-tab');
  navBtns.forEach((b, i) => b.classList.toggle('on',
    (view === 'map' && i === 0) || (view === 'list' && i === 1) ||
    (view === 'route' && i === 2) || (view === 'favs' && i === 3) || (view === 'suggest' && i === 4)
  ));

  if (view === 'map') {
    sb.classList.remove('mobile-visible');
    setTimeout(() => { map.resize(); updatePanels(); }, 50);
  } else {
    sb.classList.add('mobile-visible');
    if (view === 'list') setTab('all');
    else if (view === 'route') setTab('sel');
    else if (view === 'favs') setTab('favs');
    else if (view === 'suggest') setTab('routes');
  }
}

function renderSummary() {
  const pts=sel.map(id=>S.find(s=>s.id===id)).filter(Boolean);
  document.getElementById('s-n').textContent=pts.length;
  if (rLoading) { document.getElementById('s-km').innerHTML='<span class="sp"></span>'; document.getElementById('s-h').innerHTML='<span class="sp"></span>'; }
  else if (rLegs.length) { document.getElementById('s-km').textContent=rLegs.reduce((a,l)=>a+l.km,0).toLocaleString('de'); document.getElementById('s-h').textContent=fmtDur(rLegs.reduce((a,l)=>a+l.min,0)); }
  else { document.getElementById('s-km').textContent='-'; document.getElementById('s-h').textContent='-'; }
  let ni=0; pts.forEach(s=>{const p=s.ni.toString().split('-');ni+=parseFloat(p[p.length-1])||1;});
  document.getElementById('s-ni').textContent=pts.length?`~${Math.round(ni)}`:'-';
}

function flyTo(id) {
  const s=S.find(x=>x.id===id); if(!s) return;
  // On mobile, switch to map view first
  if (window.innerWidth < 768) mobileView('map');
  map.flyTo({center:[s.lng,s.lat],zoom:11,duration:1200,pitch:50});
  setTimeout(()=>{ const p=map.project([s.lng,s.lat]); showInfoCard(s, p.x+400, p.y+100); },1300);
}
function exportRoute() {
  const pts=sel.map(id=>S.find(s=>s.id===id)).filter(Boolean);
  if(!pts.length) return alert('Erst Spots auswählen!');
  window.open('https://www.google.com/maps/dir/'+pts.map(s=>`${s.lat},${s.lng}`).join('/'),'_blank');
}

// Images are pre-baked — show count
const _t = S.reduce((a,s) => a + (imgCache[s.id]?.length||0), 0);
document.getElementById('hdr-sub').textContent = `HU + RO + BG + RS + MK | 3 Wochen \u00b7 ${_t} Fotos`;

// ============================================================
// SAVED ROUTES (Firebase)
// ============================================================
let savedRoutes = {};
db.ref('routes').on('value', snap => {
  savedRoutes = snap.val() || {};
  if (tab === 'routes') renderList(); // refresh if on suggestions tab
});

function saveRouteToDb() {
  const inner = sel.filter(x => x !== homeId());
  if (!inner.length) return alert('Erst Spots zusammenstellen!');
  const who = activePerson ? (TRIP_PEOPLE[activeTrip]?.find(p=>p.id===activePerson)?.name || activePerson) : 'Unbekannt';
  const name = prompt('Route-Name:', who + 's Route');
  if (!name) return;
  const key = Date.now().toString(36);
  db.ref('routes/' + activeTrip + '/' + key).set({
    name: name,
    by: who,
    ids: inner,
    ts: Date.now()
  });
  alert('Route "' + name + '" gespeichert!');
}

function loadSavedRoute(tripId, key) {
  const r = savedRoutes[tripId]?.[key];
  if (!r) return;
  sel = [homeId(), ...r.ids, homeId()];
  localStorage.setItem('vt-sel', JSON.stringify(sel));
  activeRouteIdx = -1;
  setTab('sel');
  render();
  setTimeout(fitRoute, 500);
}

function deleteSavedRoute(tripId, key) {
  if (!confirm('Route wirklich löschen?')) return;
  db.ref('routes/' + tripId + '/' + key).remove();
}

// ============================================================
// ROUTE SHARING via URL hash
// ============================================================
function shareRoute() {
  const inner = sel.filter(x=>x!==homeId());
  if (!inner.length) return alert('Erst Spots auswählen!');
  const hash = '#r=' + inner.join(',');
  const url = location.origin + location.pathname + hash;
  navigator.clipboard.writeText(url).then(() => {
    const btn = document.getElementById('share-btn');
    btn.textContent = 'Link kopiert!';
    setTimeout(() => btn.textContent = 'Teilen', 2000);
  }).catch(() => {
    prompt('Route-Link kopieren:', url);
  });
}

// Load route from URL hash on page load
function loadFromHash() {
  const hash = location.hash;
  if (!hash.startsWith('#r=')) return false;
  const ids = hash.slice(3).split(',').filter(id => S.find(s => s.id === id));
  if (!ids.length) return false;
  sel = [homeId(), ...ids, homeId()];
  localStorage.setItem('vt-sel', JSON.stringify(sel));
  return true;
}

// Also update hash when route changes
const origToggle = toggle;

if (loadFromHash()) {
  setTab('sel');
  render();
  setTimeout(fitRoute, 800);
} else {
  render();
}

// Auto-update: check for new version every 5 minutes
const APP_VERSION = Date.now();
setInterval(async () => {
  try {
    const res = await fetch(location.href, {method:'HEAD', cache:'no-store'});
    const mod = res.headers.get('last-modified');
    if (mod && new Date(mod).getTime() > APP_VERSION) {
      if (confirm('Neue Version verfügbar! Jetzt aktualisieren?')) location.reload();
    }
  } catch(e) {}
}, 5 * 60 * 1000);
</script>
