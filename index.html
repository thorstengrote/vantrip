<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Van-Trip Planner 2026</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚐</text></svg>">
<link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; display: flex; height: 100vh; background: #f5f6f8; color: #1a1a2e; }

  #sidebar {
    width: 420px; min-width: 420px; display: flex; flex-direction: column;
    background: #fff; border-right: 1px solid #e0e3e8; overflow: hidden;
  }
  #sidebar-header { padding: 14px 16px; background: #fff; border-bottom: 1px solid #e0e3e8; }
  #sidebar-header h1 { font-size: 18px; color: #d63050; margin-bottom: 2px; }
  #sidebar-header p { font-size: 11px; color: #6b7280; }

  #filters { padding: 8px 14px; border-bottom: 1px solid #e0e3e8; display: flex; flex-wrap: wrap; gap: 4px; }
  .fbtn { padding: 4px 10px; border: 1px solid #d1d5db; border-radius: 12px; background: #fff; color: #6b7280; font-size: 11px; cursor: pointer; transition: all .15s; }
  .fbtn.on { border-color: var(--c); color: var(--c); background: color-mix(in srgb, var(--c) 8%, white); font-weight: 600; }
  .fbtn:hover { background: #f3f4f6; }

  #controls { padding: 6px 14px; border-bottom: 1px solid #e0e3e8; display: flex; gap: 10px; align-items: center; }
  #controls label { font-size: 11px; color: #4b5563; cursor: pointer; display: flex; align-items: center; gap: 4px; }
  #controls input[type=checkbox] { accent-color: #16a34a; width: 14px; height: 14px; }
  #search { flex: 1; padding: 6px 10px; background: #f9fafb; border: 1px solid #d1d5db; border-radius: 6px; color: #1a1a2e; font-size: 12px; outline: none; }
  #search:focus { border-color: #d63050; box-shadow: 0 0 0 2px rgba(214,48,80,.1); }

  #tabs { display: flex; border-bottom: 1px solid #e0e3e8; }
  .tab { flex: 1; padding: 9px; text-align: center; cursor: pointer; font-size: 12px; color: #9ca3af; background: #fff; font-weight: 500; transition: all .15s; }
  .tab.on { color: #d63050; border-bottom: 2px solid #d63050; background: #fef2f2; }

  #list { flex: 1; overflow-y: auto; background: #fafbfc; }
  .card { padding: 10px 14px 10px 30px; border-bottom: 1px solid #f0f1f3; cursor: pointer; position: relative; display: flex; gap: 10px; align-items: flex-start; background: #fff; transition: background .1s; }
  .card:hover { background: #f9fafb; }
  .card.sel { background: #fef2f2; border-left: 3px solid #d63050; }
  .card-body { flex: 1; min-width: 0; }
  .card .nm { font-size: 13px; font-weight: 600; color: #111827; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .card .sub { font-size: 10px; color: #6b7280; }
  .card .ds { font-size: 11px; color: #4b5563; margin-top: 3px; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .card .tgs { margin-top: 4px; display: flex; gap: 3px; flex-wrap: wrap; }
  .tg { font-size: 9px; padding: 2px 6px; border-radius: 6px; background: #f3f4f6; color: #4b5563; font-weight: 500; }
  .tg.wc { background: #dcfce7; color: #16a34a; }
  .card .rn { position: absolute; left: 6px; top: 12px; width: 18px; height: 18px; border-radius: 50%; background: #d63050; color: #fff; font-size: 10px; font-weight: 700; display: flex; align-items: center; justify-content: center; }

  .card-img { width: 68px; height: 50px; border-radius: 6px; object-fit: cover; flex-shrink: 0; }
  .card-img-ph { width: 68px; height: 50px; border-radius: 6px; background: #f3f4f6; flex-shrink: 0; display: flex; align-items: center; justify-content: center; color: #d1d5db; font-size: 20px; }

  .card-route-btn {
    position: absolute; right: 10px; bottom: 8px;
    width: 24px; height: 24px; border-radius: 50%;
    border: 1.5px solid #d1d5db; background: #fff; color: #9ca3af;
    font-size: 15px; cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: all 0.15s; z-index: 2;
  }
  .card-route-btn:hover { border-color: #d63050; color: #d63050; background: #fef2f2; }
  .card-route-btn.on-route { background: #d63050; color: #fff; border-color: #d63050; }
  .card-route-btn.on-route:hover { background: #b91c3a; }

  .leg { padding: 4px 14px 4px 32px; background: #f9fafb; font-size: 10px; color: #6b7280; display: flex; align-items: center; gap: 5px; border-bottom: 1px solid #f0f1f3; }
  .leg b { color: #d63050; font-weight: 600; }

  /* ===== GUIDE VIEW (Route tab) ===== */
  .gs { padding: 0; border-bottom: 1px solid #e0e3e8; }
  .gs-head { display: flex; align-items: center; gap: 8px; padding: 12px 14px 6px; cursor: pointer; }
  .gs-head:hover { background: #fafbfc; }
  .gs-num { width: 24px; height: 24px; border-radius: 50%; background: #d63050; color: #fff; font-size: 11px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .gs-title { font-size: 14px; font-weight: 700; color: #111827; flex: 1; }
  .gs-nights { font-size: 11px; color: #6b7280; white-space: nowrap; }
  .gs-carousel { margin: 0 14px 8px; border-radius: 8px; overflow: hidden; }
  .gs-carousel .pcr { height: 160px; margin-bottom: 0; }
  .gs-metrics { display: flex; gap: 6px; flex-wrap: wrap; padding: 0 14px 8px; }
  .gs-metrics span { font-size: 10px; background: #f3f4f6; padding: 2px 8px; border-radius: 6px; color: #374151; }
  .gs-body { padding: 0 14px 10px; font-size: 11px; line-height: 1.55; color: #374151; }
  .gs-why { font-size: 11px; color: #d63050; font-style: italic; padding: 0 14px 8px; }
  .gs-section { padding: 6px 14px; font-size: 11px; line-height: 1.5; }
  .gs-section-title { font-size: 10px; font-weight: 700; color: #6b7280; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 3px; }
  .gs-section p { margin: 0; color: #374151; }
  .gs-tags { padding: 4px 14px 8px; display: flex; gap: 3px; flex-wrap: wrap; }
  .gs-actions { display: flex; gap: 4px; padding: 4px 14px 10px; }
  .gs-actions button { flex: 1; }
  .gs-leg {
    display: flex; flex-direction: column; gap: 3px;
    padding: 10px 14px; background: #f3f4f6; border-bottom: 1px solid #e0e3e8;
    font-size: 11px; color: #6b7280;
  }
  .gs-leg-info { display: flex; align-items: center; gap: 6px; font-weight: 600; }
  .gs-leg-info b { color: #d63050; }
  .gs-leg-bar { display: flex; width: 100%; border-radius: 3px; overflow: hidden; gap: 1px; }

  .mvs { position: absolute; right: 10px; bottom: 6px; display: flex; gap: 2px; }
  .mv { width: 20px; height: 20px; border: 1px solid #d1d5db; border-radius: 4px; background: #fff; color: #9ca3af; font-size: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .mv:hover { color: #d63050; border-color: #d63050; }

  #summary { padding: 10px 14px; background: #fff; border-top: 1px solid #e0e3e8; font-size: 11px; color: #6b7280; }
  .stats { display: flex; gap: 14px; margin-bottom: 6px; }
  .st .v { font-size: 16px; font-weight: 700; color: #d63050; }
  .st .l { font-size: 9px; color: #9ca3af; }
  .btns { display: flex; gap: 5px; flex-wrap: wrap; }
  .ab { padding: 5px 12px; border: none; border-radius: 6px; font-size: 11px; cursor: pointer; font-weight: 500; transition: all .15s; }
  .ab1 { background: #d63050; color: #fff; }
  .ab1:hover { background: #b91c3a; }
  .ab2 { background: #f3f4f6; color: #4b5563; border: 1px solid #d1d5db; }
  .ab2:hover { background: #e5e7eb; }

  .sp { display: inline-block; width: 12px; height: 12px; border: 2px solid #e5e7eb; border-top-color: #d63050; border-radius: 50%; animation: spin .6s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  #map { flex: 1; }

  /* ===== POPUP ===== */
  .maplibregl-popup-content { background: #fff !important; color: #1a1a2e !important; border: 1px solid #e0e3e8 !important; border-radius: 12px !important; padding: 12px !important; max-height: 75vh; overflow-y: auto; overflow-x: hidden; box-shadow: 0 4px 20px rgba(0,0,0,.12) !important; }
  .maplibregl-popup-content::-webkit-scrollbar { width: 4px; }
  .maplibregl-popup-content::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 2px; }
  .maplibregl-popup-tip { border-top-color: #fff !important; }
  .maplibregl-popup-close-button { color: #9ca3af; font-size: 22px; padding: 4px 8px; z-index: 10; }
  .maplibregl-popup-close-button:hover { color: #d63050; }
  .maplibregl-popup { max-width: 380px !important; z-index: 5; }
  .maplibregl-popup-anchor-bottom .maplibregl-popup-content { margin-bottom: 10px; }
  .maplibregl-popup-anchor-top .maplibregl-popup-content { margin-top: 10px; }

  .pcr { position: relative; width: 100%; height: 200px; border-radius: 8px; overflow: hidden; margin-bottom: 8px; background: #f3f4f6; }
  .pcr img { width: 100%; height: 100%; object-fit: cover; display: none; }
  .pcr img.vis { display: block; }
  .pcr-ph { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; color: #d1d5db; font-size: 36px; }
  .pcr-arr { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.4); color: #fff; border: none; width: 28px; height: 28px; border-radius: 50%; cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; z-index: 5; backdrop-filter: blur(4px); }
  .pcr-arr:hover { background: rgba(214,48,80,0.8); }
  .pcr-l { left: 6px; }
  .pcr-r { right: 6px; }
  .pcr-dots { position: absolute; bottom: 6px; left: 50%; transform: translateX(-50%); display: flex; gap: 4px; z-index: 5; }
  .pcr-dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,0.4); }
  .pcr-dot.on { background: #fff; }
  .pcr-cnt { position: absolute; top: 8px; right: 8px; background: rgba(0,0,0,0.5); color: #fff; font-size: 10px; padding: 2px 8px; border-radius: 10px; z-index: 5; backdrop-filter: blur(4px); }
  .ptitle { font-size: 15px; font-weight: 700; color: #111827; margin-bottom: 3px; }
  .pcat { font-size: 11px; color: #6b7280; margin-bottom: 5px; }
  .pdesc { font-size: 12px; line-height: 1.5; color: #374151; margin-bottom: 6px; }
  .pwhy { font-size: 11px; color: #d63050; font-style: italic; margin-bottom: 5px; }
  .pwc { font-size: 11px; color: #16a34a; margin-bottom: 5px; font-weight: 500; }
  .pbtn { padding: 6px 14px; border: none; border-radius: 6px; cursor: pointer; font-size: 11px; font-weight: 500; }
  .pbtn-add { background: #d63050; color: #fff; }
  .pbtn-add:hover { background: #b91c3a; }
  .pbtn-rm { background: #f3f4f6; color: #6b7280; }
  .pbtn-rm:hover { background: #e5e7eb; }
  .pgmap-btns { display: flex; gap: 5px; margin-bottom: 6px; }
  .pgmap-btn { flex: 1; padding: 6px; border: 1px solid #e0e3e8; border-radius: 6px; background: #f9fafb; color: #4b5563; font-size: 10px; cursor: pointer; text-align: center; text-decoration: none; display: block; font-weight: 500; }
  .pgmap-btn:hover { border-color: #d63050; color: #d63050; background: #fef2f2; }

  /* Food info */
  .pfood { background: #fffbeb; border: 1px solid #fde68a; border-radius: 8px; padding: 8px 10px; margin-bottom: 6px; }
  .pfood-title { font-size: 11px; color: #b45309; font-weight: 600; margin-bottom: 3px; }
  .pfood-text { font-size: 11px; color: #78350f; line-height: 1.4; }

  /* ===== LIGHTBOX ===== */
  #lightbox { display: none; position: fixed; inset: 0; z-index: 10000; background: rgba(0,0,0,0.9); align-items: center; justify-content: center; flex-direction: column; }
  #lightbox.open { display: flex; }
  #lb-close { position: absolute; top: 16px; right: 20px; background: none; border: none; color: #fff; font-size: 30px; cursor: pointer; z-index: 10001; }
  #lb-title { color: #fff; font-size: 17px; font-weight: 700; margin-bottom: 12px; }
  #lb-wrap { position: relative; width: 80vw; height: 70vh; display: flex; align-items: center; justify-content: center; }
  #lb-img { max-width: 100%; max-height: 100%; border-radius: 10px; object-fit: contain; }
  .lb-arr { position: fixed; top: 50%; transform: translateY(-50%); background: rgba(255,255,255,0.12); color: #fff; border: none; width: 50px; height: 50px; border-radius: 50%; cursor: pointer; font-size: 26px; z-index: 10002; backdrop-filter: blur(4px); }
  .lb-arr:hover { background: rgba(214,48,80,0.6); }
  #lb-prev { left: 20px; }
  #lb-next { right: 20px; }
  #lb-dots { display: flex; gap: 5px; margin-top: 14px; }
  #lb-dots .dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,255,0.25); cursor: pointer; }
  #lb-dots .dot.on { background: #fff; }
  #lb-counter { color: rgba(255,255,255,.5); font-size: 12px; margin-top: 8px; }

  /* Route suggestions */
  .rcard { padding: 12px 14px; border-bottom: 1px solid #f0f1f3; background: #fff; }
  .rcard:hover { background: #f9fafb; }
  .rcard .rtitle { font-size: 14px; font-weight: 700; color: #d63050; margin-bottom: 3px; }
  .rcard .rsub { font-size: 11px; color: #6b7280; margin-bottom: 5px; }
  .rcard .rdesc { font-size: 11px; color: #374151; line-height: 1.5; margin-bottom: 6px; }
  .rcard .rpros { list-style: none; padding: 0; }
  .rcard .rpros li { font-size: 10px; color: #16a34a; padding: 2px 0; }
  .rcard .rpros li::before { content: '+ '; font-weight: 700; }
  .rcard .rbtn { padding: 6px 14px; background: #d63050; color: #fff; border: none; border-radius: 6px; font-size: 11px; cursor: pointer; margin-top: 5px; font-weight: 500; }
  .rcard .rbtn:hover { background: #b91c3a; }

  #list::-webkit-scrollbar { width: 5px; }
  #list::-webkit-scrollbar-track { background: #fafbfc; }
  #list::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 3px; }

  /* ===== CLUSTER PANELS + LEADER LINES ===== */
  #panels-overlay { position: absolute; inset: 0; pointer-events: none; overflow: hidden; z-index: 4; }
  #panels-overlay svg { position: absolute; inset: 0; width: 100%; height: 100%; }

  .cp {
    position: absolute; pointer-events: auto; cursor: pointer;
    background: #fff; color: #1a1a2e;
    border-radius: 14px; padding: 2px 7px 2px 5px;
    box-shadow: 0 1px 6px rgba(0,0,0,.22);
    border: 1.5px solid var(--cc, #aaa);
    font-size: 10px; white-space: nowrap;
    display: flex; align-items: center; gap: 3px;
    line-height: 1.2;
    transition: box-shadow 0.1s, transform 0.1s;
  }
  .cp:hover { box-shadow: 0 3px 14px rgba(0,0,0,.3); z-index: 50 !important; transform: scale(1.05); }
  .cp.cp-route { border-color: #d63050; background: #fef2f2; }
  .cp .cp-icon { font-size: 11px; flex-shrink: 0; }
  .cp .cp-num { background: #d63050; color: #fff; font-size: 7px; font-weight: 700; border-radius: 7px; padding: 0 4px; line-height: 13px; min-width: 13px; text-align: center; }
  .cp .cp-name { font-weight: 600; font-size: 10px; max-width: 120px; overflow: hidden; text-overflow: ellipsis; }
  .cp .cp-temp { font-size: 9px; font-weight: 700; }
  .cp .cp-info { color: #6b7280; font-size: 9px; }
  .cp .cp-detail { font-size: 9px; color: #555; }

  /* ===== UNIFIED INFO CARD (hover/click) ===== */
  #infocard {
    display: none; position: fixed; z-index: 1000;
    background: #fff; color: #1a1a2e;
    border-radius: 12px; width: 320px;
    box-shadow: 0 6px 30px rgba(0,0,0,.25);
    border: 1px solid #e0e3e8;
    pointer-events: auto; cursor: default;
    overflow: hidden;
    max-height: 80vh; overflow-y: auto;
  }
  #infocard::-webkit-scrollbar { width: 4px; }
  #infocard::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 2px; }
  #ic-body { padding: 10px 12px; }
  #ic-body .ptitle { font-size: 14px; }
  #ic-body .pdesc { font-size: 11px; }
  #ic-body .pwhy { font-size: 11px; }
  #ic-body .pbtn { width: 100%; margin-top: 6px; }

  /* Tablet toggle button */
  #sidebar-toggle {
    display: none; position: absolute; top: 10px; left: 10px; z-index: 10;
    width: 36px; height: 36px; border-radius: 8px;
    background: #fff; border: 1px solid #d1d5db; color: #374151;
    font-size: 18px; cursor: pointer;
    box-shadow: 0 2px 8px rgba(0,0,0,.15);
    align-items: center; justify-content: center;
  }
  #sidebar-toggle:hover { background: #f3f4f6; }

  /* Tablet: 768-1199px — narrower sidebar, toggle */
  @media (min-width: 768px) and (max-width: 1199px) {
    #sidebar {
      width: 340px; min-width: 340px;
      position: absolute; left: 0; top: 0; bottom: 0; z-index: 8;
      transition: transform 0.25s ease;
      box-shadow: 2px 0 12px rgba(0,0,0,.1);
    }
    #sidebar.collapsed { transform: translateX(-100%); }
    #sidebar-toggle { display: flex; }
    #sidebar-toggle { left: 350px; transition: left 0.25s ease; }
    body.sb-collapsed #sidebar-toggle { left: 10px; }
    #map { flex: 1; width: 100%; }
    #sidebar-header h1 { font-size: 16px; }
    .card-img { width: 55px; height: 42px; }
    .card-img-ph { width: 55px; height: 42px; }
    .gs-carousel .pcr { height: 130px; }
    #infocard { width: 280px; }
  }

  /* Mobile bottom nav */
  #mobile-nav {
    display: none; position: fixed; bottom: 0; left: 0; right: 0; z-index: 20;
    background: #fff; border-top: 1px solid #e0e3e8;
    box-shadow: 0 -2px 10px rgba(0,0,0,.08);
    padding: 0; height: 52px;
  }
  #mobile-nav .mn-tabs { display: flex; height: 100%; }
  #mobile-nav .mn-tab {
    flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 2px; cursor: pointer; color: #9ca3af; font-size: 9px; font-weight: 600;
    border: none; background: none; transition: color 0.1s;
  }
  #mobile-nav .mn-tab.on { color: #d63050; }
  #mobile-nav .mn-tab .mn-icon { font-size: 18px; }

  /* Mobile: <768px */
  @media (max-width: 767px) {
    body { flex-direction: column; position: relative; }
    #sidebar {
      width: 100%; min-width: unset; height: 100vh; height: 100dvh;
      position: absolute; inset: 0; z-index: 9;
      padding-bottom: 52px;
      display: none;
    }
    #sidebar.mobile-visible { display: flex; }
    #map { width: 100%; height: 100vh; height: 100dvh; padding-bottom: 52px; }
    #mobile-nav { display: block; }
    #sidebar-header h1 { font-size: 15px; }
    #sidebar-header p { font-size: 10px; }
    #summary { font-size: 10px; padding: 8px 10px; }
    #summary .btns { flex-wrap: wrap; }
    #summary .ab { font-size: 10px; padding: 4px 8px; }
    .card { padding: 8px 10px 8px 26px; }
    .card .nm { font-size: 12px; }
    .card .rn { left: 4px; top: 10px; width: 16px; height: 16px; font-size: 9px; }
    .card-img { width: 56px; height: 42px; }
    .card-img-ph { width: 56px; height: 42px; }
    #infocard { width: calc(100vw - 20px); max-width: 320px; max-height: 70vh; left: 10px !important; right: 10px; }
    .gs-carousel .pcr { height: 140px; }
    .gs-body { font-size: 12px; }
    .gs-section p { font-size: 11px; }
    #sidebar-toggle { display: none !important; }
    #filters { padding: 6px 10px; }
    #controls { padding: 4px 10px; }
    #tabs .tab { padding: 7px; font-size: 11px; }
    .cp { font-size: 9px; padding: 2px 4px 2px 3px; }
  }
</style>
</head>
<body>

<div id="sidebar">
  <div id="sidebar-header">
    <h1>Van-Trip Planner 2026</h1>
    <p id="hdr-sub">RO + BG + RS + MK | 3 Wochen</p>
  </div>
  <div id="filters"></div>
  <div id="controls">
    <label><input type="checkbox" id="wc-chk" onchange="render()"> Wild-Camping</label>
    <label><input type="checkbox" id="food-chk" onchange="render()"> Kulinarik</label>
    <input type="text" id="search" placeholder="Suchen..." oninput="renderList()">
  </div>
  <div id="tabs">
    <div class="tab on" data-t="all" onclick="setTab('all')">Alle <span id="n-all"></span></div>
    <div class="tab" data-t="sel" onclick="setTab('sel')">Route <span id="n-sel"></span></div>
    <div class="tab" data-t="routes" onclick="setTab('routes')">Vorschläge</div>
  </div>
  <div id="list"></div>
  <div id="summary">
    <div class="stats">
      <div class="st"><span class="v" id="s-n">0</span><span class="l"> Stops</span></div>
      <div class="st"><span class="v" id="s-km">-</span><span class="l"> km</span></div>
      <div class="st"><span class="v" id="s-h">-</span><span class="l"> Fahrzeit</span></div>

  'salina-turda': {title:'Turda/Cluj', text:'Cluj = Studentenstadt mit bester Food-Szene Rumäniens. Piata Mihai Viteazu Markt. Kürtőskalács. In Turda selbst: Cantinas + Pizzerien. 4 Pers. ~15-18€.'},
  'viscri': {title:'Viscri/Sächsische Dörfer', text:'Bauern verkaufen an Zäunen: Telemea, Urdă, Eier, Honig. Pensiuni kochen Hausmannskost vom Hof. "Aveți masă?" fragen. Bestes Essen Rumäniens. 4 Pers. ~10€.'},
  '7-scari': {title:'Brașov-Umgebung', text:'Siehe Brașov. Nach der Via Ferrata: Terrassen-Restaurant in Zărnești. Lokale Ciorbă + Mici zur Belohnung.'},
  'cheile-rametului': {title:'Alba-Region', text:'Alba Iulia Markt für Proviant. Kleine Lokale am Gorge-Eingang. Bauern-Käse entlang der Zufahrt.'},
  'matka-canyon': {title:'Matka/Skopje', text:'Skopje Old Bazaar: Döner, Burek, Kebapi extrem günstig. Tavče Gravče (Bohnen im Tontopf) = Nationalgericht, überall. Am Matka Canyon: Restaurant mit Terrasse über dem Wasser. 4 Pers. ~12-15€.'},
  'prespa-lake': {title:'Prespa-Region', text:'Stenje-Dorf: kleine Taverna am Strand, Fisch aus dem See. Bitola (30min): grössere Auswahl, Bazaar. Sehr günstig.'},
  'prizren': {title:'Prizren Essen', text:'Riverside-Cafes an der Steinernen Brücke. Flija (geschichteter Pfannkuchen) = Kosovo-Spezialität. Burek + Jogurt überall. Extrem günstig, extrem gastfreundlich. 4 Pers. ~8-12€.'},
  'rugova-gorge': {title:'Peja-Region', text:'Peja hat lebhaften Bazaar. Gegrilltes Lamm, Fli (Kosovo-Crêpe). Patriarchat-Kloster hat manchmal Essen.'},
  'meteora': {title:'Meteora/Kalabaka', text:'Kalabaka: griechische Tavernas mit Moussaka, Souvlaki, Tzatziki. Teurer als Balkan aber OK. Lokaler Tsipouro (Trester-Schnaps). 4 Pers. ~20-25€.'},
  'wonderful-bridges': {title:'Rhodopen unterwegs', text:'Zwischen Shiroka Laka und Trigrad: keine Restaurants, Proviant mitnehmen! Nächste Mehana in Shiroka Laka oder Trigrad.'},
  'yagodina-cave': {title:'Trigrad-Region', text:'Siehe Trigrad. 1-2 kleine Lokale in Yagodina-Dorf. Schafskäse direkt von Hirten. Mursalski Chai (Rhodopen-Kräutertee) kaufen!'},
  'erma-gorge': {title:'Grenz-Essen', text:'Pirot (RS): berühmt für Pirotski Kačkavalj (Hartkäse). Tran (BG): einfache Mehana. Grenzregion = Mix aus serbischer + bulgarischer Küche.'},

// ============================================================
// GUIDE TEXTS (Marco-Polo-style narratives per spot)
// ============================================================
const GUIDE = {
  'bonn': 'Uedorf, Bornheim \u2013 hier startet und endet euer Balkan-Abenteuer. K\u00fchlbox voll, Tank voll, Playlist an \u2013 los geht\u2019s!',
  'budapest': 'Budapest ist der perfekte Warmup f\u00fcr den Balkan \u2013 st\u00fcrzt euch als Erstes ins Sz\u00e9chenyi-Thermalbad (Tageskarte ~25\u20ac, Schachspieler im warmen Becken inklusive) und lasst den Abend in den Ruinenbars im J\u00fcdischen Viertel ausklingen, allen voran Szimpla Kert. In der Gro\u00dfen Markthalle unten Langos mit Sauerrahm holen, oben gibt\u2019s Paprikapulver als Mitbringsel f\u00fcr daheim. Mit dem Van parkt ihr am besten in einem der bewachten P+R-Parkpl\u00e4tze am Stadtrand (z.B. Kelenf\u00f6ld, ~5\u20ac/Tag) und fahrt mit der Metro rein \u2013 in der Innenstadt ist Parken die H\u00f6lle. Plant 1-2 N\u00e4chte ein, mehr braucht ihr nicht, denn die wahren Highlights warten s\u00fcdlich der Donau.',
  'sibiu': 'Sibiu hat die vielleicht sch\u00f6nste Altstadt Rum\u00e4niens \u2013 die Pia\u021ba Mare mit ihren pastellfarbenen H\u00e4usern und den ber\u00fchmten \u201eAugenlidern\u201c auf den D\u00e4chern ist wie ein Filmset, nur echt. Abends setzt ihr euch in eine der Kneipen in der Fu\u00dfg\u00e4ngerzone und esst Ciorb\u0103 de burt\u0103 (Kuttelsuppe, klingt wild, schmeckt genial) f\u00fcr unter 5\u20ac pro Person. Der Van steht gut auf dem gro\u00dfen Parkplatz am Stadion oder Richtung Sub Arini Park \u2013 nachts ist es dort ruhig genug zum Pennen, aber checkt vorher die Schilder. Zwei N\u00e4chte sind perfekt: einen Tag Altstadt mit Br\u00fcckengasse und ASTRA-Freilichtmuseum, einen Tag einfach treiben lassen.',
  'brasov': 'Bra\u0219ov liegt eingeklemmt zwischen steilen Bergen und f\u00fchlt sich an wie eine Mischung aus Freiburg und Transsilvanien-Filmkulisse. Fahrt unbedingt mit der Tampa-Seilbahn hoch \u2013 oben habt ihr den Hollywood-Sign-Blick auf die Stadt, nur mit \u201eBRA\u0218OV\u201c in Riesenlettern. Die Schwarze Kirche ist die gr\u00f6\u00dfte gotische Kirche zwischen Wien und Istanbul. Zum Parken und Freistehen eignet sich der Parkplatz am Lago di Noua s\u00fcdlich der Stadt, direkt am See \u2013 morgens k\u00f6nnt ihr dort sogar schwimmen gehen. Plant zwei N\u00e4chte: tags\u00fcber Altstadt und Berge, abends auf der Strada Republicii g\u00fcnstig essen.',
  'sighisoara': 'Sighi\u0219oara ist eine der letzten bewohnten mittelalterlichen Festungsst\u00e4dte Europas und UNESCO-Welterbe \u2013 ihr lauft durch kopfsteingepflasterte Gassen, vorbei am Stundturm, und f\u00fchlt euch wie im 14. Jahrhundert. Hier wurde Vlad Dr\u0103culea geboren, der Typ hinter der Dracula-Legende, und sein Geburtshaus ist heute ein Restaurant. Parkt den Van unten am Fu\u00df der Zitadelle auf dem gro\u00dfen \u00f6ffentlichen Parkplatz und geht zu Fu\u00df hoch \u2013 die Gassen sind zu eng f\u00fcr alles \u00fcber Schubkarre. Die gedeckte Sch\u00fclertreppe mit 175 Holzstufen hoch zur Bergkirche ist magisch im Abendlicht.',
  'alba-iulia': 'Die sternf\u00f6rmige Vauban-Festung von Alba Iulia ist eine der besterhaltenen Europas \u2013 und komplett kostenlos begehbar. Kommt unbedingt abends: die gesamte Festung wird spektakul\u00e4r beleuchtet, und ihr k\u00f6nnt stundenlang \u00fcber die Bastionen spazieren, w\u00e4hrend die Kids auf den Wiesen toben. Tags\u00fcber gibt\u2019s eine Wachabl\u00f6sung im historischen Kost\u00fcm und mehrere kleine Museen. Der Van passt problemlos auf den gro\u00dfen Parkplatz direkt vor der Festung \u2013 f\u00fcr eine Nacht freistehen kein Problem.',
  'transfagarasan': 'Die Transf\u0103g\u0103r\u0103\u0219an ist laut Top Gear \u201edie beste Stra\u00dfe der Welt\u201c \u2013 und sie haben recht. Serpentine um Serpentine schraubt ihr euch auf 2.042 Meter, vorbei an Wasserf\u00e4llen und Abgr\u00fcnden, und oben am B\u00e2lea-Gletscher wartet ein Bergsee. Fahrt unbedingt von S\u00fcden nach Norden \u2013 so habt ihr die Bergseite und die besseren Aussichten. Bei der B\u00e2lea Cascad\u0103 k\u00f6nnt ihr kostenlos \u00fcber Nacht stehen, Toilette vorhanden, und der Wasserfall donnert euch in den Schlaf. Achtung: Die Passstra\u00dfe ist nur ca. Juni bis Oktober offen \u2013 vorher online checken.',
  'piatra-craiului': 'Das Piatra Craiului-Massiv ist ein messerscharfer Kalksteingrat, der sich 25 Kilometer wie ein Dinosaurierr\u00fccken \u00fcber die Landschaft zieht \u2013 von Bra\u0219ov in einer Stunde erreichbar. Bei Pe\u0219tera parkt ihr den Van auf den Wiesen am Dorfrand (frei, ruhig, Kuhglocken als Wecker) und wandert von dort direkt in den Nationalpark. Die Wiesen rund um Pe\u0219tera sind ein Traum: Wildblumen bis zur H\u00fcfte, Blick auf die Felswand, und abends absolute Stille. F\u00fcr Familien ist der Weg durch die Z\u0103rne\u0219ti-Klamm perfekt \u2013 flach, schattig, spektakul\u00e4r.',
  'retezat': 'Der Retezat ist Rum\u00e4niens wildester Nationalpark \u2013 \u00fcber 80 Gletscherseen, Urw\u00e4lder, B\u00e4ren, W\u00f6lfe, und ihr seid manchmal stundenlang allein auf dem Trail. Der Einstieg \u00fcber Gura Zlata ist am besten f\u00fcr den Van: Schotterstra\u00dfe (machbar, aber langsam), Parkplatz am Ende, und von dort in 2-3 Stunden zu den ersten Bergseen. Freistehen am Parkplatz Gura Zlata ist \u00fcblich \u2013 andere Camper stehen dort auch, es gibt eine Ranger-Station. Packt alles Essbare b\u00e4rensicher weg und macht abends L\u00e4rm, wenn ihr im Dunkeln unterwegs seid.',
  'padis': 'P\u0103dis ist das Karst-Hochplateau der Apuseni-Berge \u2013 ein labyrinthartiges Wunderland aus Dolinen, H\u00f6hlen und unterirdischen Fl\u00fcssen, das sich anf\u00fchlt wie das Auenland nach einem Regentag. Die Zufahrt ist Schotterstra\u00dfe (teils ruppig, bei Regen matschig \u2013 Bodenfreiheit ist euer Freund), aber genau das h\u00e4lt die Massen fern. Oben k\u00f6nnt ihr frei stehen, es gibt verstreute H\u00fctten f\u00fcr Essen und die legend\u00e4re Cet\u0103\u021bile Ponorului \u2013 eine Riesendoline, in die ein ganzer Fluss verschwindet. Padis ist off-grid pur: kein Handynetz, kein Strom, nur ihr und die Wildnis.',
  'scarisoara': 'Die Sc\u0103ri\u0219oara-Eish\u00f6hle beherbergt einen 3.500 Jahre alten Eisblock \u2013 den gr\u00f6\u00dften unterirdischen Gletscher Europas. W\u00e4hrend es drau\u00dfen 38\u00b0C hat, steigt ihr 700 Stufen hinab in eine 0\u00b0C-Welt aus schimmernden Eiss\u00e4ulen und gefrorenen Seen \u2013 packt Jacken ein, auch im Hochsommer! Der Eintritt kostet wenige Lei, und eine F\u00fchrung dauert ca. 30 Minuten. Parken direkt oben am Eingang, der Van steht problemlos. Kombiniert den Besuch mit P\u0103dis, das liegt gleich um die Ecke.',
  'cheile-nerei': 'Cheile Nerei ist DER Geheimtipp: t\u00fcrkisblaue Naturpools in einer wilden Kalkstein-Klamm, die aussehen wie Photoshop, aber echt sind. Vom Parkplatz bei Sasca Rom\u00e2n\u0103 wandert ihr flussaufw\u00e4rts zum V\u0103ioaga-Wasserfall \u2013 der st\u00fcrzt spektakul\u00e4r \u00fcber eine Mooskante, und darunter liegt ein Pool, der zum Klippenspringen einl\u00e4dt. Das Wasser hat 20-22\u00b0C \u2013 perfekt zum Schwimmen, kalt genug zum Aufwachen. Freistehen ist am Parkplatz oder auf den Wiesen vor der Klamm m\u00f6glich. Plant mindestens einen vollen Tag ein: morgens wandern, mittags im Pool liegen, nachmittags weiter flussauf \u2013 es wird immer sch\u00f6ner.',
  'olt-valley': 'Das Olt-Tal unterhalb des Turnu Ro\u0219u Passes bietet riesige, flache Felsen direkt am Wasser \u2013 nat\u00fcrliche Sonnenterrassen, auf denen ihr den ganzen Tag faulenzen k\u00f6nnt. Das Wasser ist 20-23\u00b0C warm, seicht genug f\u00fcr Kinder an den Kiesb\u00e4nken und tief genug zum Schwimmen in den Gumpen. Ihr fahrt mit dem Van direkt ans Wasser \u2013 mehrere Stellen entlang der Stra\u00dfe haben Zufahrten zu Kiesb\u00e4nken, wo ihr freistehen k\u00f6nnt. Grill aufbauen, Wassermelone ins Wasser zum K\u00fchlen, und ihr habt den perfektesten Strandtag ohne Meer.',
  'cerna-valley': 'Das Cerna-Tal ist ein geologisches Wunder: warmes Thermalwasser (25-30\u00b0C!) flie\u00dft direkt in den Fluss, und an manchen Stellen k\u00f6nnt ihr in nat\u00fcrlichen hei\u00dfen Pools baden wie in einem Gratis-Spa. Die ber\u00fchmteste Stelle sind die 7 hei\u00dfe Quellen bei B\u0103ile Herculane \u2013 folgt dem Wanderweg flussaufw\u00e4rts, und nach 20-30 Minuten findet ihr die warmen Becken direkt am Flussufer. Der Van steht gut am Parkplatz beim verlassenen Casino von B\u0103ile Herculane (das allein ist schon einen Foto-Stopp wert \u2013 grandioser Verfall). Baden im warmen Fluss bei Sternenhimmel \u2013 das ist Peak-Vanlife.',
  'valea-stan': 'Das Valea lui Stan bei Arefu ist ein verstecktes Tal mit kristallklaren Pools und einem Wasserfall, das kaum ein Tourist kennt. Das Wasser ist erfrischende 18-22\u00b0C und so klar, dass ihr jeden Stein auf dem Grund seht. Die Zufahrt ist eine schmale, kurvige Stra\u00dfe ab Arefu (ja, das Dorf unter der Burg Poenari, Draculas ECHTE Burg!) \u2013 der Van passt, aber eng wird\u2019s. Tipp: Arefu und den Aufstieg zu Poenari (1.480 Stufen, Oberschenkel-Killer) gleich mitnehmen \u2013 die Kombi aus Wildbach und Vampirburg ist unschlagbar.',
  '7-scari': 'Die 7 Sc\u0103ri (7 Leitern) bei Bra\u0219ov sind DAS Abenteuer f\u00fcr Teenager: eine Via-Ferrata-Route mit Metallleitern, Seilen, Br\u00fccken und einer Zipline durch eine enge Klamm \u2013 wie ein Outdoor-Kletterpark, aber in wilder Natur. Ihr braucht keine Ausr\u00fcstung, nur festes Schuhwerk und H\u00e4nde zum Festhalten. Die Route dauert ca. 1-2 Stunden und ist auch f\u00fcr fitte Kinder ab 10 machbar. Parkt am Wanderparkplatz bei Timi\u0219ul de Jos und folgt der Markierung. Danach haben alle was zu erz\u00e4hlen.',
  'corvin-castle': 'Die Burg Corvin in Hunedoara ist eine gotische Ritterburg wie aus einem Fantasy-Film \u2013 Zugbr\u00fccke, T\u00fcrme, Ritter-Saal, und ja, Game-of-Thrones-Vibes ohne Ende. F\u00fcr Kinder und Teenager ist das ein absoluter Hit: man kann gef\u00fchlt stundenlang durch Wehrg\u00e4nge, \u00fcber Treppen und in Kerker klettern. Der Eintritt kostet wenige Euro, und das Preis-Leistungs-Verh\u00e4ltnis ist unschlagbar. Danach fahrt ihr die 15 Minuten zum Cinci\u0219-See \u2013 ein ruhiger Stausee, wo ihr schwimmen und den Van f\u00fcr die Nacht abstellen k\u00f6nnt.',
  'salina-turda': 'Die Salina Turda ist kein normales Bergwerk, sondern ein unterirdischer Freizeitpark 120 Meter unter der Erde \u2013 mit Riesenrad, Ruderbooten auf einem unterirdischen See, Bowling und Tischtennisplatten in einer kathedralengro\u00dfen Salzkammer. Die Luft da unten ist k\u00fchl (~12\u00b0C) und gut f\u00fcr die Lunge, also Jacke mitnehmen. F\u00fcr Familien ist das ein Volltreffer: die Kids flippen aus, und ihr k\u00f6nnt stundenlang unten bleiben. Tipp: kommt fr\u00fch morgens oder sp\u00e4t nachmittags \u2013 mittags schieben sich Reisebusse durch den Eingang.',
  'viscri': 'Viscri ist ein Dorf, in dem die Zeit irgendwann im 19. Jahrhundert stehen geblieben ist \u2013 Pferdewagen auf ungeteerten Stra\u00dfen, Sachsen-Kirchenburg auf dem H\u00fcgel, und an den Z\u00e4unen h\u00e4ngen Schilder \u201eK\u00e4se zu verkaufen\u201c. Prince Charles hat hier ein Haus gekauft und das Dorf damit ber\u00fchmt gemacht, aber es ist trotzdem authentisch geblieben. Die Kirchenburg ist UNESCO-Welterbe \u2013 oben im Turm habt ihr Blick \u00fcber das ganze Tal. Freistehen mit dem Van geht auf der Wiese am Dorfrand. Kauft den B\u00fcffelk\u00e4se an den Z\u00e4unen, dazu frisches Brot aus dem Dorfladen \u2013 besseres Fr\u00fchst\u00fcck gibt es nicht.',
  'cheile-rametului': 'Die Cheile R\u00e2me\u021bului bei Alba Iulia sind eine enge Kalkstein-Klamm mit smaragdgr\u00fcnen Pools, die im Sonnenlicht leuchten wie Edelsteine \u2013 und kaum einer kennt sie. Vom Parkplatz bei R\u00e2me\u021b wandert ihr ca. 30-40 Minuten den Bach entlang, und die Pools werden immer sch\u00f6ner, je weiter ihr reingeht. Das Wasser hat 19-22\u00b0C, glasklar, und an mehreren Stellen kann man von den Felsen reinspringen. Perfekt als Halbtagstrip von Alba Iulia aus \u2013 morgens Festung, nachmittags Klamm, abends Grill am Van.',
  'veliko-tarnovo': 'Die alte Zarenhauptstadt klebt spektakul\u00e4r an steilen H\u00fcgeln \u00fcber dem Jantra-Fluss \u2013 wenn abends die Lichtshow die Tsarevets-Festung in Flammen taucht, bekommt ihr G\u00e4nsehaut. Tags\u00fcber durch die kopfsteingepflasterten Gassen schlendern, abends f\u00fcr 3-4 Euro pro Person bulgarisch essen gehen. Mit dem Van lieber ins ruhige Arbanasi oberhalb ausweichen, dort gibt es Stellpl\u00e4tze mit Blick \u00fcbers Tal. Die Shopska-Salata hier ist die beste Bulgariens \u2013 Tomaten wie aus Omas Garten, dazu ein Zagorka-Bier f\u00fcr unter einem Euro.',
  'plovdiv': 'Plovdiv ist 6000 Jahre alt und trotzdem die lebendigste Stadt Bulgariens \u2013 im r\u00f6mischen Amphitheater finden immer noch Konzerte statt, und im Kapana-Viertel reiht sich ein winziges Caf\u00e9 ans n\u00e4chste. Parkt den Van au\u00dferhalb der Altstadt und erkundet alles zu Fu\u00df, die bunten Wiedergeburtsh\u00e4user in den Gassen sind ein Traum. Essen ist hier absurd g\u00fcnstig: ein komplettes Abendessen mit Wein kostet selten mehr als 8 Euro pro Person. Abends auf den Nebet Tepe klettern, von dort seht ihr die ganze Stadt im Sonnenuntergang gl\u00fchen.',
  'melnik': 'Melnik ist offiziell die kleinste Stadt Bulgariens \u2013 gerade mal eine Handvoll H\u00e4user, eingeklemmt zwischen unwirklichen Sandstein-Pyramiden, die aussehen wie von einem anderen Planeten. Hier dreht sich alles um Wein: in den k\u00fchlen Felskellern k\u00f6nnt ihr den dunklen Melnik-Rotwein direkt vom Fass probieren, die Flasche f\u00fcr 3-4 Euro. Am Ortsrand gibt es Stellm\u00f6glichkeiten mit Blick auf die Pyramiden. Dazu in einer der Mehanas hausgemachte Baniza und gegrilltes Fleisch bestellen \u2013 Bulgarien zum Anfassen.',
  'rila-monastery': 'Das Rila-Kloster ist der Wahnsinn \u2013 die UNESCO-Fresken an den Arkadenw\u00e4nden explodieren f\u00f6rmlich vor Farbe und Detailreichtum, plant mindestens zwei Stunden ein. Das Kloster selbst liegt auf 1150m, entsprechend angenehm k\u00fchl auch im Hochsommer. Zum Freistehen den Van am Rilska-Fluss flussabw\u00e4rts abstellen, dort gibt es schattige Pl\u00e4tze zwischen den Kiefern. Im Fluss k\u00f6nnt ihr euch nach der Besichtigung die F\u00fc\u00dfe k\u00fchlen, das Wasser ist glasklar. Fr\u00fchmorgens hingehen, dann habt ihr die gewaltige Anlage fast f\u00fcr euch allein.',
  'rhodope': 'Die Rhodopen sind das Herzst\u00fcck eurer Bulgarien-Route \u2013 ein riesiges, d\u00fcnn besiedeltes Gebirge auf 1000 bis 1500 Metern, wo ihr nachts die Milchstra\u00dfe seht und tags\u00fcber kaum einer Menschenseele begegnet. Hier ist Wildcamp-Paradies: weiche Wiesen, Quellwasser, k\u00fchle N\u00e4chte auch im August. Die Stra\u00dfen sind teilweise abenteuerlich eng und kurvig, aber mit dem Van machbar \u2013 einfach Zeit einplanen und den Weg genie\u00dfen. In den verstreuten D\u00f6rfern gibt es hausgemachten Joghurt und Honig direkt vom Imker f\u00fcr fast nichts. Nehmt genug Vorr\u00e4te mit, Superm\u00e4rkte sind hier Mangelware.',
  'trigrad-gorge': 'Die Trigrad-Schlucht ist der dramatischste Ort der Rhodopen \u2013 300 Meter hohe senkrechte Felsw\u00e4nde, dazwischen rauscht der Fluss in die Teufelskehle-H\u00f6hle und verschwindet einfach im Berg. Die H\u00f6hle k\u00f6nnt ihr mit F\u00fchrung besichtigen, der Moment wenn ihr vor dem tosenden Untergrund-Wasserfall steht, ist unvergesslich. Das Wasser im Fluss hat 14-18\u00b0C \u2013 perfekt zum Reinspringen nach einem hei\u00dfen Wandertag. Freistehen oberhalb der Schlucht auf den Wiesen, dort stehen oft andere Vans.',
  'buinovsko': 'Das Buinovsko-Tal ist der ruhigere Nachbar der Trigrad-Schlucht und f\u00fcr Wasserratten der bessere Tipp \u2013 das Wasser ist noch klarer, die Pools tiefer, und ihr habt alles f\u00fcr euch. Bei 15-19\u00b0C Wassertemperatur ist es erfrischend, aber nach f\u00fcnf Minuten gew\u00f6hnt man sich dran. Der Fluss hat mehrere nat\u00fcrliche Becken, in denen ihr richtig schwimmen k\u00f6nnt, zwischen moosbedeckten Felsen. Zum Freistehen den Van einfach an einer der Wiesen am Talrand abstellen. Ein Geheimtipp, den kaum ein Reisef\u00fchrer erw\u00e4hnt.',
  'shiroka-laka': 'Shiroka Laka ist das sch\u00f6nste Dorf der Rhodopen \u2013 die alten Steinh\u00e4user mit ihren Holzbalkonen kleben am Hang wie Schwalbennester \u00fcber dem Fluss. Im Fluss selbst gibt es nat\u00fcrliche Pools zwischen den Felsen, perfekt f\u00fcr eine Abk\u00fchlung nach dem Dorf-Spaziergang. Im Sommer ist es hier oben angenehm k\u00fchl, w\u00e4hrend die K\u00fcste br\u00fctet. Freistehen etwas au\u00dferhalb am Fluss entlang, abends in der Dorfkneipe Kavarma bestellen und dazu Rakia trinken. Das Dorf ist auch ber\u00fchmt f\u00fcr seine Dudelsack-Tradition.',
  'belogradchik': 'Die Felsen von Belogradchik sehen aus wie eine Armee versteinerter Riesen \u2013 bizarre rote Sandstein-T\u00fcrme und Figuren, die sich \u00fcber die Landschaft erheben und in die eine r\u00f6misch-osmanische Festung hineingebaut wurde. Vom Festungsturm habt ihr einen 360-Grad-Blick \u00fcber dieses surreale Panorama, Eintritt kostet fast nichts. Zum Freistehen gibt es ruhige Feldwege in der Umgebung. Verpasst nicht den Sonnenuntergang, wenn die Felsen feuerrot leuchten.',
  'devetashka': 'Die Devetashka-H\u00f6hle ist absolut irre \u2013 ein gigantisches Portal, gro\u00df genug f\u00fcr einen Jumbo-Jet, dahinter eine Halle mit L\u00f6chern in der Decke, durch die Lichts\u00e4ulen fallen wie in einem Sci-Fi-Film. Kein Wunder, dass hier Expendables 2 gedreht wurde. Die H\u00f6hle ist frei zug\u00e4nglich, einfach vom Van-Parkplatz ein paar Minuten zu Fu\u00df. In der N\u00e4he flie\u00dft der Osam-Fluss, dort k\u00f6nnt ihr freistehen und euch abk\u00fchlen. Kombiniert den Besuch mit den Krushuna-Wasserf\u00e4llen, die sind nur 20 Minuten entfernt.',
  'pirin': 'Das Pirin-Gebirge ist UNESCO-Welterbe und Bulgariens wildestes Hochgebirge \u2013 schroffe Granitgipfel \u00fcber 2700 Meter, Gletscherseen und uralte Schwarzkiefern. Von Bansko aus starten die besten Wanderungen, die Gondel bringt euch hoch und spart H\u00f6henmeter. Oben erwartet euch alpine Landschaft, die locker mit den Alpen mithalten kann \u2013 nur ohne die Massen. Der Van bleibt in Bansko, dort gibt es gute Stellpl\u00e4tze und abends die beste Mehana-K\u00fcche f\u00fcr kleines Geld.',
  'mogilitsa-arda': 'Das ist euer absoluter Top-Badespot in Bulgarien \u2013 die Arda flie\u00dft hier zwischen riesigen runden Granitfelsen hindurch und bildet tiefe, smaragdgr\u00fcne Pools zum Reinspringen. Das Wasser hat 22-25\u00b0C im Sommer, also wirklich warm genug zum lange Plantschen. Von den Felsen kann man perfekt ins Wasser springen, die Kids werden nicht mehr rauskommen wollen. Freistehen direkt am Fluss ist m\u00f6glich, morgens wacht ihr zum Rauschen des Wassers auf. Nehmt Proviant mit, hier gibt es keinen Laden.',
  'devils-bridge': 'Die Teufelsbr\u00fccke ist eine osmanische Steinbogenbr\u00fccke aus dem 16. Jahrhundert, die sich dramatisch \u00fcber die Arda spannt \u2013 das Spiegelbild im Wasser formt einen perfekten Kreis, ein Foto-Muss. Unterhalb der Br\u00fccke k\u00f6nnt ihr wunderbar baden, das Wasser ist 22-25\u00b0C warm und die Pools zwischen den Felsen tief genug zum Schwimmen. Packt ein Picknick ein und verbringt den halben Tag hier. Freistehen geht auf dem Parkplatz oberhalb.',
  'madzharovo-arda': 'In Madzharovo kreisen G\u00e4nsegeier \u00fcber euren K\u00f6pfen w\u00e4hrend ihr im 24-26\u00b0C warmen Wasser der Arda treibt \u2013 das ist der w\u00e4rmste Fluss-Badespot der Route, fast wie ein nat\u00fcrliches Freibad. Die Geier-Kolonie ist eine der gr\u00f6\u00dften Europas, mit dem Fernglas seht ihr sie direkt von den Badestellen aus. Freistehen am Fluss ist easy, ihr findet mehrere Stellen mit direktem Wasserzugang. Abends Lagerfeuer am Flussufer, Sterne gucken, und den Geiern beim Heimflug zusehen.',
  'krushuna': 'Die Krushuna-Wasserf\u00e4lle sind ein System aus Kaskaden und nat\u00fcrlichen Travertin-Pools, die sich durch den Wald ziehen wie eine Treppe aus t\u00fcrkisem Wasser. Das Wasser hat 18-20\u00b0C \u2013 frisch, aber an einem hei\u00dfen Sommertag genau richtig zum Reinspringen. Der Wanderweg zu den F\u00e4llen ist kurz und auch mit Kindern gut machbar, oben gibt es eine H\u00f6hle als Bonus. Kombiniert das unbedingt mit der Devetashka-H\u00f6hle nebenan \u2013 perfektes Tagesprogramm.',
  'wonderful-bridges': 'Die Wunderbr\u00fccken sind zwei gewaltige nat\u00fcrliche Felsbr\u00fccken im dichten Rhodopen-Nadelwald \u2013 die gr\u00f6\u00dfere spannt sich 15 Meter hoch \u00fcber eine Schlucht und ihr k\u00f6nnt oben dr\u00fcber laufen. Das Licht f\u00e4llt durch die Felsl\u00f6cher wie in einer Kathedrale, morgens wenn der Nebel noch zwischen den B\u00e4umen h\u00e4ngt, ist es magisch. Die Forststra\u00dfe dorthin ist mit dem Van machbar, aber Bodenfreiheit hilft. Verbindet das mit Trigrad und Yagodina \u2013 die sind nicht weit.',
  'yagodina-cave': 'Die Yagodina-H\u00f6hle ist eine der beeindruckendsten H\u00f6hlen Bulgariens \u2013 drei Etagen voller bizarrer Tropfstein-Formationen, unterirdische Seen und G\u00e4nge, die sich \u00fcber 10 Kilometer erstrecken. Die F\u00fchrung dauert etwa eine Stunde und ist auch f\u00fcr Kinder spannend, in der H\u00f6hle hat es konstant 6\u00b0C, also Jacke mitnehmen. Die Lage mitten in den Rhodopen auf \u00fcber 1000 Metern macht sie zum perfekten Zwischenstopp zwischen Trigrad und Shiroka Laka. Die Kombination aus H\u00f6hle morgens und Fluss-Baden am Nachmittag \u2013 perfekter Rhodopen-Tag.',
  'sithonia': 'Sithonia ist der mittlere Finger von Chalkidiki und der wildeste der drei \u2013 an der Westk\u00fcste verstecken sich Buchten wie Kavourotrypes mit t\u00fcrk isem Wasser, die aussehen wie Karibik, nur mit Pinien statt Palmen. Im Hochsommer wird es voll, also fr\u00fch morgens anrollen oder die weniger bekannten Buchten suchen. Freistehen ist offiziell schwierig geworden, aber mit dem Van findet ihr entlang der K\u00fcstenstra\u00dfe noch Spots unter Olivenb\u00e4umen. Das Wasser hat 24-26\u00b0C, kristallklar, und flach genug f\u00fcr die Kleinen.',
  'olympus-coast': 'Am Fu\u00df des Olymps baden, wo die griechischen G\u00f6tter angeblich wohnen \u2013 der Strand von Platamonas mit der Kreuzritterburg auf dem H\u00fcgel dar\u00fcber ist ein epischer Anblick. Das Wasser ist 24-26\u00b0C warm, der Strand lang genug dass ihr immer ein ruhiges Pl\u00e4tzchen findet. Freistehen geht in den Olivenhainen etwas zur\u00fcck vom Strand. Wer Lust hat, kann von hier aus eine Olymp-Tagestour starten. Abends in Litochoro Gyros essen und dabei den Berg anstarren, der im Abendlicht rosa wird.',
  'ulcinj': 'Ulcinj hat den l\u00e4ngsten Sandstrand Montenegros \u2013 13 Kilometer feiner Sand, der Velika Pla\u017ea, mit Kitesurfern die \u00fcber die Wellen fliegen und warmem Wasser zwischen 24 und 27\u00b0C. Die Stadt selbst hat eine verwinkelte Altstadt auf einem Felsen \u00fcber dem Meer, mit g\u00fcnstigen Restaurants wo ihr f\u00fcr 5-6 Euro zu zweit essen k\u00f6nnt. Freistehen am langen Strand ist unkompliziert, einfach in die D\u00fcnen fahren und aufwachen mit Meerblick. Montenegro ist ohnehin g\u00fcnstiger als Kroatien, und Ulcinj nochmal g\u00fcnstiger als die Bucht von Kotor.',
  'porto-palermo': 'Porto Palermo ist Albaniens verstecktes Juwel \u2013 eine Bucht mit osmanischer Festung, einer verlassenen sowjetischen U-Boot-Basis und dem unfassbar sch\u00f6nen Gjipe Beach um die Ecke, eingeklemmt zwischen Felsklippen. Die Albanische Riviera ist der letzte bezahlbare Mittelmeer-K\u00fcstenabschnitt Europas, ein Fisch-Essen am Meer kostet 4-5 Euro. Das Wasser hat 23-26\u00b0C und eine Klarheit, die ihr nicht glauben werdet. Gjipe Beach erreicht ihr nur zu Fu\u00df oder per Boot \u2013 der steile Abstieg wird mit einer der sch\u00f6nsten Buchten belohnt.',
  'meteora': 'Meteora ist einer dieser Orte, die einfach nicht real aussehen \u2013 gewaltige Sandsteins\u00e4ulen ragen hunderte Meter in die H\u00f6he und oben drauf sitzen Kl\u00f6ster aus dem 14. Jahrhundert. Zum Sonnenuntergang auf den Aussichtspunkt oberhalb fahren und zusehen, wie die Felsen golden und dann orange werden \u2013 absolute G\u00e4nsehaut-Garantie. Kalambaka unten im Tal hat g\u00fcnstige Tavernen mit riesigen Portionen Moussaka. Morgens fr\u00fch hochfahren bevor die Reisebusse kommen, dann habt ihr die Kl\u00f6ster fast f\u00fcr euch. Mit dem Van kommt ihr \u00fcber die Panoramastra\u00dfe zu allen Kl\u00f6stern, jede Kurve ein neues Postkartenmotiv.',
  'nis': 'Ni\u0161 empf\u00e4ngt euch mit einer r\u00f6mischen Festung, in deren Mauern abends Einheimische flanieren und Kinder Fu\u00dfball spielen \u2013 setzt euch in eins der Caf\u00e9s direkt auf der Festungsmauer und schaut auf die Stadt hinunter. Der Sch\u00e4delturm (\u0106ele Kula) ist nichts f\u00fcr schwache Nerven, aber ein St\u00fcck Geschichte, das man nirgendwo sonst findet. Fahrt unbedingt die 10km nach Ni\u0161ka Banja: dort pl\u00e4tschert warmes Thermalwasser gratis aus dem Berg. Van-Tipp: Parkplatz an der Festung ist gratis und zentral, abends wird hier gegrillt \u2013 kauft \u0106evapi nebenan und esst auf der Festungsmauer bei Sonnenuntergang.',
  'golubac': 'Die frisch restaurierte Festung von Golubac klebt an der Donau-Klippe wie eine Filmkulisse \u2013 ihr steht auf den T\u00fcrmen und unter euch beginnt das Eiserne Tor, die gr\u00f6\u00dfte Flussschlucht Europas. Bei Donji Milanovac gibt es Kiesstr\u00e4nde direkt am Wasser, wo ihr mit dem Van freistehen k\u00f6nnt \u2013 abends Riblja \u010corba (Fischsuppe) von der Donau-Fischbude, morgens ins 22-24\u00b0C warme Wasser springen. Die Festung selbst kostet kleinen Eintritt, lohnt aber jede Minute.',
  'belgrade': 'Belgrad ist laut, chaotisch und vollkommen unwiderstehlich \u2013 die Kalemegdan-Festung thront \u00fcber dem Zusammenfluss von Donau und Save und ist abends DER Treffpunkt der ganzen Stadt. Schlendert durch die Skadarlija mit Kopfsteinpflaster und Livemusik in jeder Kafana und bestellt Pljeskavica mit Kajmak. Van-Tipp: Parken in Belgrad ist Krieg \u2013 stellt den Van auf den bewachten Parkplatz beim Ada Ciganlija See und nehmt den Bus in die City.',
  'tara-serbia': 'Tara ist Serbiens gr\u00fcnstes Geheimnis: uralte Schwarzkiefern, so dicht dass kein Licht durchkommt, und irgendwo dazwischen B\u00e4ren. Die Wanderung zu Banjska Stena ist Pflicht \u2013 ihr steht am Rand und blickt 1000 Meter senkrecht hinunter auf die smaragdgr\u00fcne Drina, ein Anblick der euch den Atem raubt. F\u00fcr Action: in Bajina Ba\u0161ta Zipline \u00fcber die Schlucht oder Drina-Rafting (halber Tag, ~20\u20ac pro Person). Freistehen bei Mitrovac auf den Waldwiesen: flach, ruhig, nachts Sterne wie im Planetarium.',
  'uvac-canyon': 'Die M\u00e4ander des Uvac sind so absurd perfekt geschwungen, dass sie wie Photoshop aussehen \u2013 aber ihr steht tats\u00e4chlich dort oben am Viewpoint und traut euren Augen nicht. Riesige G\u00e4nsegeier kreisen unter euch auf Augenh\u00f6he durch die Schlucht, mit \u00fcber zwei Metern Spannweite. Der Weg zum Aussichtspunkt Molitva ist eine moderate Wanderung (ca. 1h), aber die letzten Meter \u00fcber den Grat sind nichts f\u00fcr H\u00f6henangst. Van-Tipp: Freistehen am Parkplatz beim Viewpoint, und in Sjenica den ber\u00fchmten Sjeni\u010dki Kajmak kaufen.',
  'sicevac': 'Die Si\u0107eva\u010dka Klisura liegt nur 20 Minuten \u00f6stlich von Ni\u0161 und f\u00fchlt sich an wie eine andere Welt: steile Felsw\u00e4nde, smaragdgr\u00fcnes Wasser und im Sommer warm genug zum stundenlangen Baden. Kajak k\u00f6nnt ihr vor Ort mieten und durch die Schlucht paddeln \u2013 Felsformationen links und rechts, Eisvogel inklusive. Der perfekte Halbtages-Action-Stop, wenn ihr von Bulgarien Richtung Ni\u0161 fahrt oder umgekehrt.',
  'drina-bajina': 'Die Drina bei Bajina Ba\u0161ta ist das sch\u00f6nste Flusswasser Serbiens: smaragdgr\u00fcn, so klar dass ihr jeden Stein am Grund seht, und ges\u00e4umt von riesigen glatten Felsen die wie gemacht sind zum Klippenspringen. Das ber\u00fchmte \u201eHaus auf der Drina\u201c \u2013 ein winziges Holzh\u00e4uschen auf einem Felsen mitten im Fluss \u2013 ist real und ihr k\u00f6nnt hinpaddeln. Am Ufer gibt es mehrere Kiesbuchten zum Freistehen, besonders flussaufw\u00e4rts Richtung Peru\u0107ac-Stausee \u2013 Lagerfeuer, Grillen, Sternenhimmel.',
  'vrelo-river': 'Vrelo ist ein Naturwunder: der k\u00fcrzeste Fluss der Welt (ungef\u00e4hr 365 Meter) entspringt aus einem tiefblauen Quellpool, der so intensiv gef\u00e4rbt ist, dass er unwirklich aussieht. Das Wasser ist mit 10-14\u00b0C zu kalt zum Baden, aber der Anblick ist es absolut wert \u2013 t\u00fcrkis-kobaltblau, bodenlos wirkend. Der Fluss m\u00fcndet direkt in die Drina bei Peru\u0107ac, also kombiniert den Stopp mit Drina-Bajina: erst staunen, dann ein paar hundert Meter weiter im warmen Drina-Wasser schwimmen.',
  'gostilje': 'Der Gostilje-Wasserfall st\u00fcrzt 20 Meter in einen Pool, in dem ihr schwimmen k\u00f6nnt \u2013 k\u00fchles Bergwasser (16-19\u00b0C) nach hei\u00dfen Sommertagen ist genau richtig. Rund um den Wasserfall riecht es nach nassem Moos und wilden Kr\u00e4utern, der Pfad dorthin f\u00fchrt durch Buchenwald. Im Zlatibor-Gebiet gibt es \u00fcberall Wiesen zum Freistehen, und am Stra\u00dfenrand verkaufen Bauern Pr\u0161ut, Kajmak und Waldhonig. Tipp: Sammelt Waldbeeren auf dem Weg und esst sie am Wasserfall.',
  'erma-gorge': 'Die Erma-Schlucht ist ein Kuriosum: der Fluss flie\u00dft quer \u00fcber die Grenze zwischen Bulgarien und Serbien, und ihr k\u00f6nnt buchst\u00e4blich von einem Land ins andere schwimmen. Gro\u00dfe Felsen bilden nat\u00fcrliche Pools, das Wasser ist im Sommer 20-23\u00b0C warm. Die Schlucht hat diesen wilden, unentdeckten Charakter den ihr an der Nera-Klamm liebt, nur kleiner und w\u00e4rmer. Van-Tipp: Freistehen auf serbischer Seite unkompliziert, Zufahrt ist Schotterpiste aber machbar.',
  'ohrid': 'Ohrid ist der Ort, an dem alle sagen \u201eda m\u00fcsst ihr hin\u201c \u2013 und sie haben recht. Der See ist einer der \u00e4ltesten der Welt (3 Millionen Jahre), das Wasser 22-24\u00b0C warm und so klar, dass ihr beim Schwimmen die Fische unter euch z\u00e4hlen k\u00f6nnt. Die Altstadt klettert den H\u00fcgel hoch zur Festung Samuels, von dort seht ihr den ganzen See in diesem unwirklichen Blau, und die Kirche Sveti Jovan Kaneo klebt an der Klippe wie ein Postkartenmotiv. Springt bei Kaneo von den Felsen ins Wasser, esst Ohrid-Forelle am Ufer, und plant mindestens zwei N\u00e4chte ein.',
  'mavrovo': 'Mavrovo ist das Gegenprogramm zum touristischen Ohrid: wilder, einsamer, mit einem Bergsee in dem eine halb versunkene Kirche steht, deren Dach je nach Wasserstand aus dem See ragt \u2013 einer der fotogensten Orte des ganzen Balkans. Die Berge drumherum sind \u00fcber 2500m hoch, die Luft riecht nach Kiefern, und auf den Almwiesen stehen Pferde und Schafe ohne Zaun. Der Nationalpark hat Stellpl\u00e4tze, aber ihr k\u00f6nnt auch wild auf den Almwiesen stehen \u2013 nachts absolute Stille, Milchstra\u00dfe \u00fcber dem See.',
  'matka-canyon': 'Matka ist DER Abenteuer-Spot Nordmazedoniens: ihr mietet ein Kajak und paddelt in eine enge Schlucht mit hundert Meter hohen Felsw\u00e4nden, am Ende wartet eine H\u00f6hle die ihr per Boot besichtigen k\u00f6nnt. Von den Felsw\u00e4nden wird geklippengesprungen \u2013 3 bis 10 Meter, je nach Mut, das Wasser ist 20-23\u00b0C und tief genug. Das Ganze liegt nur 30 Minuten von Skopje entfernt, f\u00fchlt sich aber an wie Wildnis. Kommt fr\u00fch morgens (vor 9 Uhr), dann habt ihr die Schlucht fast f\u00fcr euch allein.',
  'prespa-lake': 'Prespa ist Ohrids stiller Nachbar: \u00fcber den spektakul\u00e4ren Galicica-Pass erreicht ihr einen See, an dem fast niemand ist. Im Sommer stehen Flamingos im Flachwasser \u2013 ja, Flamingos auf dem Balkan, kein Witz. Das Dorf Stenje hat einen Strand mit vielleicht drei Handt\u00fcchern drauf, das Wasser ist 22-24\u00b0C warm. Van-Tipp: in Stenje freistehen direkt am Ufer, Sonnenuntergang \u00fcber dem See mit Blick auf die albanischen Berge \u2013 einer der magischsten Stellpl\u00e4tze der ganzen Reise.',
  'prizren': 'Prizren ist die vielleicht sch\u00f6nste \u00dcberraschung des ganzen Balkans: eine osmanische Steinbr\u00fccke \u00fcber den Fluss Bistrica, dar\u00fcber Minarette und eine Festung auf dem H\u00fcgel, und an beiden Ufern Caf\u00e9s in denen der Macchiato 50 Cent kostet. Die Stadt ist klein genug zum Durchschlendern, aber jede Gasse hat Charakter. Steigt zur Festung hoch bei Sonnenuntergang, die Aussicht \u00fcber Stadt und Berge ist atemberaubend. Kosovo ist das g\u00fcnstigste Land der Reise: vier Personen essen f\u00fcr 8-12\u20ac satt.',
  'rugova-gorge': 'Die Rugova-Schlucht bei Peja ist eine der dramatischsten Schluchten des Balkans: senkrechte Felsw\u00e4nde, hunderte Meter hoch, und eine Stra\u00dfe die sich unten durch schl\u00e4ngelt. Wer Klettersteig-Erfahrung hat: die Via Ferrata hier ist spektakul\u00e4r und deutlich weniger \u00fcberlaufen als in den Alpen. Am Eingang der Schlucht liegt das Patriarchat von Peja \u2013 ein UNESCO-Welterbe-Kloster mit mittelalterlichen Fresken. Van-Tipp: im Tal vor der Schlucht gibt es Wiesen zum Freistehen, und in Peja selbst den besten Markt Kosovos.',
};

  0: 'Ihr startet in Budapest mit Langos in der Markthalle und Thermalbad-Jetlag-Killer, dann taucht ihr ein in Siebenb\u00fcrgen: Sibius Gassen, Sch\u00e4ferk\u00e4se am Transf\u0103g\u0103r\u0103\u0219an und das Gef\u00fchl, hundert Jahre zur\u00fcckreist zu sein. In der Nera-Klamm springt ihr von Klippen in t\u00fcrkise Pools, im Cerna-Tal dampfen hei\u00dfe Quellen mitten im Wald \u2013 das sind die Tage, von denen ihr noch in zehn Jahren erz\u00e4hlt. Dann Bulgarien: Plovdivs 6000 Jahre alte Altstadt f\u00fcr l\u00e4cherlich wenig Geld, die Rhodopen mit Patatnik-Abenden in Dorf-Mehanas und Pools unter Wasserf\u00e4llen. Veliko Tarnovo liefert die Festung auf dem H\u00fcgel, bevor Ni\u0161 euch mit den besten \u0106evapi des Balkans auf die Heimreise schickt. Diese Route ist der sichere Gewinner \u2013 erprobter Klassiker, null Risiko, maximales Erlebnis.',
  1: 'Von Budapest geht es durch Rum\u00e4niens Wildnis direkt zu den Highlights: Nera-Klamm und Cerna-Thermalquellen, dann \u00fcber Ni\u0161 \u2013 Serbiens Grillhauptstadt \u2013 nach S\u00fcden in v\u00f6llig neues Terrain. Matka Canyon empf\u00e4ngt euch mit Kajaks in der Schlucht und einer H\u00f6hle am Ende, bevor Ohrid alles toppt: der \u00e4lteste See Europas, Klippenspringen bei der Kaneo-Kirche, Forelle am Ufer und Sonnenunterg\u00e4nge die ihr filmen werdet obwohl kein Video dem Anblick gerecht wird. Auf dem R\u00fcckweg nehmt ihr Plovdiv mit \u2013 das g\u00fcnstigste gute Essen der Reise \u2013 und Veliko Tarnovo als kulturelles Sahneh\u00e4ubchen. Eine Route die Rum\u00e4niens Wildwasser mit Nordmazedoniens Wow-Faktor verbindet.',
  2: 'Diese Route ist f\u00fcr alle die sagen: \u201eWir wollen AUCH ans Meer.\u201c Von Rum\u00e4niens Klammen \u00fcber Ni\u0161 und Ohrid geht es runter an die griechische K\u00fcste \u2013 Sithonias Buchten mit karibischem Wasser, die Olymp-K\u00fcste mit Blick auf den G\u00f6tterberg, und Meteoras schwebende Kl\u00f6ster bei Sonnenuntergang. Ihr wechselt zwischen S\u00fc\u00dfwasser-Pools, dem \u00e4ltesten See Europas und Mittelmeer-Str\u00e4nden \u2013 jeden zweiten Tag ein komplett anderes Bade-Erlebnis. Dazu drei L\u00e4nderk\u00fcchen: rum\u00e4nische St\u00e2na-K\u00e4se, Ohrid-Forelle und griechischer Oktopus mit Ouzo. Der R\u00fcckweg \u00fcber Plovdiv und Veliko Tarnovo rundet eine Route ab, die Berge, Seen und Meer in einer einzigen Schleife vereint.',
  3: 'Kosovo auf dem Weg nach Ohrid mitzunehmen ist der beste Geheimtipp dieser Reise: Rugova-Schlucht mit Via Ferrata f\u00fcr den Adrenalinkick, dann Prizren \u2013 eine der sch\u00f6nsten Kleinst\u00e4dte des ganzen Balkans, wo vier Personen f\u00fcr unter 12 Euro f\u00fcrstlich essen. \u00dcber Matka Canyon (Kajak durch die Schlucht, H\u00f6hle, Klippenspringen) erreicht ihr Ohrid und den stillen Prespa-See mit seinen Flamingos \u2013 ja, echte Flamingos. Das ist die Route mit dem h\u00f6chsten Abenteuer-Faktor und den niedrigsten Preisen, durch L\u00e4nder die kaum jemand auf dem Radar hat.',
  4: 'Mehr Rum\u00e4nien geht nicht: Salina Turda (Riesenrad 120 Meter unter der Erde!), Sibius Altstadt, der Transf\u0103g\u0103r\u0103\u0219an als \u201esch\u00f6nste Stra\u00dfe der Welt\u201c, Bra\u0219ov mit Corvin Castle, und dann die 7 Sc\u0103ri Via Ferrata \u2013 Leitern und Ziplines durch eine Wasserfall-Schlucht. In der Nera-Klamm und im Cerna-Tal schwimmt ihr euch durch Rum\u00e4niens wildeste Gew\u00e4sser, bevor die Rhodopen in Bulgarien als Ausklang dienen: Dorf-Mehanas, Patatnik, Waldhonig und hei\u00dfes Thermalwasser. Diese Route ist f\u00fcr Action-Liebhaber die Rum\u00e4nien wirklich auskosten wollen.',
  5: 'F\u00fcnf L\u00e4nder, f\u00fcnf K\u00fcchen, f\u00fcnf v\u00f6llig verschiedene Welten in einer einzigen gro\u00dfen Schleife: von Rum\u00e4niens Klammen \u00fcber Bulgariens Rhodopen-D\u00f6rfer, Serbiens Grill-Hauptstadt Ni\u0161, Kosovos Prizren (wo ein Espresso weniger kostet als ein Kaugummi), Matka Canons Kajak-Abenteuer bis zu Ohrids uraltem See. Ihr fahrt durch L\u00e4nder die nahtlos ineinander \u00fcbergehen und doch jeden Tag anders schmecken, anders aussehen, anders klingen. Veliko Tarnovo als letzter Stopp setzt mit seiner Festung den perfekten Schlusspunkt. Das ist die Route f\u00fcr alle die sagen: \u201eWenn schon Balkan, dann richtig.\u201c',

let lbImgs=[], lbIdx=0, lbName='';
function openLB(id) {
  const s = S.find(x=>x.id===id);
  if (!s) return;
  lbImgs = getImgs(id);

  lbIdx = 0; lbName = s.n;

  if (!document.getElementById('lightbox').classList.contains('open')) return;

  if (e.key==='ArrowLeft') lbNav(-1);

// ============================================================
// ROUTING (OSRM) — MapLibre version
// ============================================================
// Road type colors based on speed (OSRM annotation)
const ROAD_TYPES = [
  { id: 'highway',  min: 25, color: '#2ecc71', width: 4, label: 'Autobahn' },      // >90 km/h
  { id: 'main',     min: 17, color: '#3498db', width: 3, label: 'Schnellstrasse' },  // 60-90 km/h
  { id: 'mountain', min: 10, color: '#e67e22', width: 3, label: 'Bergstrasse' },     // 35-60 km/h
  { id: 'slow',     min: 0,  color: '#e74c3c', width: 2, label: 'Langsam/Schotter' },// <35 km/h
];

function roadType(speedMs) {
  for (const rt of ROAD_TYPES) if (speedMs >= rt.min) return rt;
  return ROAD_TYPES[3];
}

let rAbort = null;
const routeLayerIds = [];

async function fetchRoute() {
  if (rAbort) rAbort.abort();
  // Remove old route layers
  for (const lid of routeLayerIds) { if (map.getLayer(lid)) map.removeLayer(lid); }
  for (const lid of routeLayerIds) { if (map.getSource(lid)) map.removeSource(lid); }
  routeLayerIds.length = 0;
  rLegs = [];
  const spots = sel.map(id => S.find(s => s.id === id)).filter(Boolean);
  if (spots.length < 2) { renderSummary(); renderList(); return; }
  rLoading = true; renderSummary();
  const ctrl = new AbortController(); rAbort = ctrl;
  try {
    const c = spots.map(s => `${s.lng},${s.lat}`).join(';');
    const r = await fetch(`https://router.project-osrm.org/route/v1/driving/${c}?overview=full&geometries=geojson&annotations=distance,duration,speed`, { signal: ctrl.signal });
    const d = await r.json();
    if (d.code==='Ok' && d.routes?.[0]) {
      const rt = d.routes[0];
      const coords = rt.geometry.coordinates;

      // Collect all speeds from all legs
      const allSpeeds = [];
      rt.legs?.forEach((l, i) => {
        // Calculate road type breakdown per leg
        const legSpeeds = l.annotation?.speed || [];
        const legDists = l.annotation?.distance || [];
        const breakdown = {};
        ROAD_TYPES.forEach(rt => breakdown[rt.id] = 0);
        for (let j = 0; j < legSpeeds.length; j++) {
          const t = roadType(legSpeeds[j]);
          breakdown[t.id] += legDists[j] || 0;
        }
        const totalDist = Object.values(breakdown).reduce((a,b) => a+b, 0) || 1;
        const pcts = {};
        ROAD_TYPES.forEach(rt => pcts[rt.id] = Math.round(breakdown[rt.id] / totalDist * 100));
        // Avg speed
        const avgSpeed = l.distance && l.duration ? Math.round(l.distance / l.duration * 3.6) : 0;
        rLegs.push({ from: sel[i], to: sel[i+1], km: Math.round(l.distance/1000), min: Math.round(l.duration/60), pcts, avgSpeed });
        if (l.annotation?.speed) allSpeeds.push(...l.annotation.speed);
      });

      if (allSpeeds.length >= coords.length - 1) {
        // Split route into segments by road type
        const segments = {}; // { typeId: [[coords]] }
        let currentType = roadType(allSpeeds[0]);
        let currentCoords = [coords[0]];

        for (let i = 0; i < allSpeeds.length; i++) {
          const t = roadType(allSpeeds[i]);
          currentCoords.push(coords[i + 1]);
          if (t.id !== currentType.id || i === allSpeeds.length - 1) {
            if (!segments[currentType.id]) segments[currentType.id] = [];
            segments[currentType.id].push([...currentCoords]);
            currentCoords = [coords[i + 1]];
            currentType = t;
          }
        }

        // Add layers for each road type (slow first, highway on top)
        for (const rt of [...ROAD_TYPES].reverse()) {
          if (!segments[rt.id]) continue;
          const srcId = 'route-' + rt.id;
          const glowId = 'route-glow-' + rt.id;
          const lineId = 'route-line-' + rt.id;
          map.addSource(srcId, { type: 'geojson', data: {
            type: 'FeatureCollection',
            features: segments[rt.id].map(c => ({ type: 'Feature', geometry: { type: 'LineString', coordinates: c } }))
          }});
          map.addLayer({ id: glowId, type: 'line', source: srcId, paint: { 'line-color': rt.color, 'line-width': rt.width + 5, 'line-opacity': 0.12 } });
          map.addLayer({ id: lineId, type: 'line', source: srcId, paint: { 'line-color': rt.color, 'line-width': rt.width, 'line-opacity': 0.85 }, layout: { 'line-cap': 'round', 'line-join': 'round' } });
          // Clickable: show road info popup
          map.on('click', lineId, (e) => {
            const speed = rt.id === 'highway' ? '>90' : rt.id === 'main' ? '60-90' : rt.id === 'mountain' ? '35-60' : '<35';
            new maplibregl.Popup({maxWidth:'220px'})
              .setLngLat(e.lngLat)
              .setHTML(`<div style="font-size:12px;font-weight:600;color:${rt.color}">${rt.label}</div><div style="font-size:11px;color:#6b7280;margin-top:2px">${speed} km/h Durchschnitt</div><div style="font-size:10px;color:#9ca3af;margin-top:2px">${rt.id==='mountain'?'Kurvig, langsam, aber oft spektakuläre Aussicht':rt.id==='slow'?'Schotter/eng/kurvig - mehr Zeit einplanen':rt.id==='highway'?'Schnell, entspannt, langweilig':'Gute Strasse, zügig voran'}</div>`)
              .addTo(map);
          });
          map.on('mouseenter', lineId, () => map.getCanvas().style.cursor = 'pointer');
          map.on('mouseleave', lineId, () => map.getCanvas().style.cursor = '');
          routeLayerIds.push(glowId, lineId, srcId);
        }
      } else {
        // Fallback: single color if no speed data
        const srcId = 'route-fallback';
        map.addSource(srcId, { type: 'geojson', data: { type: 'Feature', geometry: rt.geometry } });
        map.addLayer({ id: 'route-fb-line', type: 'line', source: srcId, paint: { 'line-color': '#e94560', 'line-width': 3, 'line-opacity': 0.8 } });
        routeLayerIds.push('route-fb-line', srcId);
      }
    }
  } catch(e) {}
  rLoading = false; renderSummary(); renderList();
}
let rTimer; function reqRoute() { clearTimeout(rTimer); rTimer = setTimeout(fetchRoute, 300); }

// Ensure Bonn is always start AND end
function ensureBonn() {
  if (sel[0] !== 'bonn') sel = sel.filter(x=>x!=='bonn');
  if (sel[0] !== 'bonn') sel.unshift('bonn');
  if (sel.length > 1 && sel[sel.length-1] !== 'bonn') sel.push('bonn');
}

// Round-trip: always Bonn → ... → Bonn
function optimizeRoute() {
  if (sel.length < 3) return;
  // Remove all bonn entries, we'll add them back
  let ids = sel.filter(x => x !== 'bonn');
  const pts = ids.map(id => S.find(s=>s.id===id)).filter(Boolean);
  if (!pts.length) return;

  const home = S.find(s=>s.id==='bonn');
  // Start from spot nearest to Bonn
  pts.sort((a,b) => hav(home.lat,home.lng,a.lat,a.lng) - hav(home.lat,home.lng,b.lat,b.lng));

  const rem = [...pts];
  const ord = [rem.shift()];
  while (rem.length > 0) {
    const last = ord[ord.length-1]; let bi=0, bd=Infinity;
    if (rem.length === 1) { ord.push(rem.pop()); break; }
    rem.forEach((r,i) => {
      let d = hav(last.lat,last.lng,r.lat,r.lng);
      // Bias last spots toward home
      if (rem.length <= 3) d += hav(r.lat,r.lng,home.lat,home.lng) * 0.3;
      if (d<bd){bd=d;bi=i;}
    });
    ord.push(rem.splice(bi,1)[0]);
  }
  sel = ['bonn', ...ord.map(s=>s.id), 'bonn'];
  localStorage.setItem('vt-sel', JSON.stringify(sel)); render();
}

// Smart insert: find optimal position (skip bonn anchors)
function smartInsert(id) {
  if (id === 'bonn') return; // don't double-add bonn
  // Ensure bonn bookends
  const inner = sel.filter(x => x !== 'bonn');
  if (inner.length < 2) {
    inner.push(id);
  } else {
    const newSpot = S.find(s=>s.id===id);
    if (!newSpot) { inner.push(id); }
    else {
      let bestIdx = inner.length, bestCost = Infinity;
      for (let i = 0; i <= inner.length; i++) {
        const prev = i > 0 ? S.find(s=>s.id===inner[i-1]) : S.find(s=>s.id==='bonn');
        const next = i < inner.length ? S.find(s=>s.id===inner[i]) : S.find(s=>s.id==='bonn');
        let cost = 0;
        if (prev) cost += hav(prev.lat,prev.lng,newSpot.lat,newSpot.lng);
        if (next) cost += hav(newSpot.lat,newSpot.lng,next.lat,next.lng);
        if (prev && next) cost -= hav(prev.lat,prev.lng,next.lat,next.lng);
        if (cost < bestCost) { bestCost = cost; bestIdx = i; }
      }
      inner.splice(bestIdx, 0, id);
    }
  }
  sel = ['bonn', ...inner, 'bonn'];
}
function hav(a,b,c,d) { const R=6371,dLa=(c-a)*Math.PI/180,dLo=(d-b)*Math.PI/180; const x=Math.sin(dLa/2)**2+Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(dLo/2)**2; return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x)); }
function fitRoute() {
  const pts=sel.map(id=>S.find(s=>s.id===id)).filter(Boolean);
  if(!pts.length) return;
  const lngs=pts.map(s=>s.lng), lats=pts.map(s=>s.lat);
  map.fitBounds([[Math.min(...lngs),Math.min(...lats)],[Math.max(...lngs),Math.max(...lats)]],{padding:40,duration:1000});
}

function tempColor(at) {
  if (!at) return '#888';
  const hi = parseInt(at.split('-')[1]) || 30;
  if (hi >= 36) return '#e74c3c';
  if (hi >= 32) return '#e67e22';
  if (hi >= 28) return '#f1c40f';
  if (hi >= 24) return '#2ecc71';
  return '#3498db';
}

function showInfoCard(s, x, y) {
  clearTimeout(icHideTimer);
  if (icSpotId === s.id && infocard.style.display === 'block') return; // already showing
  icSpotId = s.id;
  const on = isSel(s.id);
  const ci = CAT[s.cat]?.i || '';

  // Carousel
  icCarousel.innerHTML = popupCarousel(s.id);

  // Body
  const wcLine = s.wc ? '<div class="pwc">\u2705 Wild Camping möglich</div>' : '';
  const food = FOOD[s.id];
  const foodHtml = food ? `<div class="pfood"><div class="pfood-title">\u{1F37D} ${food.title}</div><div class="pfood-text">${food.text}</div></div>` : '';
  const tagsHtml = s.t.map(t => `<span style="display:inline-block;font-size:9px;padding:1px 6px;border-radius:8px;background:#f3f4f6;color:#4b5563;margin:1px 2px">${t}</span>`).join('');
  const navBtn = `<div class="pgmap-btns">
    <a class="pgmap-btn" href="https://www.google.com/maps/dir//${s.lat},${s.lng}" target="_blank">\u{1F697} Navigation</a>
  </div>`;
  const btnCls = on ? 'pbtn pbtn-rm' : 'pbtn pbtn-add';
  const btnTxt = on ? '\u2715 Von Route entfernen' : '\u2713 Zur Route hinzufügen';

  // Metrics
  const mParts = [];
  if (s.at) mParts.push(`\u{1F321}\u{FE0F} ${s.at}\u00b0C`);
  if (s.wt) mParts.push(`\u{1F4A7} Wasser ${s.wt}\u00b0C`);
  if (s.el) mParts.push(`\u2191 ${s.el}m`);
  if (s.ni) mParts.push(`\u{1F319} ${s.ni} Nächte`);
  const metricsHtml = mParts.length ? `<div style="display:flex;gap:8px;flex-wrap:wrap;margin:6px 0;font-size:11px">${mParts.map(m=>`<span style="background:#f3f4f6;padding:2px 7px;border-radius:6px;color:#374151">${m}</span>`).join('')}</div>` : '';

  icBody.innerHTML = `
    <div class="ptitle">${ci} ${s.n}</div>
    <div class="pcat">${s.co} \u00b7 ${CAT[s.cat]?.l}</div>
    ${metricsHtml}
    <div class="pdesc">${s.d}</div>
    <div class="pwhy">${s.w}</div>
    ${wcLine}${foodHtml}
    <div style="margin:4px 0">${tagsHtml}</div>
    ${navBtn}
    <button class="${btnCls}" onclick="toggle('${s.id}')" style="width:100%;margin-top:4px">${btnTxt}</button>
  `;

  // Position
  infocard.style.display = 'block';
  infocard.style.left = x + 16 + 'px';
  infocard.style.top = y - 20 + 'px';

  // Keep on screen
  requestAnimationFrame(() => {
    const r = infocard.getBoundingClientRect();
    if (r.right > window.innerWidth - 8) infocard.style.left = (x - r.width - 12) + 'px';
    if (r.bottom > window.innerHeight - 8) infocard.style.top = Math.max(8, window.innerHeight - r.height - 8) + 'px';
    if (r.top < 8) infocard.style.top = '8px';
  });
}

function hideInfoCard() {
  icHideTimer = setTimeout(() => {
    if (!infocard.matches(':hover')) {
      infocard.style.display = 'none';
      icSpotId = null;
    }
  }, 150);
}

infocard.addEventListener('mouseenter', () => clearTimeout(icHideTimer));
infocard.addEventListener('mouseleave', () => hideInfoCard());

function isSel(id) { return sel.includes(id); }
function toggle(id) {
  if (id === 'bonn') return;
  activeRouteIdx = -1; // custom change, no longer a preset route
  if (isSel(id)) { sel=sel.filter(x=>x!==id); }
  else { smartInsert(id); }
  // Ensure bonn bookends when route has spots
  const inner = sel.filter(x=>x!=='bonn');
  sel = inner.length ? ['bonn', ...inner, 'bonn'] : [];
  localStorage.setItem('vt-sel',JSON.stringify(sel)); render();
}
function mv(id,d) { const i=sel.indexOf(id),n=i+d; if(i<0||n<0||n>=sel.length)return; [sel[i],sel[n]]=[sel[n],sel[i]]; localStorage.setItem('vt-sel',JSON.stringify(sel)); render(); }

}

function visible() {
  const wc = document.getElementById('wc-chk').checked;
  const foodOnly = document.getElementById('food-chk').checked;
  const q = document.getElementById('search').value.toLowerCase().trim();
  let list = S.filter(s => filt.has(s.cat) && s.cat !== 'home');
  if (wc) list = list.filter(s => s.wc);
  if (foodOnly) list = list.filter(s => FOOD[s.id]);
  if (q) list = list.filter(s => s.n.toLowerCase().includes(q) || s.co.toLowerCase().includes(q) || s.d.toLowerCase().includes(q) || s.t.some(t=>t.toLowerCase().includes(q)));
  if (tab==='sel') return sel.map(id => list.find(s=>s.id===id)).filter(Boolean);
  return list;
}

function fmtDur(m) { const h=Math.floor(m/60); return h?`${h}h${m%60>0?' '+m%60+'m':''}`:m+'m'; }

// ============================================================
// POPUP CAROUSEL BUILDER
// ============================================================
function popupCarousel(id) {
  const imgs = getImgs(id);
  if (!imgs.length) return `<div class="pcr"><div class="pcr-ph">${CAT[S.find(s=>s.id===id)?.cat]?.i||''}</div></div>`;
  const uid = 'cr_'+id;
  const imgTags = imgs.map((u,i) => `<img src="${u}" class="${i===0?'vis':''}" data-i="${i}">`).join('');
  const dots = imgs.length > 1 ? `<div class="pcr-dots">${imgs.map((_,i)=>`<div class="pcr-dot ${i===0?'on':''}" data-i="${i}"></div>`).join('')}</div>` : '';
  const arrows = imgs.length > 1 ? `<button class="pcr-arr pcr-l" onclick="crNav('${uid}',-1)">&#8249;</button><button class="pcr-arr pcr-r" onclick="crNav('${uid}',1)">&#8250;</button>` : '';
  const cnt = imgs.length > 1 ? `<div class="pcr-cnt">${imgs.length} Fotos</div>` : '';
  return `<div class="pcr" id="${uid}" data-idx="0" onclick="openLB('${id}')" style="cursor:pointer">${imgTags}${arrows}${dots}${cnt}</div>`;
}
function crNav(uid, dir) {
  event.stopPropagation();
  const el = document.getElementById(uid);
  if (!el) return;
  const imgs = el.querySelectorAll('img');
  const dots = el.querySelectorAll('.pcr-dot');
  let idx = parseInt(el.dataset.idx) || 0;
  imgs[idx]?.classList.remove('vis');
  dots[idx]?.classList.remove('on');
  idx = (idx + dir + imgs.length) % imgs.length;
  imgs[idx]?.classList.add('vis');
  dots[idx]?.classList.add('on');
  el.dataset.idx = idx;
}

  const el = document.getElementById('list');

  // Route suggestions tab
  if (tab === 'routes') {
    el.innerHTML = '<div style="padding:8px 14px;font-size:10px;color:#556">6 optimale Routen ab/bis Bonn. Jede ist ein guter Trip.</div>' +
      ROUTES.map((r,i) => `<div class="rcard">
        <div class="rtitle">${i+1}. ${r.name}</div>
        <div class="rsub">${r.sub} · ${r.ids.length} Stops</div>
        <div class="rdesc">${r.desc}</div>

      </div>`).join('');

  }

  // ===== GUIDE VIEW for Route tab =====

    }

        h += `<div class="gs" onclick="flyTo('${s.id}')">

function spotsGeoJSON() {
  const wc = document.getElementById('wc-chk').checked;
  const foodOnly = document.getElementById('food-chk').checked;
  const features = [];
  S.forEach(s => {
    if (!filt.has(s.cat)) return;
    if (wc && !s.wc) return;
    if (foodOnly && !FOOD[s.id]) return;
    const on = isSel(s.id);
    const ri = on ? sel.indexOf(s.id) : -1;
    const ci = CAT[s.cat]?.i || '';
    // Build metrics string
    const mp = [];
    if (s.at) mp.push(s.at+'\u00b0');
    if (s.el) mp.push('\u2191'+s.el+'m');
    if (s.wt) mp.push('\u{1F4A7}'+s.wt+'\u00b0');
    if (s.wc) mp.push('\u26FA');
    if (s.ni) mp.push(s.ni+'N');
    const metrics = mp.join(' ');
    // Label = icon + name + newline + metrics
    const label = ci + ' ' + s.n + '\n' + metrics;
    features.push({
      type: 'Feature',
      geometry: { type: 'Point', coordinates: [s.lng, s.lat] },
      properties: {
        id: s.id, name: s.n, cat: s.cat, label: label,
        catColor: CAT[s.cat]?.c || '#888',
        isRoute: on, routeNum: ri >= 0 ? String(ri) : '',
        priority: on ? 1 : 0
      }
    });
  });
  return { type: 'FeatureCollection', features };
}

let spotsLayersAdded = false;
function addSpotsLayers() {
  if (spotsLayersAdded) return;
  spotsLayersAdded = true;

  map.addSource('spots', { type: 'geojson', data: spotsGeoJSON() });

  // Non-route dots
  map.addLayer({
    id: 'spots-dots', type: 'circle', source: 'spots',
    filter: ['==', ['get', 'isRoute'], false],
    paint: {
      'circle-radius': 6,
      'circle-color': ['get', 'catColor'],
      'circle-stroke-width': 1.5,
      'circle-stroke-color': '#fff',
      'circle-opacity': 0.85
    }
  });

  // Route dots (bigger, on top)
  map.addLayer({
    id: 'spots-route-dots', type: 'circle', source: 'spots',
    filter: ['==', ['get', 'isRoute'], true],
    paint: {
      'circle-radius': 10,
      'circle-color': '#d63050',
      'circle-stroke-width': 2.5,
      'circle-stroke-color': '#fff',
      'circle-opacity': 1
    }
  });

  // Route numbers
  map.addLayer({
    id: 'spots-route-nums', type: 'symbol', source: 'spots',
    filter: ['==', ['get', 'isRoute'], true],
    layout: {
      'text-field': ['get', 'routeNum'],
      'text-size': 10,
      'text-font': ['Noto Sans Bold'],
      'text-allow-overlap': true,
      'text-ignore-placement': true
    },
    paint: { 'text-color': '#fff' }
  });

  // Hover & click events on dots → show unified info card
  const dotLayers = ['spots-dots', 'spots-route-dots'];
  dotLayers.forEach(layer => {
    map.on('mouseenter', layer, (e) => {
      map.getCanvas().style.cursor = 'pointer';
      const f = e.features[0];
      const s = S.find(x => x.id === f.properties.id);
      if (s) showInfoCard(s, e.originalEvent.clientX, e.originalEvent.clientY);
    });
    map.on('mouseleave', layer, () => {
      map.getCanvas().style.cursor = '';
      hideInfoCard();
    });
    map.on('click', layer, (e) => {
      const f = e.features[0];
      const s = S.find(x => x.id === f.properties.id);
      if (s) showInfoCard(s, e.originalEvent.clientX, e.originalEvent.clientY);
    });
  });
}
